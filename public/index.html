<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Barometer</title>

<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#4B5851" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Barometer" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<link rel="icon" href="/icons/icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  :root {
    --panel: #E7E5DA;
    --panel-raised: #F1EFE4;
    --case: #4B5851;
    --case-light: #6C7A70;
    --ink: #20241E;
    --ink-soft: #5A6058;
    --lcd-bg: #B8C6AC;
    --lcd-ink: #1B2318;
    --lcd-dim: rgba(27, 35, 24, 0.16);
    --storm: #A23E32;
    --accent: #3D6A55;
    --line: rgba(32, 36, 30, 0.14);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--panel);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    overscroll-behavior-y: none;
  }

  #root { min-height: 100%; display: flex; flex-direction: column; }

  .mono { font-family: 'IBM Plex Mono', monospace; }
  .display { font-family: 'Space Grotesk', sans-serif; }

  button {
    font-family: inherit;
    border: none;
    background: none;
    color: inherit;
    cursor: pointer;
  }
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  /* ---------- Header ---------- */
  .app-header {
    background: var(--case);
    color: var(--panel-raised);
    padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 10px;
    flex-shrink: 0;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .location-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--panel-raised);
    padding: 4px 0;
  }
  .location-btn svg { flex-shrink: 0; opacity: 0.8; }
  .refresh-btn {
    padding: 8px;
    color: var(--panel-raised);
    opacity: 0.85;
  }
  .refresh-btn.spinning svg { animation: spin 0.7s linear; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .update-row {
    font-size: 12px;
    color: rgba(241, 239, 228, 0.65);
    margin-top: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ---------- Storm banner ---------- */
  .storm-banner {
    background: var(--storm);
    color: var(--panel-raised);
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  /* ---------- Main scroll area ---------- */
  .view {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 90px;
    -webkit-overflow-scrolling: touch;
  }

  /* ---------- Dial ---------- */
  .dial-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 26px 18px 4px;
  }
  .trend-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .trend-row .arrow { color: var(--accent); }
  .trend-row.falling .arrow { color: var(--storm); }

  /* ---------- LCD instrument panel ---------- */
  .lcd-panel {
    position: relative;
    background: var(--case);
    border-radius: 14px;
    margin: 18px 18px 0;
    padding: 16px 18px 14px;
  }
  .lcd-screw {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(0,0,0,0.35);
    box-shadow: inset 0 0.5px 0.5px rgba(255,255,255,0.25);
  }
  .lcd-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(241,239,228,0.6);
    margin-bottom: 8px;
  }
  .lcd-glass {
    background: var(--lcd-bg);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 8px;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.18);
  }
  .lcd-unit {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--lcd-ink);
    opacity: 0.75;
    margin-bottom: 6px;
  }

  /* ---------- Sparkline card ---------- */
  .card {
    background: var(--panel-raised);
    border-radius: 14px;
    margin: 14px 18px;
    padding: 16px 18px;
    border: 1px solid var(--line);
  }
  .card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--ink-soft);
    margin-bottom: 10px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ---------- Collapsible sections ---------- */
  .section {
    margin: 14px 18px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--panel-raised);
    overflow: hidden;
  }
  .section-head {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 18px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Space Grotesk', sans-serif;
  }
  .section-head .chev { transition: transform 0.2s ease; color: var(--ink-soft); }
  .section-head[aria-expanded="true"] .chev { transform: rotate(180deg); }
  .section-body {
    padding: 4px 18px 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat .label { font-size: 11px; color: var(--ink-soft); font-family: 'IBM Plex Mono', monospace; }
  .stat .value { font-size: 17px; font-weight: 500; }

  .wind-block {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
    margin-top: 4px;
  }
  .moon-block {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    margin-top: 2px;
  }

  /* ---------- Map view ---------- */
  #map { position: absolute; inset: 0; }
  .map-view { position: relative; flex: 1; }
  .map-status {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    background: var(--case);
    color: var(--panel-raised);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    z-index: 1500;
  }
  .isobar-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--ink);
    background: rgba(241, 239, 228, 0.88);
    padding: 1px 5px;
    border-radius: 3px;
    white-space: nowrap;
    border: 1px solid var(--line);
  }

  /* ---------- Route planner ---------- */
  .route-panel {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 40%;
    background: var(--panel);
    border-top: 1px solid var(--line);
    border-radius: 16px 16px 0 0;
    padding: 12px 16px calc(env(safe-area-inset-bottom, 0px) + 14px);
    display: flex;
    flex-direction: column;
    z-index: 900;
    box-shadow: 0 -4px 14px rgba(0,0,0,0.12);
  }
  .route-panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .route-scroll { overflow-y: auto; flex: 1; }
  .route-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px 4px 4px;
    border-top: 1px solid var(--line);
    margin-top: 6px;
  }
  .speed-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
    margin-top: 8px;
  }
  .speed-input {
    width: 64px;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 8px;
    font-size: 15px;
    color: var(--ink);
  }
  .watch-btn {
    background: var(--case);
    color: var(--panel-raised);
    padding: 13px 0;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .watch-btn.active { background: var(--storm); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }

  /* ---------- Bottom nav ---------- */
  .bottom-nav {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    display: flex;
    background: var(--case);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    flex-shrink: 0;
    z-index: 2000; /* must clear Leaflet's internal panes/controls (max ~1000) */
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 0 8px;
    color: rgba(241,239,228,0.55);
    font-size: 11px;
    letter-spacing: 0.03em;
    font-family: 'IBM Plex Mono', monospace;
  }
  .nav-btn.active { color: var(--panel-raised); }

  /* ---------- Sheet (location picker) ---------- */
  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(32,36,30,0.5);
    z-index: 2100;
    display: flex;
    align-items: flex-end;
  }
  .sheet {
    background: var(--panel);
    width: 100%;
    max-height: 82vh;
    border-radius: 18px 18px 0 0;
    padding: 10px 18px calc(env(safe-area-inset-bottom, 0px) + 20px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sheet-grip {
    width: 36px; height: 4px;
    background: var(--line);
    border-radius: 2px;
    margin: 6px auto 14px;
  }
  .sheet-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .sheet-title-row h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 600;
    margin: 0;
  }
  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 12px;
  }
  .search-box input {
    border: none;
    background: none;
    flex: 1;
    font-size: 15px;
    color: var(--ink);
  }
  .search-box input::placeholder { color: var(--ink-soft); }
  .sheet-scroll { overflow-y: auto; }
  .fav-row, .result-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 4px;
    border-bottom: 1px solid var(--line);
  }
  .fav-row:last-child, .result-row:last-child { border-bottom: none; }
  .fav-main, .result-main {
    display: flex;
    flex-direction: column;
    text-align: left;
    flex: 1;
  }
  .fav-main .name, .result-main .name { font-size: 15px; font-weight: 500; }
  .fav-main .sub, .result-main .sub { font-size: 12px; color: var(--ink-soft); font-family: 'IBM Plex Mono', monospace; }
  .fav-row.active .name { color: var(--accent); }
  .icon-btn { padding: 6px; color: var(--ink-soft); }
  .unit-toggle {
    display: flex;
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    margin-top: 4px;
  }
  .unit-toggle button {
    flex: 1;
    padding: 9px 0;
    font-size: 13px;
    font-weight: 500;
    background: var(--panel-raised);
    color: var(--ink-soft);
  }
  .unit-toggle button.active { background: var(--case); color: var(--panel-raised); }

  .empty-hint { font-size: 13px; color: var(--ink-soft); padding: 8px 4px 14px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ---------------------------------------------------------------------
   Icons — small line-style SVGs, kept consistent stroke weight
--------------------------------------------------------------------- */
const Icon = {
  Chevron: (p) => (

  Refresh: (p) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>

  ),
  Search: (p) => (
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>

      <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />

  Trash: (p) => (

  ),
  Plus: (p) => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" />
    </svg>
  ),
  Gauge: (p) => (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <path d="M12 3a9 9 0 1 0 9 9" /><path d="M12 12l4-4" /><path d="M12 3v2M21 12h-2M4.2 4.2l1.4 1.4" />
    </svg>
  ),
  Map: (p) => (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <polygon points="1 6 8 3 16 6 23 3 23 18 16 21 8 18 1 21" />
      <line x1="8" y1="3" x2="8" y2="18" /><line x1="16" y1="6" x2="16" y2="21" />
    </svg>
  ),
  Route: (p) => (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <circle cx="5" cy="6" r="2.3" /><circle cx="19" cy="18" r="2.3" />
      <path d="M7 7.5C10 10 8 13 11 15s5 1 8 3" strokeDasharray="1 3.4" />

  ),
  Target: (p) => (

      <circle cx="12" cy="12" r="9" /><circle cx="12" cy="12" r="4.5" /><circle cx="12" cy="12" r="0.8" fill="currentColor" />

  ArrowUp: (p) => (

      <line x1="12" y1="19" x2="12" y2="5" /><polyline points="6 11 12 5 18 11" />

      <line x1="5" y1="12" x2="19" y2="12" /><polyline points="13 6 19 12 13 18" />

  ),
  Alert: (p) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z" />
      <line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" />
    </svg>

};

/* ---------------------------------------------------------------------
   Seven-segment digit display — the LCD readout look
--------------------------------------------------------------------- */
const SEG_MAP = {
  '0': 'abcdef', '1': 'bc', '2': 'abged', '3': 'abgcd', '4': 'fgbc',
  '5': 'afgcd', '6': 'afgecd', '7': 'abc', '8': 'abcdefg', '9': 'abcdfg',
  ' ': '', '-': 'g',
};
const SEG_RECTS = {
  a: [6, 0, 16, 5], g: [6, 24.5, 16, 5], d: [6, 49, 16, 5],
  f: [0, 3, 5, 22], b: [23, 3, 5, 22], e: [0, 29, 5, 22], c: [23, 29, 5, 22],
};

function SevenSegDigit({ char, size = 30 }) {
  const on = new Set((SEG_MAP[char] || '').split(''));
  const w = size * 0.52;
  return (
    <svg width={w} height={size} viewBox="0 0 28 54" style={{ flexShrink: 0 }}>
      {Object.entries(SEG_RECTS).map(([key, [x, y, ww, hh]]) => (
        <rect key={key} x={x} y={y} width={ww} height={hh} rx="1.4"
          fill={on.has(key) ? 'var(--lcd-ink)' : 'var(--lcd-dim)'} />
      ))}
    </svg>
  );
}

function SevenSegDisplay({ value, size = 34 }) {
  const chars = String(value).split('');
  return (
    <div style={{ display: 'flex', gap: 3, alignItems: 'flex-end' }}>
      {chars.map((c, i) =>
        c === '.' ? (
          <div key={i} style={{ width: 7, display: 'flex', alignItems: 'flex-end', paddingBottom: size * 0.06 }}>
            <div style={{ width: 5, height: 5, borderRadius: '50%', background: 'var(--lcd-ink)' }} />
          </div>
        ) : (
          <SevenSegDigit key={i} char={c} size={size} />
        )
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   Helpers
--------------------------------------------------------------------- */
const KN_TO_MPH = 1.15078;
const ISOBAR_COLOR = '#4B5851';
const ISOBAR_COLOR_MAJOR = '#20241E';

function compassLabel(deg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

// Simplified 3-hour pressure tendency, loosely modelled on the classic
// ship's-barometer dial words rather than the full WMO synoptic code.
function classifyTrend(deltaHpa) {
  if (deltaHpa <= -3) return { label: 'Falling quickly', dir: 'down', storm: true };
  if (deltaHpa <= -1) return { label: 'Falling', dir: 'down', storm: false };
  if (deltaHpa < 1) return { label: 'Steady', dir: 'flat', storm: false };
  if (deltaHpa < 3) return { label: 'Rising', dir: 'up', storm: false };
  return { label: 'Rising quickly', dir: 'up', storm: false };
}

function moonPhase(date) {
  const synodic = 29.53058867;
  const knownNewMoon = Date.UTC(2000, 0, 6, 18, 14);
  const diffDays = (date.getTime() - knownNewMoon) / 86400000;
  const phase = ((diffDays % synodic) + synodic) % synodic;
  const frac = phase / synodic;
  const names = ['New Moon','Waxing Crescent','First Quarter','Waxing Gibbous','Full Moon','Waning Gibbous','Last Quarter','Waning Crescent'];
  const idx = Math.round(frac * 8) % 8;
  return { frac, name: names[idx] };
}

function relativeTime(date) {
  if (!date) return '—';
  const mins = Math.round((Date.now() - date.getTime()) / 60000);
  if (mins < 1) return 'just now';
  if (mins === 1) return '1 minute ago';
  if (mins < 60) return `${mins} minutes ago`;
  const hrs = Math.round(mins / 60);
  return hrs === 1 ? '1 hour ago' : `${hrs} hours ago`;
}

// Standard Beaufort scale, thresholds in knots.
function beaufort(knots) {
  const scale = [
    [1, 0, 'Calm'], [3, 1, 'Light air'], [6, 2, 'Light breeze'], [10, 3, 'Gentle breeze'],
    [16, 4, 'Moderate breeze'], [21, 5, 'Fresh breeze'], [27, 6, 'Strong breeze'],
    [33, 7, 'Near gale'], [40, 8, 'Gale'], [47, 9, 'Strong gale'],
    [55, 10, 'Storm'], [63, 11, 'Violent storm'], [Infinity, 12, 'Hurricane'],
  ];
  for (const [max, force, label] of scale) {
    if (knots < max) return { force, label };
  }
  return { force: 12, label: 'Hurricane' };
}

// Finds local peaks/troughs in a sea-level time series — an approximate
// high/low tide finder. This is model output, not an official harmonic
// tide-table prediction; treat timing as indicative, not precise.
function findTideExtrema(times, heights) {
  const extrema = [];
  for (let i = 1; i < heights.length - 1; i++) {
    if (heights[i] > heights[i - 1] && heights[i] > heights[i + 1]) extrema.push({ time: times[i], height: heights[i], type: 'high' });
    if (heights[i] < heights[i - 1] && heights[i] < heights[i + 1]) extrema.push({ time: times[i], height: heights[i], type: 'low' });
  }
  return extrema;
}

// Haversine great-circle distance in km, and initial compass bearing —
// verified against known reference points (London→Paris ≈ 344km) before use.
function haversineKm(lat1, lon1, lat2, lon2) {
  const toRad = (d) => (d * Math.PI) / 180;
  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function initialBearing(lat1, lon1, lat2, lon2) {
  const toRad = (d) => (d * Math.PI) / 180;
  const toDeg = (r) => (r * 180) / Math.PI;
  const y = Math.sin(toRad(lon2 - lon1)) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lon2 - lon1));
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

// --- Official UK/Ireland tide predictions (Admiralty / UKHO) --------------
// Proxied through our own backend, which holds the subscription key.
async function fetchTideStations() {
  const r = await fetch('/api/tide-stations');
  if (!r.ok) throw new Error('tide station fetch failed');
  return r.json();
}
async function fetchTideEvents(stationId) {
  const r = await fetch(`/api/tide-events/${encodeURIComponent(stationId)}`);
  if (!r.ok) throw new Error('tide events fetch failed');
  return r.json();

// The Stations endpoint's exact wrapper shape isn't fully pinned down from
// docs alone, so this accepts either a bare array of GeoJSON Features or a
// FeatureCollection.
function parseStationList(data) {
  const features = Array.isArray(data) ? data : (data && Array.isArray(data.features)) ? data.features : [];
  return features
    .map((f) => ({
      id: f.properties && f.properties.Id,
      name: f.properties && f.properties.Name,
      lon: f.geometry && f.geometry.coordinates && f.geometry.coordinates[0],
      lat: f.geometry && f.geometry.coordinates && f.geometry.coordinates[1],
    }))
    .filter((s) => s.id && typeof s.lat === 'number' && typeof s.lon === 'number');
}

function nearestStation(stations, lat, lon, maxKm) {
  let best = null, bestDist = Infinity;
  for (const s of stations) {
    const d = haversineKm(lat, lon, s.lat, s.lon);
    if (d < bestDist) { bestDist = d; best = s; }
  }
  return best && bestDist <= maxKm ? { ...best, distanceKm: bestDist } : null;
}

// Admiralty's TidalEvents always returns GMT with no timezone suffix, even
// in summer (confirmed in their FAQ: "Is British Summer Time applied to
// predictions? No.") — force UTC parsing so it converts to the viewer's
// real local time correctly year-round instead of being read as a naive
// local timestamp and landing an hour off during BST.
function parseAdmiraltyTime(dateTimeStr) {
  return new Date(dateTimeStr.endsWith('Z') ? dateTimeStr : dateTimeStr + 'Z');
}

// Builds a coarse lat/lon grid around a center point, synoptic-scale
// (roughly continent-wide) so isobar curvature is actually visible.
function buildGrid(centerLat, centerLon) {
  const cols = 10, rows = 8;
  const latSpan = 9, lonSpan = 14;
  const lats = Array.from({ length: rows }, (_, r) => centerLat + latSpan - (2 * latSpan * r) / (rows - 1));
  const lons = Array.from({ length: cols }, (_, c) => centerLon - lonSpan + (2 * lonSpan * c) / (cols - 1));
  return { cols, rows, lats, lons };
}

// Open-Meteo supports batched multi-location requests via comma-separated
// coordinate lists, so the whole grid comes back in a single call.
async function fetchPressureGrid(centerLat, centerLon) {
  const grid = buildGrid(centerLat, centerLon);
  const latList = [], lonList = [];
  for (let r = 0; r < grid.rows; r++) {
    for (let c = 0; c < grid.cols; c++) {
      latList.push(grid.lats[r].toFixed(2));
      lonList.push(grid.lons[c].toFixed(2));
    }
  }
  const params = new URLSearchParams({
    latitude: latList.join(','),
    longitude: lonList.join(','),
    current: 'pressure_msl',
  });
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
  if (!r.ok) throw new Error('grid fetch failed');
  const data = await r.json();
  const arr = Array.isArray(data) ? data : [data];
  const valid = arr.map((d) => d && d.current && d.current.pressure_msl).filter((v) => typeof v === 'number');
  const mean = valid.length ? valid.reduce((a, b) => a + b, 0) / valid.length : 1013;
  const values = arr.map((d) => {
    const v = d && d.current && d.current.pressure_msl;
    return typeof v === 'number' ? v : mean;
  });
  return { grid, values };
}

function computeContours(grid, values) {
  const min = Math.min(...values), max = Math.max(...values);
  const lo = Math.floor(min / 4) * 4, hi = Math.ceil(max / 4) * 4;
  const thresholds = [];
  for (let v = lo; v <= hi; v += 4) thresholds.push(v);
  if (thresholds.length < 2) return [];
  const gen = d3.contours().size([grid.cols, grid.rows]).thresholds(thresholds);
  return gen(values);
}

function gridToLatLng(gx, gy, grid) {
  const lon = grid.lons[0] + (gx / (grid.cols - 1)) * (grid.lons[grid.cols - 1] - grid.lons[0]);
  const lat = grid.lats[0] + (gy / (grid.rows - 1)) * (grid.lats[grid.rows - 1] - grid.lats[0]);
  return [lat, lon];
}

/* ---------------------------------------------------------------------
   Dial — steel-and-glass instrument gauge (analog half of the fascia)
--------------------------------------------------------------------- */
function Dial({ pressure }) {
  const size = 240;
  const cx = size / 2, cy = size / 2;
  const r = 100;
  const min = 960, max = 1050;
  const startDeg = 135, endDeg = 405;

  const toDeg = (val) => {
    const clamped = Math.max(min, Math.min(max, val));
    return startDeg + (endDeg - startDeg) * ((clamped - min) / (max - min));
  };
  const polar = (deg, radius) => {
    const rad = (deg * Math.PI) / 180;
    return [cx + radius * Math.cos(rad), cy + radius * Math.sin(rad)];
  };

  const majorTicks = [];
  for (let v = min; v <= max; v += 10) {
    const deg = toDeg(v);
    const [x1, y1] = polar(deg, r - 4);
    const [x2, y2] = polar(deg, r - 15);
    const [lx, ly] = polar(deg, r - 28);
    majorTicks.push(
      <g key={v}>
        <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="var(--ink)" strokeWidth="1.6" />
        <text x={lx} y={ly + 4} fontSize="9.5" textAnchor="middle" fill="var(--ink-soft)" className="mono">{v}</text>
      </g>
    );
  }
  const minorTicks = [];
  for (let v = min; v <= max; v += 2) {
    if (v % 10 === 0) continue;
    const deg = toDeg(v);
    const [x1, y1] = polar(deg, r - 4);
    const [x2, y2] = polar(deg, r - 9);
    minorTicks.push(<line key={v} x1={x1} y1={y1} x2={x2} y2={y2} stroke="var(--ink-soft)" strokeWidth="1" opacity="0.6" />);
  }

  const needleDeg = pressure != null ? toDeg(pressure) : toDeg(1013);
  const [nx, ny] = polar(needleDeg, r - 20);

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <defs>
        <radialGradient id="bezel" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stopColor="#9BA69D" />
          <stop offset="55%" stopColor="#6C7A70" />
          <stop offset="100%" stopColor="#43504A" />
        </radialGradient>
      </defs>
      <circle cx={cx} cy={cy} r={r + 13} fill="url(#bezel)" />
      <circle cx={cx} cy={cy} r={r} fill="var(--panel-raised)" />
      {minorTicks}
      {majorTicks}
      <line x1={cx} y1={cy} x2={nx} y2={ny} stroke="var(--storm)" strokeWidth="2.6" strokeLinecap="round" />
      <circle cx={cx} cy={cy} r="6" fill="var(--case)" />
    </svg>
  );
}

function Sparkline({ values }) {
  if (!values || values.length < 2) return null;
  const w = 280, h = 60, pad = 6;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const pts = values.map((v, i) => {
    const x = pad + (i / (values.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return [x, y];
  });
  const line = pts.map((p) => p.join(',')).join(' ');
  const area = `${pad},${h - pad} ` + line + ` ${w - pad},${h - pad}`;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <polygon points={area} fill="var(--case)" opacity="0.08" />
      <polyline points={line} fill="none" stroke="var(--case)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function WindCompass({ deg }) {
  const size = 50, cx = size / 2, cy = size / 2, r = 20;
  const rad = ((deg + 180) * Math.PI) / 180;
  const tipX = cx + r * Math.sin(rad), tipY = cy - r * Math.cos(rad);
  const tailX = cx - r * 0.6 * Math.sin(rad), tailY = cy + r * 0.6 * Math.cos(rad);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--line)" strokeWidth="1.5" />
      <text x={cx} y="9" fontSize="7" textAnchor="middle" fill="var(--ink-soft)">N</text>
      <line x1={tailX} y1={tailY} x2={tipX} y2={tipY} stroke="var(--storm)" strokeWidth="2.4" strokeLinecap="round" />
      <circle cx={tipX} cy={tipY} r="2.3" fill="var(--storm)" />
    </svg>
  );
}

function MoonGlyph({ frac }) {
  const size = 26, r = 11, cx = size / 2, cy = size / 2;
  const shift = (frac <= 0.5 ? (0.5 - frac) : (frac - 0.5)) * 4 * r;
  const rx = Math.max(0.001, r - shift);
  const lit = frac <= 0.5;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
      <circle cx={cx} cy={cy} r={r} fill="var(--ink)" opacity="0.85" />
      <clipPath id="moonclip"><circle cx={cx} cy={cy} r={r} /></clipPath>
      <g clipPath="url(#moonclip)">
        <ellipse cx={lit ? cx + (r - shift) : cx - (r - shift)} cy={cy} rx={rx} ry={r} fill="var(--panel-raised)" />
      </g>
    </svg>
  );
}

/* ---------------------------------------------------------------------
   Location sheet
--------------------------------------------------------------------- */
function LocationSheet({ state, setState, onClose }) {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const debounceRef = useRef(null);

  useEffect(() => {
    clearTimeout(debounceRef.current);
    if (query.trim().length < 2) { setResults([]); return; }
    debounceRef.current = setTimeout(async () => {
      setSearching(true);
      try {
        const r = await geocode(query.trim());
        setResults(r);
      } catch {
        setResults([]);
      } finally {
        setSearching(false);
      }
    }, 400);
    return () => clearTimeout(debounceRef.current);
  }, [query]);

  function persist(next) {
    setState(next);
    saveState(next);
  }

  function selectFavorite(id) {
    persist({ ...state, activeLocationId: id });
    onClose();
  }

  function addResult(res) {
    const id = `loc_${Date.now()}`;
    const label = [res.name, res.admin1, res.country].filter(Boolean).slice(0, 2).join(', ');
    const loc = { id, label, lat: res.latitude, lon: res.longitude, timezone: res.timezone || 'auto' };
    const next = { ...state, locations: [...state.locations, loc], activeLocationId: id };
    persist(next);
    setQuery('');
    setResults([]);
    onClose();
  }

  function removeFavorite(id) {
    if (state.locations.length <= 1) return;
    const remaining = state.locations.filter((l) => l.id !== id);
    const nextActive = state.activeLocationId === id ? remaining[0].id : state.activeLocationId;
    persist({ ...state, locations: remaining, activeLocationId: nextActive });
  }

  function setWindUnit(unit) {
    persist({ ...state, windUnit: unit });
  }

  return (
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheet-grip" />
        <div className="sheet-title-row">
          <h2>Locations</h2>
          <button className="icon-btn" onClick={onClose} aria-label="Close"><Icon.Close /></button>
        </div>
        <div className="search-box">
          <Icon.Search style={{ color: 'var(--ink-soft)' }} />
          <input
            placeholder="Search for a city"
            value={query}
            onChange={(e) => setQuery(e.target.value)}
          />
        </div>
        <div className="sheet-scroll">
          {results.length > 0 && (
            <div style={{ marginBottom: 14 }}>
              {results.map((res) => (
                <div className="result-row" key={`${res.latitude}-${res.longitude}`}>
                  <div className="result-main">
                    <span className="name">{res.name}</span>
                    <span className="sub">{[res.admin1, res.country].filter(Boolean).join(', ')}</span>
                  </div>
                  <button className="icon-btn" onClick={() => addResult(res)} aria-label="Add location"><Icon.Plus /></button>
                </div>
              ))}
            </div>
          )}
          {searching && <div className="empty-hint">Searching…</div>}

          {state.locations.map((loc) => (
            <div className={`fav-row ${loc.id === state.activeLocationId ? 'active' : ''}`} key={loc.id}>
              <button className="fav-main" onClick={() => selectFavorite(loc.id)}>
                <span className="name">{loc.label}</span>
                <span className="sub">{loc.lat.toFixed(2)}, {loc.lon.toFixed(2)}</span>
              </button>
              {state.locations.length > 1 && (
                <button className="icon-btn" onClick={() => removeFavorite(loc.id)} aria-label="Remove"><Icon.Trash /></button>
              )}
            </div>
          ))}

          <div className="card-label" style={{ marginTop: 18 }}>Wind unit</div>
          <div className="unit-toggle">
            <button className={state.windUnit === 'kn' ? 'active' : ''} onClick={() => setWindUnit('kn')}>Knots</button>
            <button className={state.windUnit === 'mph' ? 'active' : ''} onClick={() => setWindUnit('mph')}>mph</button>
          </div>
        </div>
      </div>
    </div>
  );
}

   Gauge view
--------------------------------------------------------------------- */
/* ---------------------------------------------------------------------
   Tide section — official Admiralty/UKHO data for UK & Ireland where a
   station is close enough to trust, modeled Open-Meteo curve everywhere
   else. Nothing here is cached beyond the current session, per the
   Discovery tier's terms.
--------------------------------------------------------------------- */
const TIDE_STATION_MAX_KM = 40;

function TideSection({ location, tideStations, marine, currentTime }) {
  const [events, setEvents] = useState(null);
  const [loadError, setLoadError] = useState(false);

  const station = useMemo(() => {
    if (!location || !tideStations || tideStations.length === 0) return null;
    return nearestStation(tideStations, location.lat, location.lon, TIDE_STATION_MAX_KM);
  }, [location, tideStations]);

  useEffect(() => {
    if (!station) { setEvents(null); return; }
    setLoadError(false);
    fetchTideEvents(station.id).then(setEvents).catch(() => setLoadError(true));
  }, [station]);

  // Official data available and loaded — this takes priority.
  if (station && events) {
    const now = Date.now();
    const upcoming = events
      .filter((e) => parseAdmiraltyTime(e.DateTime).getTime() > now)
      .slice(0, 3);
    return (
      <div className="card">
        <div className="card-label">Tide — {station.name} (Official, UKHO)</div>
        {upcoming.length === 0 ? (
          <p className="empty-hint" style={{ padding: 0 }}>No upcoming events in range.</p>
        ) : (
          upcoming.map((e, i) => (
            <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderTop: i > 0 ? '1px solid var(--line)' : 'none' }}>
              <span style={{ fontSize: 14 }}>{e.EventType === 'HighWater' ? 'High Water' : 'Low Water'}</span>
              <span className="mono" style={{ fontSize: 14 }}>
                {parseAdmiraltyTime(e.DateTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })} · {e.Height.toFixed(1)} m
              </span>
            </div>
          ))
        )}
        <div style={{ fontSize: 10, color: 'var(--ink-soft)', marginTop: 10, fontFamily: "'IBM Plex Mono', monospace" }}>
          Contains ADMIRALTY® tidal data: © Crown copyright and database right
        </div>
      </div>
    );
  }

  if (station && loadError) {
    return <div className="empty-hint" style={{ margin: '0 18px 14px' }}>Couldn't load official tide data for {station.name} right now.</div>;
  }

  // Fallback: modeled sea-level curve from Open-Meteo, wherever there's no
  // nearby Admiralty station (outside UK/Ireland, or no key configured).
  const hasTide = marine && marine.hourly && Array.isArray(marine.hourly.sea_level_height_msl);
  if (!hasTide) return null;

  const tTimes = marine.hourly.time;
  const tHeights = marine.hourly.sea_level_height_msl;
  let tIdx = tTimes.indexOf(currentTime);
  if (tIdx === -1) tIdx = Math.min(tTimes.length - 1, Math.floor(tTimes.length / 2));
  const tideNow = tHeights[tIdx];
  const tPrev = tHeights[Math.max(0, tIdx - 1)];
  const tideTrend = tideNow > tPrev ? 'rising' : tideNow < tPrev ? 'falling' : 'steady';
  const extrema = findTideExtrema(tTimes, tHeights);
  const nextExtreme = extrema.find((e) => tTimes.indexOf(e.time) > tIdx) || null;
  const tideStart = Math.max(0, tIdx - 12);
  const tideHistory = tHeights.slice(tideStart, tIdx + 13);

  return (
    <div className="card">
      <div className="card-label">Tide (modeled — not an official tide table)</div>
      <Sparkline values={tideHistory} />
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8, fontSize: 13, color: 'var(--ink-soft)' }}>
        <span>{tideNow != null ? `${tideNow.toFixed(1)} m, ${tideTrend}` : '—'}</span>
        <span>
          {nextExtreme ? `Next ${nextExtreme.type}: ${new Date(nextExtreme.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}` : ''}
        </span>
      </div>
    </div>
  );
}

function GaugeView({ weather, marine, windUnit, location, tideStations }) {
  if (!weather) {
    return <div className="view"><p className="empty-hint" style={{ padding: 24 }}>Loading conditions…</p></div>;
  }

  const cur = weather.current;
  const hourly = weather.hourly;
  const times = hourly.time;
  const nowIso = cur.time;
  let nowIdx = times.indexOf(nowIso);
  if (nowIdx === -1) nowIdx = times.length - 1;
  const prevIdx = Math.max(0, nowIdx - 3);
  const delta = hourly.pressure_msl[nowIdx] - hourly.pressure_msl[prevIdx];
  const trend = classifyTrend(delta);

  const historyStart = Math.max(0, nowIdx - 24);
  const historyValues = hourly.pressure_msl.slice(historyStart, nowIdx + 1);

  const windKn = cur.wind_speed_10m;
  const windDisplay = windUnit === 'mph' ? Math.round(windKn * KN_TO_MPH) : Math.round(windKn);
  const windUnitLabel = windUnit === 'mph' ? 'MPH' : 'KN';

  let uvNow = null;
  if (hourly.uv_index && hourly.uv_index[nowIdx] != null) uvNow = hourly.uv_index[nowIdx];

  const moon = moonPhase(new Date());
  const bf = beaufort(windKn);

  // Marine data only exists for coastal/sea coordinates — inland lakes and
  // rivers return null for these fields, so every marine section below is
  // conditional on actually having a number to show.
  const mcur = marine && marine.current;
  const hasWave = mcur && typeof mcur.wave_height === 'number';

  return (
    <div className="view">
      <div className="dial-wrap">
        <Dial pressure={cur.pressure_msl} />
        <div className={`trend-row ${trend.dir === 'down' ? 'falling' : ''}`}>
          {trend.dir === 'up' && <Icon.ArrowUp className="arrow" />}
          {trend.dir === 'down' && <Icon.ArrowDown className="arrow" />}
          {trend.dir === 'flat' && <Icon.ArrowRight className="arrow" />}
          <span>{trend.label} · {delta >= 0 ? '+' : ''}{delta.toFixed(1)} hPa / 3h</span>
        </div>
      </div>

      <div className="lcd-panel">
        <div className="lcd-screw" style={{ top: 8, left: 8 }} />
        <div className="lcd-screw" style={{ top: 8, right: 8 }} />
        <div className="lcd-screw" style={{ bottom: 8, left: 8 }} />
        <div className="lcd-screw" style={{ bottom: 8, right: 8 }} />
        <div className="lcd-label">PRESSURE</div>
        <div className="lcd-glass">
          <SevenSegDisplay value={cur.pressure_msl.toFixed(0)} size={44} />
          <span className="lcd-unit">hPa</span>
        </div>
      </div>

      <div className="card">
        <div className="card-label">Last 24 hours</div>
        <Sparkline values={historyValues} />
      </div>

      <Section title="Conditions" defaultOpen={true}>
        <div className="stat">
          <span className="label">TEMPERATURE</span>
          <span className="value mono">{cur.temperature_2m.toFixed(0)}°C</span>
        </div>
        <div className="stat">
          <span className="label">FEELS LIKE</span>
          <span className="value mono">{cur.apparent_temperature.toFixed(0)}°C</span>
        </div>
        <div className="stat">
          <span className="label">HUMIDITY</span>
          <span className="value mono">{cur.relative_humidity_2m.toFixed(0)}%</span>
        </div>
        <div className="stat">
          <span className="label">UV INDEX</span>
          <span className="value mono">{uvNow != null ? uvNow.toFixed(1) : '—'}</span>
        </div>

        <div className="wind-block">
          <WindCompass deg={cur.wind_direction_10m} />
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 10 }}>
            <div>
              <div className="stat" style={{ marginBottom: 4 }}>
                <span className="label">WIND, FROM {compassLabel(cur.wind_direction_10m)}</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6 }}>
                <SevenSegDigit char={String(windDisplay).padStart(2,'0')[0]} size={22} />
                <SevenSegDigit char={String(windDisplay).padStart(2,'0')[1]} size={22} />
                <span className="lcd-unit" style={{ color: 'var(--ink-soft)', fontSize: 11 }}>{windUnitLabel}</span>
              </div>
              <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 4, fontFamily: "'IBM Plex Mono', monospace" }}>
                FORCE {bf.force} · {bf.label.toUpperCase()}
              </div>
            </div>
          </div>
        </div>

        <div className="moon-block">
          <MoonGlyph frac={moon.frac} />
          <div className="stat">
            <span className="label">MOON</span>
            <span className="value">{moon.name}</span>
          </div>
        </div>
      </Section>

      {hasWave ? (
        <Section title="Sea Conditions" defaultOpen={true}>
          <div className="stat">
            <span className="label">WAVE HEIGHT</span>
            <span className="value mono">{mcur.wave_height.toFixed(1)} m</span>
          </div>
          <div className="stat">
            <span className="label">WAVE PERIOD</span>
            <span className="value mono">{mcur.wave_period != null ? mcur.wave_period.toFixed(0) + ' s' : '—'}</span>
          </div>
          <div className="stat">
            <span className="label">SWELL</span>
            <span className="value mono">
              {mcur.swell_wave_height != null ? mcur.swell_wave_height.toFixed(1) + ' m' : '—'}
              {mcur.swell_wave_direction != null ? ` from ${compassLabel(mcur.swell_wave_direction)}` : ''}
            </span>
          </div>
          <div className="stat">
            <span className="label">WATER TEMP</span>
            <span className="value mono">{mcur.sea_surface_temperature != null ? mcur.sea_surface_temperature.toFixed(0) + '°C' : '—'}</span>
          </div>
        </Section>
      ) : (
        <div className="empty-hint" style={{ margin: '0 18px 14px' }}>
          No sea/wave data at this location — marine forecasts only cover coastal and open water, not inland lakes or rivers.
        </div>
      )}

      <TideSection location={location} tideStations={tideStations} marine={marine} currentTime={cur.time} />
    </div>
  );
}

/* ---------------------------------------------------------------------
   Map view — computed isobar contours over an OSM base layer
--------------------------------------------------------------------- */
function MapView({ location }) {
  const mapRef = useRef(null);
  const leafletRef = useRef(null);
  const contourLayerRef = useRef(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(false);

  const loadIsobars = useCallback(async () => {
    if (!location || !leafletRef.current) return;
    setLoading(true);
    setError(false);
    try {
      const { grid, values } = await fetchPressureGrid(location.lat, location.lon);
      const contours = computeContours(grid, values);
      if (contourLayerRef.current) {
        leafletRef.current.removeLayer(contourLayerRef.current);
      }
      const layerGroup = L.layerGroup();
      contours.forEach((c) => {
        let labeled = false;
        const isMajor = c.value % 20 === 0;
        c.coordinates.forEach((polygon) => {
          polygon.forEach((ring) => {
            const latlngs = ring.map(([gx, gy]) => gridToLatLng(gx, gy, grid));
            L.polyline(latlngs, {
              color: isMajor ? ISOBAR_COLOR_MAJOR : ISOBAR_COLOR,
              weight: isMajor ? 2.2 : 1.1,
              opacity: 0.75,
            }).addTo(layerGroup);
            if (!labeled && latlngs.length > 4) {
              const mid = latlngs[Math.floor(latlngs.length / 2)];
              L.marker(mid, {
                icon: L.divIcon({ className: 'isobar-label', html: String(c.value), iconSize: [30, 14] }),
                interactive: false,
              }).addTo(layerGroup);
              labeled = true;
            }
          });
        });
      });
      layerGroup.addTo(leafletRef.current);
      contourLayerRef.current = layerGroup;
    } catch {
      setError(true);
    } finally {
      setLoading(false);
    }
  }, [location]);

  useEffect(() => {
    if (!location || leafletRef.current) return;
    const map = L.map(mapRef.current, { zoomControl: true }).setView([location.lat, location.lon], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 12,
    }).addTo(map);
    L.marker([location.lat, location.lon]).addTo(map);
    leafletRef.current = map;
    loadIsobars();
  }, [location, loadIsobars]);

  useEffect(() => {
    if (leafletRef.current && location) {
      leafletRef.current.setView([location.lat, location.lon], leafletRef.current.getZoom());
      loadIsobars();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [location]);

  return (
    <div className="view map-view">
      <div id="map" ref={mapRef}></div>
      {loading && <div className="map-status">Loading isobars…</div>}
      {error && <div className="map-status">Couldn't load isobars right now</div>}
    </div>
  );
}

/* ---------------------------------------------------------------------
   Route view — tap the map to add waypoints; distance/bearing per leg,
   and a drift-adjusted ETA using ocean current where it's available.
   Routes are session-only (not saved) in this version.
--------------------------------------------------------------------- */
const KN_TO_KMH = 1.852;

function RouteView({ location, marine, windUnit }) {
  const mapRef = useRef(null);
  const leafletRef = useRef(null);
  const layerRef = useRef(null);
  const [waypoints, setWaypoints] = useState([]);
  const [plannedSpeed, setPlannedSpeed] = useState(3);

  useEffect(() => {
    if (!location || leafletRef.current) return;
    const map = L.map(mapRef.current, { zoomControl: true }).setView([location.lat, location.lon], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 18,
    }).addTo(map);
    map.on('click', (e) => {
      setWaypoints((wp) => [...wp, { lat: e.latlng.lat, lon: e.latlng.lng }]);
    });
    leafletRef.current = map;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [location]);

  useEffect(() => {
    if (!leafletRef.current) return;
    if (layerRef.current) leafletRef.current.removeLayer(layerRef.current);
    const group = L.layerGroup();
    waypoints.forEach((wp, i) => {
      L.marker([wp.lat, wp.lon], {
        icon: L.divIcon({ className: 'isobar-label', html: String(i + 1), iconSize: [22, 22] }),
      }).addTo(group);
    });
    if (waypoints.length > 1) {
      L.polyline(waypoints.map((w) => [w.lat, w.lon]), { color: '#20241E', weight: 2.5, dashArray: '6 5' }).addTo(group);
    }
    group.addTo(leafletRef.current);
    layerRef.current = group;
  }, [waypoints]);

  const legs = [];
  for (let i = 0; i < waypoints.length - 1; i++) {
    const a = waypoints[i], b = waypoints[i + 1];
    legs.push({
      distanceKm: haversineKm(a.lat, a.lon, b.lat, b.lon),
      bearing: initialBearing(a.lat, a.lon, b.lat, b.lon),
    });
  }
  const totalKm = legs.reduce((s, l) => s + l.distanceKm, 0);

  const hasCurrent = marine && marine.current && typeof marine.current.ocean_current_velocity === 'number';
  const currentKn = hasCurrent ? marine.current.ocean_current_velocity : 0;
  // Ocean current direction is the direction the water flows TOWARD
  // (opposite convention to wind, which is reported as the direction it
  // blows FROM) — worth sanity-checking against a local current chart
  // before relying on this for real route timing.
  const currentDir = hasCurrent ? marine.current.ocean_current_direction : 0;
  const plannedSpeedKn = windUnit === 'mph' ? plannedSpeed / KN_TO_MPH : plannedSpeed;

  let totalHours = 0, unreachable = false;
  legs.forEach((leg) => {
    const along = hasCurrent ? currentKn * Math.cos(((currentDir - leg.bearing) * Math.PI) / 180) : 0;
    const effectiveKn = plannedSpeedKn + along;
    if (effectiveKn <= 0.05) { unreachable = true; return; }
    totalHours += leg.distanceKm / (effectiveKn * KN_TO_KMH);
  });

  function formatDuration(hours) {
    const h = Math.floor(hours);
    const m = Math.round((hours - h) * 60);
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
  }

  return (
    <div className="view map-view">
      <div id="map" ref={mapRef} style={{ bottom: '40%' }}></div>
      <div className="route-panel">
        <div className="route-panel-head">
          <span className="card-label" style={{ margin: 0 }}>Route ({waypoints.length} point{waypoints.length === 1 ? '' : 's'})</span>
          <button className="icon-btn" onClick={() => setWaypoints([])} aria-label="Clear route"><Icon.Trash /></button>
        </div>
        {waypoints.length < 2 ? (
          <p className="empty-hint">Tap the map to drop waypoints and build a route.</p>
        ) : (
          <div className="route-scroll">
            {legs.map((leg, i) => (
              <div className="fav-row" key={i}>
                <div className="fav-main">
                  <span className="name">Leg {i + 1} → {i + 2}</span>
                  <span className="sub">{leg.distanceKm.toFixed(2)} km · bearing {leg.bearing.toFixed(0)}°</span>
                </div>
              </div>
            ))}
            <div className="route-summary">
              <div className="stat">
                <span className="label">TOTAL DISTANCE</span>
                <span className="value mono">{totalKm.toFixed(2)} km</span>
              </div>
              <div className="stat">
                <span className="label">EST. TIME{hasCurrent ? ' (CURRENT-ADJUSTED)' : ''}</span>
                <span className="value mono">{unreachable ? 'Current opposes travel' : formatDuration(totalHours)}</span>
              </div>
            </div>
            {!hasCurrent && (
              <div className="empty-hint" style={{ padding: '4px 4px 0' }}>No ocean current data here — time estimate uses planned speed only.</div>
            )}
          </div>
        )}
        <div className="speed-row">
          <span className="card-label" style={{ margin: 0 }}>Planned speed</span>
          <input
            type="number"
            className="speed-input mono"
            value={plannedSpeed}
            min="0.1"
            step="0.1"
            onChange={(e) => setPlannedSpeed(Math.max(0.1, Number(e.target.value) || 0))}
          />
          <span className="lcd-unit" style={{ color: 'var(--ink-soft)', fontSize: 12 }}>{windUnit === 'mph' ? 'MPH' : 'KN'}</span>
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------------
   Drift view — GPS drift-from-anchor alert for a rest stop or a swim
   entry point. Read the safety note before relying on this on the water.
--------------------------------------------------------------------- */
function DriftView() {
  const [watching, setWatching] = useState(false);
  const [anchor, setAnchor] = useState(null);
  const [distance, setDistance] = useState(null);
  const [threshold, setThreshold] = useState(50);
  const [alarm, setAlarm] = useState(false);
  const [error, setError] = useState(null);
  const watchIdRef = useRef(null);
  const wakeLockRef = useRef(null);
  const audioCtxRef = useRef(null);
  const beepIntervalRef = useRef(null);

  function beepOnce() {
    try {
      const ctx = audioCtxRef.current;
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.3);
    } catch {}
  }

  function startAlarmSound() {
    if (beepIntervalRef.current) return;
    beepOnce();
    beepIntervalRef.current = setInterval(beepOnce, 700);
  }
  function stopAlarmSound() {
    if (beepIntervalRef.current) {
      clearInterval(beepIntervalRef.current);
      beepIntervalRef.current = null;
    }
  }

  async function startWatch() {
    setError(null);
    if (!('geolocation' in navigator)) {
      setError('Geolocation is not available in this browser.');
      return;
    }
    try {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      audioCtxRef.current = new AudioContextClass();
      if (audioCtxRef.current.state === 'suspended') await audioCtxRef.current.resume();
    } catch {}

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const a = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        setAnchor(a);
        setDistance(0);
        setWatching(true);
        try {
          if ('wakeLock' in navigator) {
            wakeLockRef.current = await navigator.wakeLock.request('screen');
          }
        } catch {}
        watchIdRef.current = navigator.geolocation.watchPosition(
          (p) => {
            const d = haversineKm(a.lat, a.lon, p.coords.latitude, p.coords.longitude) * 1000;
            setDistance(d);
            setAlarm((wasAlarm) => {
              const isAlarm = d > threshold;
              if (isAlarm && !wasAlarm) startAlarmSound();
              if (!isAlarm && wasAlarm) stopAlarmSound();
              return isAlarm;
            });
          },
          () => setError('Lost GPS signal — position updates stopped.'),
          { enableHighAccuracy: true, maximumAge: 5000 }
        );
      },
      () => setError('Location permission denied or unavailable.'),
      { enableHighAccuracy: true }
    );
  }

  function stopWatch() {
    if (watchIdRef.current != null) navigator.geolocation.clearWatch(watchIdRef.current);
    watchIdRef.current = null;
    if (wakeLockRef.current) { wakeLockRef.current.release().catch(() => {}); wakeLockRef.current = null; }
    stopAlarmSound();
    setWatching(false);
    setAlarm(false);
    setAnchor(null);
    setDistance(null);
  }

  useEffect(() => () => stopWatch(), []);

  const distDigits = distance != null ? String(Math.min(9999, Math.round(distance))).padStart(4, '0') : '----';

  return (
    <div className="view">
      <div className="dial-wrap" style={{ paddingTop: 22 }}>
        <div className="lcd-panel" style={{ margin: 0, width: '100%', maxWidth: 320 }}>
          <div className="lcd-screw" style={{ top: 8, left: 8 }} />
          <div className="lcd-screw" style={{ top: 8, right: 8 }} />
          <div className="lcd-screw" style={{ bottom: 8, left: 8 }} />
          <div className="lcd-screw" style={{ bottom: 8, right: 8 }} />
          <div className="lcd-label">DISTANCE FROM START</div>
          <div className="lcd-glass">
            <SevenSegDisplay value={distDigits} size={40} />
            <span className="lcd-unit">m</span>
          </div>
        </div>

        {alarm && (
          <div className="storm-banner" style={{ marginTop: 16, borderRadius: 12, animation: 'pulse 1s infinite' }}>
            <Icon.Alert />
            <span>Drifted past {threshold}m from your start point.</span>
          </div>
        )}
        {error && (
          <div className="empty-hint" style={{ marginTop: 14, textAlign: 'center' }}>{error}</div>
        )}

        <div className="speed-row" style={{ marginTop: 20, width: '100%', maxWidth: 320 }}>
          <span className="card-label" style={{ margin: 0 }}>Alert radius</span>
          <input
            type="number"
            className="speed-input mono"
            value={threshold}
            min="5"
            step="5"
            disabled={watching}
            onChange={(e) => setThreshold(Math.max(5, Number(e.target.value) || 5))}
          />
          <span className="lcd-unit" style={{ color: 'var(--ink-soft)', fontSize: 12 }}>M</span>
        </div>

        <button
          className={`watch-btn ${watching ? 'active' : ''}`}
          style={{ marginTop: 16, width: '100%', maxWidth: 320 }}
          onClick={watching ? stopWatch : startWatch}
        >
          {watching ? 'Stop Watch' : 'Start Watch'}
        </button>

        <div className="card" style={{ width: '100%', maxWidth: 320, boxSizing: 'border-box' }}>
          <div className="card-label">Before you rely on this</div>
          <p style={{ fontSize: 13, color: 'var(--ink-soft)', margin: 0, lineHeight: 1.5 }}>
            This only works while the app is open on screen with your phone unlocked — iOS suspends web apps
            in the background, so it will not wake a locked phone in a pocket or dry bag. Keep the screen on
            and check Settings → Privacy → Location Services → Safari is set to "Precise" for an accurate
            radius.
          </p>
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------------
   App root
--------------------------------------------------------------------- */
function App() {
  const [state, setState] = useState(null);
  const [weather, setWeather] = useState(null);
  const [marine, setMarine] = useState(null);
  const [tideStations, setTideStations] = useState([]);
  const [tab, setTab] = useState('gauge');
  const [sheetOpen, setSheetOpen] = useState(false);
  const [lastFetchedAt, setLastFetchedAt] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [, setTick] = useState(0);

  // Fetch the Admiralty station list once — it's metadata (names/locations),
  // barely ever changes, and the backend caches it too. If no Admiralty key
  // is configured server-side, this just fails quietly and every location
  // falls back to the modeled tide curve.
  useEffect(() => {
    fetchTideStations().then((data) => setTideStations(parseStationList(data))).catch(() => {});
  }, []);

  // Force-reload on new deploy
  useEffect(() => {
    fetchVersion().then((version) => {
      const cached = localStorage.getItem('buildVersion');
      if (cached && cached !== version) {
        localStorage.setItem('buildVersion', version);
        window.location.reload();
      } else {
        localStorage.setItem('buildVersion', version);
      }
    }).catch(() => {});
  }, []);

  useEffect(() => {
    fetchState().then(setState).catch(() => setState({ locations: [], activeLocationId: null, windUnit: 'kn' }));
  }, []);

  // Keep the "X minutes ago" text live without waiting for a data refresh
  useEffect(() => {
    const id = setInterval(() => setTick((t) => t + 1), 60000);
    return () => clearInterval(id);
  }, []);

  const activeLocation = useMemo(() => {
    if (!state) return null;
    return state.locations.find((l) => l.id === state.activeLocationId) || state.locations[0] || null;
  }, [state]);

  const loadWeather = useCallback(async (isManual) => {
    if (!activeLocation) return;
    if (isManual) setRefreshing(true);
    try {
      const w = await fetchWeather(activeLocation.lat, activeLocation.lon);
      setWeather(w);
      setLastFetchedAt(new Date());
    } catch {
      // keep showing last-known data on failure
    }
    try {
      const m = await fetchMarine(activeLocation.lat, activeLocation.lon);
      setMarine(m);
    } catch {
      setMarine(null);
    } finally {
      if (isManual) setRefreshing(false);
    }
  }, [activeLocation]);

  useEffect(() => {
    loadWeather(false);
    const id = setInterval(() => loadWeather(false), 30 * 60 * 1000);
    return () => clearInterval(id);
  }, [loadWeather]);

  const trendFalling = useMemo(() => {
    if (!weather) return false;
    const { time, pressure_msl } = weather.hourly;
    let nowIdx = time.indexOf(weather.current.time);
    if (nowIdx === -1) nowIdx = time.length - 1;
    const prevIdx = Math.max(0, nowIdx - 3);
    return classifyTrend(pressure_msl[nowIdx] - pressure_msl[prevIdx]).storm;
  }, [weather]);

  if (!state) {
    return <div className="view"><p className="empty-hint" style={{ padding: 24 }}>Loading…</p></div>;
  }

  return (
    <React.Fragment>
      <header className="app-header">
        <div className="header-row">
          <button className="location-btn" onClick={() => setSheetOpen(true)}>
            <Icon.Pin />
            <span>{activeLocation ? activeLocation.label : 'Choose a location'}</span>
            <Icon.Chevron style={{ transform: 'rotate(-90deg)', opacity: 0.6 }} />
          </button>
          <button
            className={`refresh-btn ${refreshing ? 'spinning' : ''}`}
            onClick={() => loadWeather(true)}
            aria-label="Refresh"
          >
            <Icon.Refresh />
          </button>
        </div>
        <div className="update-row">Last update: {relativeTime(lastFetchedAt)}</div>
      </header>

      {trendFalling && (
        <div className="storm-banner">
          <Icon.Alert />
          <span>Pressure dropping fast — possible storm approaching.</span>
        </div>
      )}

      {tab === 'gauge' && <GaugeView weather={weather} marine={marine} windUnit={state.windUnit} location={activeLocation} tideStations={tideStations} />}
      {tab === 'map' && <MapView location={activeLocation} />}
      {tab === 'route' && <RouteView location={activeLocation} marine={marine} windUnit={state.windUnit} />}
      {tab === 'drift' && <DriftView />}

      <nav className="bottom-nav">
        <button className={`nav-btn ${tab === 'gauge' ? 'active' : ''}`} onClick={() => setTab('gauge')}>
          <Icon.Gauge /> GAUGE
        </button>
        <button className={`nav-btn ${tab === 'map' ? 'active' : ''}`} onClick={() => setTab('map')}>
          <Icon.Map /> MAP
        </button>
        <button className={`nav-btn ${tab === 'route' ? 'active' : ''}`} onClick={() => setTab('route')}>
          <Icon.Route /> ROUTE
        </button>
        <button className={`nav-btn ${tab === 'drift' ? 'active' : ''}`} onClick={() => setTab('drift')}>
          <Icon.Target /> DRIFT
        </button>
      </nav>

      {sheetOpen && (
        <LocationSheet state={state} setState={setState} onClose={() => setSheetOpen(false)} />
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
