<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Barometer</title>

<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#211A0F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Barometer" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<link rel="icon" href="/icons/icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  :root {
    --panel: #D99A44;
    --panel-raised: #F0DDAE;
    --case: #211A0F;
    --case-light: #4A3B28;
    --ink: #211A0F;
    --ink-soft: #7A5C33;
    --lcd-bg: #F0DDAE;
    --lcd-ink: #211A0F;
    --lcd-dim: rgba(33, 26, 15, 0.18);
    --storm: #A23E32;
    --accent: #211A0F;
    --line: rgba(33, 26, 15, 0.18);
    /* Nav content height only — safe-area-inset-bottom is added separately
       wherever this is used, since it varies by device. */
    --nav-height: 46px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    height: 100%;
    height: 100dvh;
    background: var(--panel);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    overscroll-behavior-y: none;
  }

  #root { min-height: 100%; display: flex; flex-direction: column; }

  .mono { font-family: 'IBM Plex Mono', monospace; }
  .display { font-family: 'Space Grotesk', sans-serif; }

  button {
    font-family: inherit;
    border: none;
    background: none;
    color: inherit;
    cursor: pointer;
  }
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  /* ---------- Header ---------- */
  .app-header {
    background: var(--case);
    color: var(--panel-raised);
    padding: calc(env(safe-area-inset-top, 0px) + 14px) 14px 8px;
    flex-shrink: 0;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .location-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--panel-raised);
    padding: 4px 0;
  }
  .location-btn svg { flex-shrink: 0; opacity: 0.8; }
  .refresh-btn {
    padding: 8px;
    color: var(--panel-raised);
    opacity: 0.85;
  }
  .refresh-btn.spinning svg { animation: spin 0.7s linear; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .update-row {
    font-size: 12px;
    color: rgba(240, 221, 174, 0.65);
    font-family: 'IBM Plex Mono', monospace;
  }
  .update-row-line {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
  }
  .fav-toggle {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    color: rgba(240, 221, 174, 0.65);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ---------- Storm banner ---------- */
  .storm-banner {
    background: var(--storm);
    color: var(--panel-raised);
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  /* ---------- Main scroll area ---------- */
  .view {
    flex: 1;
    overflow-y: auto;
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + var(--nav-height) + 14px);
    -webkit-overflow-scrolling: touch;
  }

  /* ---------- Merged gauge + trend chart ---------- */
  .gauge-composite {
    position: relative;
    padding: 16px 0 0;
    display: flex;
    justify-content: center;
  }
  .gauge-overlay {
    position: absolute;
    top: 16px;
    left: 0;
    right: 0;
    width: 100%;
    pointer-events: none;
  }
  .pressure-readout {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 6px;
    margin-top: 6px;
  }
  .trend-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 4px;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .trend-row .arrow { color: var(--accent); }
  .trend-row.falling .arrow { color: var(--storm); }

  .lcd-unit {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--lcd-ink);
    opacity: 0.75;
    margin-bottom: 6px;
  }

  /* ---------- Sparkline card ---------- */
  .card {
    background: var(--panel-raised);
    border-radius: 14px;
    margin: 10px 14px;
    padding: 12px 14px;
    border: 1px solid var(--line);
  }
  .card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--ink-soft);
    margin-bottom: 10px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ---------- Collapsible sections ---------- */
  .section {
    margin: 10px 14px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--panel-raised);
    overflow: hidden;
  }
  .section-head {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Space Grotesk', sans-serif;
  }
  .section-head .chev { transition: transform 0.2s ease; color: var(--ink-soft); }
  .section-head[aria-expanded="true"] .chev { transform: rotate(180deg); }
  .section-body {
    padding: 4px 14px 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat .label { font-size: 11px; color: var(--ink-soft); font-family: 'IBM Plex Mono', monospace; }
  .stat .value { font-size: 17px; font-weight: 500; }

  .wind-block {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
    margin-top: 4px;
  }
  .moon-block {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    margin-top: 2px;
  }

  /* ---------- Map view ---------- */
  #map { position: absolute; inset: 0; transition: bottom 0.28s ease; }
  .map-view { position: relative; flex: 1; }
  .map-status {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    background: var(--case);
    color: var(--panel-raised);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    z-index: 1500;
  }
  /* ---------- Day tabs ---------- */
  .day-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    -webkit-overflow-scrolling: touch;
  }
  .day-tab {
    flex-shrink: 0;
    padding: 7px 12px;
    border-radius: 20px;
    background: var(--panel);
    border: 1px solid var(--line);
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .day-tab.active {
    background: var(--case);
    border-color: var(--case);
    color: var(--panel-raised);
  }

  .isobar-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--ink);
    background: rgba(240, 221, 174, 0.88);
    padding: 1px 5px;
    border-radius: 3px;
    white-space: nowrap;
    border: 1px solid var(--line);
  }

  /* ---------- Route planner ---------- */
  .route-panel {
    position: absolute;
    left: 0; right: 0;
    bottom: calc(env(safe-area-inset-bottom, 0px) + var(--nav-height));
    height: 40%;
    background: var(--panel);
    border-top: 1px solid var(--line);
    border-radius: 16px 16px 0 0;
    padding: 10px 14px 12px;
    display: flex;
    flex-direction: column;
    z-index: 900;
    box-shadow: 0 -4px 14px rgba(0,0,0,0.12);
    transition: height 0.28s ease;
  }
  .route-panel.collapsed { height: auto; padding-bottom: 10px; }
  .route-panel-head {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .route-fold-btn { padding: 4px; color: var(--ink-soft); flex-shrink: 0; }
  .route-scroll { overflow-y: auto; flex: 1; }
  .route-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px 4px 4px;
    border-top: 1px solid var(--line);
    margin-top: 6px;
  }
  .speed-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
    margin-top: 8px;
  }
  .route-subcard {
    border-top: 1px solid var(--line);
    padding-top: 10px;
    margin-top: 10px;
  }
  .watch-btn-sm {
    background: var(--case);
    color: var(--panel-raised);
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
  }
  .watch-btn-sm.active { background: var(--storm); }
  .route-actions {
    display: flex;
    gap: 8px;
    border-top: 1px solid var(--line);
    padding-top: 10px;
    margin-top: 10px;
  }
  .route-action-btn {
    flex: 1;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 4px;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
  }
  .route-action-btn:disabled { opacity: 0.45; }
  .speed-input {
    width: 64px;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 8px;
    font-size: 15px;
    color: var(--ink);
  }
  .log-input {
    width: 100%;
    box-sizing: border-box;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 10px;
    font-size: 15px;
    color: var(--ink);
  }
  .log-textarea {
    width: 100%;
    box-sizing: border-box;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    resize: vertical;
  }

  /* Leaflet renders this as plain HTML inside a popup, not React, so it
     needs its own styling rather than reusing a component class. */
  .popup-remove-btn {
    background: var(--storm);
    color: var(--panel-raised);
    border: none;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
  }
  .popup-actions { display: flex; gap: 6px; }
  .popup-icon-btn { padding: 6px 8px; display: flex; align-items: center; }
  .popup-close-btn { background: var(--case); white-space: nowrap; }

  .watch-btn {
    background: var(--case);
    color: var(--panel-raised);
    padding: 13px 0;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .watch-btn:disabled { opacity: 0.6; }

  /* ---------- Bottom nav ---------- */
  .bottom-nav {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    display: flex;
    background: var(--case);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    flex-shrink: 0;
    z-index: 2000; /* must clear Leaflet's internal panes/controls (max ~1000) */
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 7px 0 6px;
    color: rgba(240,221,174,0.55);
    font-size: 10px;
    letter-spacing: 0.03em;
    font-family: 'IBM Plex Mono', monospace;
  }
  .nav-btn svg { width: 18px; height: 18px; }
  .nav-btn.active { color: var(--panel-raised); }

  /* ---------- Sheet (location picker) ---------- */
  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(33,26,15,0.5);
    z-index: 2100;
    display: flex;
    align-items: flex-end;
  }
  .sheet {
    background: var(--panel);
    width: 100%;
    max-height: 82vh;
    border-radius: 18px 18px 0 0;
    padding: 8px 14px calc(env(safe-area-inset-bottom, 0px) + 20px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sheet-grip {
    width: 36px; height: 4px;
    background: var(--line);
    border-radius: 2px;
    margin: 6px auto 14px;
  }
  .sheet-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .sheet-title-row h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 600;
    margin: 0;
  }
  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 12px;
  }
  .search-box input {
    border: none;
    background: none;
    flex: 1;
    font-size: 15px;
    color: var(--ink);
  }
  .search-box input::placeholder { color: var(--ink-soft); }
  .sheet-scroll { overflow-y: auto; }
  .fav-row, .result-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 4px;
    border-bottom: 1px solid var(--line);
  }
  .fav-row:last-child, .result-row:last-child { border-bottom: none; }
  .fav-main, .result-main {
    display: flex;
    flex-direction: column;
    text-align: left;
    flex: 1;
  }
  .fav-main .name, .result-main .name { font-size: 15px; font-weight: 500; }
  .fav-main .sub, .result-main .sub { font-size: 12px; color: var(--ink-soft); font-family: 'IBM Plex Mono', monospace; }
  .fav-row.active .name { color: var(--accent); }
  .icon-btn { padding: 6px; color: var(--ink-soft); }
  .temp-banner {
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .pin-toggle-btn {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    text-decoration: underline;
    padding: 4px 0 10px;
  }
  .unit-toggle {
    display: flex;
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    margin-top: 4px;
  }
  .unit-toggle button {
    flex: 1;
    padding: 9px 0;
    font-size: 13px;
    font-weight: 500;
    background: var(--panel-raised);
    color: var(--ink-soft);
  }
  .unit-toggle button.active { background: var(--case); color: var(--panel-raised); }

  .empty-hint { font-size: 13px; color: var(--ink-soft); padding: 8px 4px 14px; }
</style>
</head>
<body>
<div id="root"></div>

<script>
// Offline support — the SW caches the app shell, pinned CDN deps, and the
// last good data responses (never Admiralty tide predictions; see sw.js).
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/d3@7.9.0/dist/d3.min.js"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ---------------------------------------------------------------------
   Icons — small line-style SVGs, kept consistent stroke weight
--------------------------------------------------------------------- */
const Icon = {
  Chevron: (p) => (
    <svg className="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <polyline points="6 9 12 15 18 9" />

  Pin: (p) => (

    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <circle cx="11" cy="11" r="7" /><line x1="21" y1="21" x2="16.65" y2="16.65" />

  ),
  Close: (p) => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
    </svg>
  ),
  Trash: (p) => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>

  ),
  Plus: (p) => (

      <line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" />
    </svg>
  ),
  Gauge: (p) => (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <path d="M12 3a9 9 0 1 0 9 9" /><path d="M12 12l4-4" /><path d="M12 3v2M21 12h-2M4.2 4.2l1.4 1.4" />

  ),
  Map: (p) => (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <polygon points="1 6 8 3 16 6 23 3 23 18 16 21 8 18 1 21" />

    </svg>
  ),
  Route: (p) => (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <circle cx="5" cy="6" r="2.3" /><circle cx="19" cy="18" r="2.3" />
      <path d="M7 7.5C10 10 8 13 11 15s5 1 8 3" strokeDasharray="1 3.4" />
    </svg>
  ),
  Reverse: (p) => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <polyline points="17 1 21 5 17 9" /><path d="M3 11V9a4 4 0 0 1 4-4h14" />
      <polyline points="7 23 3 19 7 15" /><path d="M21 13v2a4 4 0 0 1-4 4H3" />
    </svg>
  ),
  Log: (p) => (
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <path d="M4 3h13l3 3v15H4z" /><path d="M17 3v4h3" /><line x1="8" y1="11" x2="15" y2="11" /><line x1="8" y1="15" x2="15" y2="15" />
    </svg>

/* ---------------------------------------------------------------------

--------------------------------------------------------------------- */
const SEG_MAP = {
  '0': 'abcdef', '1': 'bc', '2': 'abged', '3': 'abgcd', '4': 'fgbc',
  '5': 'afgcd', '6': 'afgecd', '7': 'abc', '8': 'abcdefg', '9': 'abcdfg',
  ' ': '', '-': 'g',
};
const SEG_RECTS = {
  a: [6, 0, 16, 5], g: [6, 24.5, 16, 5], d: [6, 49, 16, 5],
  f: [0, 3, 5, 22], b: [23, 3, 5, 22], e: [0, 29, 5, 22], c: [23, 29, 5, 22],
};

function SevenSegDigit({ char, size = 30 }) {
  const on = new Set((SEG_MAP[char] || '').split(''));
  const w = size * 0.52;
  return (
    <svg width={w} height={size} viewBox="0 0 28 54" style={{ flexShrink: 0 }}>
      {Object.entries(SEG_RECTS).map(([key, [x, y, ww, hh]]) => (
        <rect key={key} x={x} y={y} width={ww} height={hh} rx="1.4"
          fill={on.has(key) ? 'var(--lcd-ink)' : 'var(--lcd-dim)'} />
      ))}
    </svg>
  );
}

function SevenSegDisplay({ value, size = 34 }) {
  const chars = String(value).split('');
  return (
    <div style={{ display: 'flex', gap: 3, alignItems: 'flex-end' }}>
      {chars.map((c, i) =>
        c === '.' ? (
          <div key={i} style={{ width: 7, display: 'flex', alignItems: 'flex-end', paddingBottom: size * 0.06 }}>
            <div style={{ width: 5, height: 5, borderRadius: '50%', background: 'var(--lcd-ink)' }} />
          </div>
        ) : (
          <SevenSegDigit key={i} char={c} size={size} />
        )
      )}
    </div>
  );
}

--------------------------------------------------------------------- */
const KN_TO_MPH = 1.15078;
const ISOBAR_COLOR = '#7A5C33';
const ISOBAR_COLOR_MAJOR = '#211A0F';
// Crowd-sourced nautical marks (buoys, lights, harbors, hazards) — same
// OSM/ODbL ecosystem as the base map, free, no key. Per OpenSeaMap's own
// wiki: a supplement for planning/awareness, not a substitute for an
// official chart.
const SEAMARK_TILE_URL = 'https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png';

function compassLabel(deg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

// Classifies wind relative to a coastline's "seaward" bearing (the compass
// direction pointing from the shore out to open water, set per-location by
// the user — there's no reliable automatic way to infer this from a
// coordinate alone). Wind direction is meteorological "from" convention,
// so wind blowing FROM the seaward direction is onshore.
function classifyShoreWind(windDir, seaward) {
  if (seaward == null || windDir == null) return null;
  const diff = ((windDir - seaward + 540) % 360) - 180;
  const absDiff = Math.abs(diff);
  if (absDiff <= 45) return 'Onshore';
  if (absDiff >= 135) return 'Offshore';
  return 'Cross-shore';
}

// Simplified 3-hour pressure tendency, loosely modelled on the classic
// ship's-barometer dial words rather than the full WMO synoptic code.
function classifyTrend(deltaHpa) {
  if (deltaHpa <= -3) return { label: 'Falling quickly', dir: 'down', storm: true };
  if (deltaHpa <= -1) return { label: 'Falling', dir: 'down', storm: false };
  if (deltaHpa < 1) return { label: 'Steady', dir: 'flat', storm: false };
  if (deltaHpa < 3) return { label: 'Rising', dir: 'up', storm: false };
  return { label: 'Rising quickly', dir: 'up', storm: false };
}

function moonPhase(date) {
  const synodic = 29.53058867;
  const knownNewMoon = Date.UTC(2000, 0, 6, 18, 14);
  const diffDays = (date.getTime() - knownNewMoon) / 86400000;
  const phase = ((diffDays % synodic) + synodic) % synodic;
  const frac = phase / synodic;
  const names = ['New Moon','Waxing Crescent','First Quarter','Waxing Gibbous','Full Moon','Waning Gibbous','Last Quarter','Waning Crescent'];
  const idx = Math.round(frac * 8) % 8;
  return { frac, name: names[idx] };
}

// Open-Meteo's `current.time` has 15-minute resolution (e.g. "…T08:45")
// but the hourly arrays are on the hour, so a plain indexOf misses 3 out
// of every 4 quarter-hours. The old fallback (end of array) silently
// pointed the trend chart at the END of the 7-day forecast instead of the
// past 24h. Match on the truncated hour first, then the last hourly slot
// not after now; -1 only if every hourly time is in the future.
function findNowIndex(times, nowIso) {
  if (!Array.isArray(times) || times.length === 0 || !nowIso) return -1;
  const hourIso = nowIso.slice(0, 13) + ':00';
  const exact = times.indexOf(hourIso);
  if (exact !== -1) return exact;
  let idx = -1;
  for (let i = 0; i < times.length; i++) {
    if (times[i] <= nowIso) idx = i;
    else break;
  }
  return idx;
}

function relativeTime(date) {
  if (!date) return '—';
  const mins = Math.round((Date.now() - date.getTime()) / 60000);
  if (mins < 1) return 'just now';
  if (mins === 1) return '1 minute ago';
  if (mins < 60) return `${mins} minutes ago`;
  const hrs = Math.round(mins / 60);
  return hrs === 1 ? '1 hour ago' : `${hrs} hours ago`;
}

function escapeXml(s) {
  return String(s).replace(/[<>&'"]/g, (c) => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', "'": '&apos;', '"': '&quot;' }[c]));
}

// Standard GPX 1.1 — waypoints plus a track, so it opens sensibly in any
// real GPS device or mapping app, not just something we built ourselves.
function buildGPX(waypoints, closed, name) {
  const trackPts = closed ? [...waypoints, waypoints[0]] : waypoints;
  const wptTags = waypoints.map((w, i) => `  <wpt lat="${w.lat}" lon="${w.lon}"><name>Point ${i + 1}</name></wpt>`).join('\n');
  const trkPts = trackPts.map((w) => `      <trkpt lat="${w.lat}" lon="${w.lon}"></trkpt>`).join('\n');
  return `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="Barometer PWA" xmlns="http://www.topografix.com/GPX/1/1">
  <metadata><name>${escapeXml(name || 'Route')}</name></metadata>
${wptTags}
  <trk>
    <name>${escapeXml(name || 'Route')}</name>
    <trkseg>
${trkPts}
    </trkseg>
  </trk>
</gpx>`;
}

function downloadGPX(waypoints, closed, name) {
  const gpx = buildGPX(waypoints, closed, name);
  const blob = new Blob([gpx], { type: 'application/gpx+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${(name || 'route').replace(/[^a-z0-9-_]/gi, '_')}.gpx`;
  a.click();
  // Deferred — revoking synchronously after click() has aborted downloads
  // on iOS Safari before the fetch of the blob URL actually starts.
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}

// Resizes/compresses a photo client-side before it ever reaches the
// server — an uncompressed iPhone photo can be several MB, which is both
// slow to sync and wasteful to store as base64 in Postgres.
function compressImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('could not read file'));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error('could not decode image'));
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else if (height >= width && height > maxDim) {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// Wraps text across multiple lines within maxWidth — used by the share-image
// canvas composite, which has no native text-wrapping of its own.
function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
  const words = text.split(' ');
  let line = '', lines = 0;
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line, x, y);
      line = word + ' ';
      y += lineHeight;
      lines++;
      if (maxLines && lines >= maxLines - 1) {
        ctx.fillText(line + '…', x, y);
        return y + lineHeight;
      }
    } else {
      line = test;
    }
  }
  ctx.fillText(line, x, y);
  return y + lineHeight;
}

// Composites a log entry (photo + weather + comment) into a single shareable
// image in the app's own amber/ink style, sized for WhatsApp/Messages.
function buildShareImage(entry) {
  return new Promise((resolve, reject) => {
    const W = 1080, H = 1350;
    const canvas = document.createElement('canvas');
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');

    function draw(photoImg) {
      ctx.fillStyle = '#D99A44';
      ctx.fillRect(0, 0, W, H);
      ctx.textBaseline = 'top';

      let top = 56;
      if (photoImg) {
        const photoH = Math.round(H * 0.5);
        const scale = Math.max(W / photoImg.width, photoH / photoImg.height);
        const sw = W / scale, sh = photoH / scale;
        const sx = (photoImg.width - sw) / 2, sy = (photoImg.height - sh) / 2;
        ctx.drawImage(photoImg, sx, sy, sw, sh, 0, 0, W, photoH);
        top = photoH + 48;
      }

      ctx.fillStyle = '#211A0F';
      ctx.font = '600 46px sans-serif';
      ctx.fillText(entry.locationLabel || 'Voyage Log', 56, top);
      top += 62;

      const d = new Date(entry.date);
      ctx.fillStyle = '#7A5C33';
      ctx.font = '400 28px monospace';
      ctx.fillText(d.toLocaleDateString([], { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }), 56, top);
      top += 52;

      if (entry.weather) {
        const w = entry.weather;
        const windDirStr = w.windDir != null ? ` ${compassLabel(w.windDir)}` : '';
        const parts = [`${w.pressure.toFixed(0)} hPa`, `${w.temp.toFixed(0)}°C`, `${Math.round(w.windSpeed)} ${w.windUnit === 'mph' ? 'mph' : 'kn'}${windDirStr} wind`];
        if (w.shore) parts.push(w.shore);
        if (w.waterTemp != null) parts.push(`water ${w.waterTemp.toFixed(0)}°C`);
        if (w.waveHeight != null) parts.push(`${w.waveHeight.toFixed(1)}m waves`);
        if (w.swellHeight != null) parts.push(`${w.swellHeight.toFixed(1)}m swell`);
        if (w.tideHeight != null) parts.push(`tide ${w.tideHeight.toFixed(1)}m${w.tideTrend ? `, ${w.tideTrend}` : ''}`);
        ctx.fillStyle = '#211A0F';
        ctx.font = '600 30px monospace';
        top = wrapCanvasText(ctx, parts.join('   ·   '), 56, top, W - 112, 40) + 12;
      }

      if (entry.comment) {
        ctx.fillStyle = '#211A0F';
        ctx.font = '400 30px sans-serif';
        wrapCanvasText(ctx, entry.comment, 56, top, W - 112, 42, 6);
      }

      canvas.toBlob((blob) => (blob ? resolve(blob) : reject(new Error('toBlob failed'))), 'image/jpeg', 0.9);
    }

    if (entry.photo) {
      const img = new Image();
      img.onload = () => draw(img);
      img.onerror = () => draw(null);
      img.src = entry.photo;
    } else {
      draw(null);
    }
  });
}

// Both geocoders return different shapes — normalize to one consistent
// {name, sub, lat, lon, source} form used everywhere else.
function normalizeOpenMeteoResult(res) {
  return {
    name: res.name,
    sub: [res.admin1, res.country].filter(Boolean).join(', '),
    lat: res.latitude,
    lon: res.longitude,
    source: 'place',
  };
}
function normalizeNominatimResult(res) {
  const name = res.name || (res.display_name ? res.display_name.split(',')[0] : 'Unnamed');
  const parts = res.display_name ? res.display_name.split(',').slice(1, 3).map((s) => s.trim()) : [];
  return {
    name,
    sub: [res.type, ...parts].filter(Boolean).join(', '),
    lat: parseFloat(res.lat),
    lon: parseFloat(res.lon),
    source: 'feature',
  };
}

// Open-Meteo's geocoder covers cities/towns well but has no idea what a
// beach or cove is — Nominatim (OpenStreetMap) fills that gap. Both run in
// parallel and get merged, since the same place sometimes exists in both.
async function searchAllPlaces(query) {
  const [places, features] = await Promise.all([
    geocode(query).then((r) => r.map(normalizeOpenMeteoResult)).catch(() => []),
    fetchPlaceSearch(query).then((r) => r.map(normalizeNominatimResult)).catch(() => []),
  ]);
  const seen = new Set();
  return [...places, ...features].filter((p) => {
    if (typeof p.lat !== 'number' || typeof p.lon !== 'number' || Number.isNaN(p.lat) || Number.isNaN(p.lon)) return false;
    // 3 decimals ≈ 110m — at 2 decimals (~1.1km) two genuinely distinct
    // neighbouring coves were collapsing into one result.
    const key = `${p.lat.toFixed(3)},${p.lon.toFixed(3)}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

// Standard Beaufort scale, thresholds in knots.
function beaufort(knots) {
  const scale = [
    [1, 0, 'Calm'], [3, 1, 'Light air'], [6, 2, 'Light breeze'], [10, 3, 'Gentle breeze'],
    [16, 4, 'Moderate breeze'], [21, 5, 'Fresh breeze'], [27, 6, 'Strong breeze'],
    [33, 7, 'Near gale'], [40, 8, 'Gale'], [47, 9, 'Strong gale'],
    [55, 10, 'Storm'], [63, 11, 'Violent storm'], [Infinity, 12, 'Hurricane'],
  ];
  for (const [max, force, label] of scale) {
    if (knots < max) return { force, label };
  }
  return { force: 12, label: 'Hurricane' };
}

// Finds local peaks/troughs in a sea-level time series — an approximate
// high/low tide finder. This is model output, not an official harmonic
// tide-table prediction; treat timing as indicative, not precise.
function findTideExtrema(times, heights) {
  const extrema = [];
  for (let i = 1; i < heights.length - 1; i++) {
    if (heights[i] > heights[i - 1] && heights[i] > heights[i + 1]) extrema.push({ time: times[i], height: heights[i], type: 'high' });
    if (heights[i] < heights[i - 1] && heights[i] < heights[i + 1]) extrema.push({ time: times[i], height: heights[i], type: 'low' });
  }
  return extrema;
}

// Haversine great-circle distance in km, and initial compass bearing —
// verified against known reference points (London→Paris ≈ 344km) before use.
function haversineKm(lat1, lon1, lat2, lon2) {
  const toRad = (d) => (d * Math.PI) / 180;
  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function initialBearing(lat1, lon1, lat2, lon2) {
  const toRad = (d) => (d * Math.PI) / 180;
  const toDeg = (r) => (r * 180) / Math.PI;
  const y = Math.sin(toRad(lon2 - lon1)) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(toRad(lon2 - lon1));
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

// Suggests a departure time by checking the forecast ocean current at each
// upcoming hour against the route's overall direction — a simplified
// "tidal gate" advisor. This applies one current value to the whole route
// rather than per-leg, and the underlying model is coarse (Open-Meteo's
// own docs note ~8km resolution, unreliable in complex coastlines) — a
// useful steer for open water, not a precise per-leg prediction.
function computeTidalGate(marine, waypoints, plannedSpeedKn, totalKm) {
  if (!marine || !marine.hourly || !Array.isArray(marine.hourly.ocean_current_velocity) || waypoints.length < 2) return null;
  const { time, ocean_current_velocity, ocean_current_direction } = marine.hourly;
  const first = waypoints[0], last = waypoints[waypoints.length - 1];
  const overallBearing = initialBearing(first.lat, first.lon, last.lat, last.lon);
  const now = Date.now();
  const windows = [];
  for (let i = 0; i < time.length && windows.length < 18; i++) {
    const t = new Date(time[i]).getTime();
    if (Number.isNaN(t) || t < now - 3600000) continue;
    const vel = ocean_current_velocity[i], dir = ocean_current_direction[i];
    if (vel == null || dir == null) continue;
    const along = vel * Math.cos(((dir - overallBearing) * Math.PI) / 180);
    const effectiveKn = plannedSpeedKn + along;
    const hours = effectiveKn > 0.05 ? totalKm / (effectiveKn * KN_TO_KMH) : null;
    windows.push({ time: time[i], hours, along });
  }
  if (windows.length === 0) return null;
  const withEta = windows.filter((w) => w.hours != null);
  if (withEta.length === 0) return { windows, best: null, now: windows[0], overallBearing };
  const best = withEta.reduce((a, b) => (b.hours < a.hours ? b : a));
  return { windows, best, now: windows[0], overallBearing };
}

async function fetchTideEvents(stationId) {
  const r = await fetch(`/api/tide-events/${encodeURIComponent(stationId)}`);
  if (!r.ok) throw new Error('tide events fetch failed');
  return r.json();
}

// The Stations endpoint's exact wrapper shape isn't fully pinned down from
// docs alone, so this accepts either a bare array of GeoJSON Features or a
// FeatureCollection.
function parseStationList(data) {
  const features = Array.isArray(data) ? data : (data && Array.isArray(data.features)) ? data.features : [];
  return features
    .map((f) => ({
      id: f.properties && f.properties.Id,
      name: f.properties && f.properties.Name,
      lon: f.geometry && f.geometry.coordinates && f.geometry.coordinates[0],
      lat: f.geometry && f.geometry.coordinates && f.geometry.coordinates[1],
    }))
    .filter((s) => s.id && typeof s.lat === 'number' && typeof s.lon === 'number');
}

function nearestStation(stations, lat, lon, maxKm) {
  let best = null, bestDist = Infinity;
  for (const s of stations) {
    const d = haversineKm(lat, lon, s.lat, s.lon);
    if (d < bestDist) { bestDist = d; best = s; }
  }
  return best && bestDist <= maxKm ? { ...best, distanceKm: bestDist } : null;
}

// Admiralty's TidalEvents always returns GMT with no timezone suffix, even
// in summer (confirmed in their FAQ: "Is British Summer Time applied to
// predictions? No.") — force UTC parsing so it converts to the viewer's
// real local time correctly year-round instead of being read as a naive
// local timestamp and landing an hour off during BST.
function parseAdmiraltyTime(dateTimeStr) {
  return new Date(dateTimeStr.endsWith('Z') ? dateTimeStr : dateTimeStr + 'Z');
}

function groupEventsByDay(events) {
  const groups = [];
  let currentKey = null, currentGroup = null;
  events.forEach((e) => {
    const d = parseAdmiraltyTime(e.DateTime);
    const key = d.toDateString();
    if (key !== currentKey) {
      currentKey = key;
      currentGroup = { key, date: d, events: [] };
      groups.push(currentGroup);
    }
    currentGroup.events.push(e);
  });
  return groups;
}

function dayLabel(date) {
  const today = new Date();
  const startOfDay = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diffDays = Math.round((startOfDay(date) - startOfDay(today)) / 86400000);
  if (diffDays === 0) return 'Today';
  if (diffDays === 1) return 'Tomorrow';
  return date.toLocaleDateString([], { weekday: 'short', day: 'numeric', month: 'short' });
}

// Builds a coarse lat/lon grid around a center point, synoptic-scale
// (roughly continent-wide) so isobar curvature is actually visible.
function buildGrid(centerLat, centerLon) {
  const cols = 10, rows = 8;
  const latSpan = 9, lonSpan = 14;
  const lats = Array.from({ length: rows }, (_, r) => centerLat + latSpan - (2 * latSpan * r) / (rows - 1));
  const lons = Array.from({ length: cols }, (_, c) => centerLon - lonSpan + (2 * lonSpan * c) / (cols - 1));
  return { cols, rows, lats, lons };
}

// Open-Meteo supports batched multi-location requests via comma-separated
// coordinate lists, so the whole grid comes back in a single call.
async function fetchPressureGrid(centerLat, centerLon) {
  const grid = buildGrid(centerLat, centerLon);
  const latList = [], lonList = [];
  for (let r = 0; r < grid.rows; r++) {
    for (let c = 0; c < grid.cols; c++) {
      latList.push(grid.lats[r].toFixed(2));
      lonList.push(grid.lons[c].toFixed(2));
    }
  }
  const params = new URLSearchParams({
    latitude: latList.join(','),
    longitude: lonList.join(','),
    current: 'pressure_msl',
  });
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
  if (!r.ok) throw new Error('grid fetch failed');
  const data = await r.json();
  const arr = Array.isArray(data) ? data : [data];
  const valid = arr.map((d) => d && d.current && d.current.pressure_msl).filter((v) => typeof v === 'number');
  const mean = valid.length ? valid.reduce((a, b) => a + b, 0) / valid.length : 1013;
  const values = arr.map((d) => {
    const v = d && d.current && d.current.pressure_msl;
    return typeof v === 'number' ? v : mean;
  });
  return { grid, values };
}

function computeContours(grid, values) {
  const min = Math.min(...values), max = Math.max(...values);
  const lo = Math.floor(min / 4) * 4, hi = Math.ceil(max / 4) * 4;
  const thresholds = [];
  for (let v = lo; v <= hi; v += 4) thresholds.push(v);
  if (thresholds.length < 2) return [];
  const gen = d3.contours().size([grid.cols, grid.rows]).thresholds(thresholds);
  return gen(values);
}

function gridToLatLng(gx, gy, grid) {
  const lon = grid.lons[0] + (gx / (grid.cols - 1)) * (grid.lons[grid.cols - 1] - grid.lons[0]);
  const lat = grid.lats[0] + (gy / (grid.rows - 1)) * (grid.lats[grid.rows - 1] - grid.lats[0]);
  return [lat, lon];
}

/* ---------------------------------------------------------------------
   PressureGaugeArc — open-arc analog gauge only (ticks, needle, hub).
   Deliberately no bezel ring and no face fill — this is what makes the
   trend chart underneath genuinely visible through the whole gauge,
   not just peeking round the edges of an opaque disc.
--------------------------------------------------------------------- */
function PressureGaugeArc({ pressure, width, height }) {
  // Solved against the actual box: the arc's top (at 270deg) must stay
  // within the top margin, and the two open-ends (at 135/45deg, the
  // lowest points the rim reaches) must stay within the bottom margin.
  // Verified numerically before shipping — an earlier version of this
  // formula (height * 0.92) pushed almost the whole arc off-canvas.
  const marginTop = 15, marginBottom = 15, marginSide = 25;
  const rFromHeight = (height - marginTop - marginBottom) / 1.8;
  const rFromWidth = width / 2 - marginSide;
  const r = Math.min(rFromHeight, rFromWidth);
  const cy = r + marginTop;
  const cx = width / 2;
  // Everything below (font size, stroke widths, hub) scales with the
  // computed radius relative to the original baseline size, so bumping
  // width/height actually makes the numbers bigger too, not just the arc.
  const scale = r / 83.33;
  const min = 960, max = 1050;
  const startDeg = 135, endDeg = 405;

  const toDeg = (val) => {
    const clamped = Math.max(min, Math.min(max, val));
    return startDeg + (endDeg - startDeg) * ((clamped - min) / (max - min));
  };
  const polar = (deg, radius) => {
    const rad = (deg * Math.PI) / 180;
    return [cx + radius * Math.cos(rad), cy + radius * Math.sin(rad)];
  };

  // Open arc rim traced as a stroked path — no fill, so nothing behind it
  // is obscured. largeArcFlag=1 since this is a 270° sweep.
  const [startX, startY] = polar(startDeg, r);
  const [endX, endY] = polar(endDeg, r);
  const rimPath = `M ${startX} ${startY} A ${r} ${r} 0 1 1 ${endX} ${endY}`;

  const majorTicks = [];
  for (let v = min; v <= max; v += 10) {
    const deg = toDeg(v);
    const [x1, y1] = polar(deg, r - 3);
    const [x2, y2] = polar(deg, r - 14);
    const [lx, ly] = polar(deg, r - 27);
    majorTicks.push(
      <g key={v}>
        <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="var(--ink)" strokeWidth={1.6 * scale} />
        <text x={lx} y={ly + 4 * scale} fontSize={9.5 * scale} textAnchor="middle" fill="var(--ink-soft)" className="mono">{v}</text>
      </g>
    );
  }
  const minorTicks = [];
  for (let v = min; v <= max; v += 2) {
    if (v % 10 === 0) continue;
    const deg = toDeg(v);
    const [x1, y1] = polar(deg, r - 3);
    const [x2, y2] = polar(deg, r - 8);
    minorTicks.push(<line key={v} x1={x1} y1={y1} x2={x2} y2={y2} stroke="var(--ink-soft)" strokeWidth={1 * scale} opacity="0.6" />);
  }

  const needleDeg = pressure != null ? toDeg(pressure) : toDeg(1013);
  const [nx, ny] = polar(needleDeg, r - 18);

  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
      <path d={rimPath} fill="none" stroke="var(--ink)" strokeWidth={2 * scale} strokeLinecap="round" />
      {minorTicks}
      {majorTicks}
      <line x1={cx} y1={cy} x2={nx} y2={ny} stroke="var(--ink)" strokeWidth={2.6 * scale} strokeLinecap="round" />
      <circle cx={cx} cy={cy} r={5 * scale} fill="var(--case)" />
    </svg>
  );
}

function Sparkline({ values }) {
  if (!values || values.length < 2) return null;
  const w = 280, h = 60, pad = 6;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const pts = values.map((v, i) => {
    const x = pad + (i / (values.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return [x, y];
  });
  const line = pts.map((p) => p.join(',')).join(' ');
  const area = `${pad},${h - pad} ` + line + ` ${w - pad},${h - pad}`;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <polygon points={area} fill="var(--case)" opacity="0.08" />
      <polyline points={line} fill="none" stroke="var(--case)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

/* ---------------------------------------------------------------------
   TrendChartCanvas — just the chart drawing + touch handling. Touch
   state lives in the parent (GaugeView) now, so the big digital
   readout can be placed between the gauge and the chart's own
   max/min-or-touched-value caption, matching the reference layout.
--------------------------------------------------------------------- */
function TrendChartCanvas({ values, height, touchIdx, onTouchIdx }) {
  const containerRef = useRef(null);
  if (!values || values.length < 2) return <div style={{ height }} />;

  const w = 320, h = height, pad = 12;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const pts = values.map((v, i) => {
    const x = pad + (i / (values.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return [x, y];
  });
  const line = pts.map((p) => p.join(',')).join(' ');

  function handlePointer(clientX) {
    const rect = containerRef.current.getBoundingClientRect();
    const relX = ((clientX - rect.left) / rect.width) * w;
    let idx = Math.round(((relX - pad) / (w - pad * 2)) * (values.length - 1));
    idx = Math.max(0, Math.min(values.length - 1, idx));
    onTouchIdx(idx);
  }

  return (
    <div
      ref={containerRef}
      style={{ position: 'relative', width: '100%', height: h, touchAction: 'none' }}
      onPointerDown={(e) => handlePointer(e.clientX)}
      onPointerMove={(e) => { if (e.buttons === 1) handlePointer(e.clientX); }}
      onPointerUp={() => onTouchIdx(null)}
      onPointerLeave={() => onTouchIdx(null)}
    >
      <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ display: 'block' }}>
        <polyline points={line} fill="none" stroke="var(--case)" strokeWidth="1.1" strokeLinecap="round" strokeLinejoin="round" opacity="0.55" />
        {touchIdx != null && (
          <React.Fragment>
            <line x1={pts[touchIdx][0]} y1={pad} x2={pts[touchIdx][0]} y2={h - pad} stroke="var(--ink)" strokeWidth="1" strokeDasharray="3 2" />
            <circle cx={pts[touchIdx][0]} cy={pts[touchIdx][1]} r="4" fill="var(--ink)" />
          </React.Fragment>
        )}
      </svg>
    </div>
  );
}

function WindCompass({ deg, size = 50 }) {
  const cx = size / 2, cy = size / 2, r = size * 0.4;
  const rad = ((deg + 180) * Math.PI) / 180;
  const tipX = cx + r * Math.sin(rad), tipY = cy - r * Math.cos(rad);
  const tailX = cx - r * 0.6 * Math.sin(rad), tailY = cy + r * 0.6 * Math.cos(rad);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--line)" strokeWidth="1.5" />
      <text x={cx} y={size * 0.18} fontSize={size * 0.14} textAnchor="middle" fill="var(--ink-soft)">N</text>
      <line x1={tailX} y1={tailY} x2={tipX} y2={tipY} stroke="var(--ink)" strokeWidth="2.4" strokeLinecap="round" />
      <circle cx={tipX} cy={tipY} r={size * 0.046} fill="var(--ink)" />
    </svg>
  );
}

function MoonGlyph({ frac }) {
  const size = 26, r = 11, cx = size / 2, cy = size / 2;
  // Per-instance clip id — a fixed one collides if two glyphs ever render
  // at once, and SVG resolves url(#…) against the first match in the page.
  const clipId = useRef(`moonclip_${Math.random().toString(36).slice(2, 8)}`).current;
  const shift = (frac <= 0.5 ? (0.5 - frac) : (frac - 0.5)) * 4 * r;
  const rx = Math.max(0.001, r - shift);
  const lit = frac <= 0.5;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
      <circle cx={cx} cy={cy} r={r} fill="var(--ink)" opacity="0.85" />
      <clipPath id={clipId}><circle cx={cx} cy={cy} r={r} /></clipPath>
      <g clipPath={`url(#${clipId})`}>
        <ellipse cx={lit ? cx + (r - shift) : cx - (r - shift)} cy={cy} rx={rx} ry={r} fill="var(--panel-raised)" />
      </g>
    </svg>
  );
}

--------------------------------------------------------------------- */
function PinPicker({ initialLat, initialLon, onPick }) {
  const mapRef = useRef(null);
  const leafletRef = useRef(null);
  const markerRef = useRef(null);
  const [coords, setCoords] = useState(null);

  useEffect(() => {
    const map = L.map(mapRef.current, { zoomControl: true }).setView(
      [initialLat || 51.5, initialLon || -0.12],
      initialLat != null ? 11 : 5
    );
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 18,
    }).addTo(map);
    map.on('click', (e) => {
      const { lat, lng } = e.latlng;
      setCoords({ lat, lon: lng });
      if (markerRef.current) map.removeLayer(markerRef.current);
      markerRef.current = L.marker([lat, lng]).addTo(map);
    });
    leafletRef.current = map;
    return () => { map.remove(); leafletRef.current = null; };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  return (
    <div>
      <div ref={mapRef} style={{ height: 200, borderRadius: 10, overflow: 'hidden' }} />
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 10, gap: 10 }}>
        <span className="mono" style={{ fontSize: 12, color: 'var(--ink-soft)' }}>
          {coords ? `${coords.lat.toFixed(4)}, ${coords.lon.toFixed(4)}` : 'Tap the map to drop a pin'}
        </span>
        <button className="watch-btn" style={{ padding: '9px 16px', flexShrink: 0 }} disabled={!coords} onClick={() => coords && onPick(coords)}>
          Use this spot
        </button>
      </div>
    </div>
  );
}

function LocationSheet({ favourites, activeFavouriteId, tempLocation, windUnit, onView, onSaveTemp, onSelectFavourite, onRenameFavourite, onRemoveFavourite, onSetWindUnit, onClose }) {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [pinMode, setPinMode] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [editValue, setEditValue] = useState('');
  const [saveNameValue, setSaveNameValue] = useState(tempLocation ? tempLocation.label : '');
  const debounceRef = useRef(null);
  // Monotonic id per search, so a slow earlier query resolving late can't
  // overwrite the results of the query the user actually typed last.
  const searchSeqRef = useRef(0);

  useEffect(() => {
    setSaveNameValue(tempLocation ? tempLocation.label : '');
  }, [tempLocation]);

  useEffect(() => {
    clearTimeout(debounceRef.current);
    if (query.trim().length < 2) { setResults([]); return; }
    debounceRef.current = setTimeout(async () => {
      const seq = ++searchSeqRef.current;
      setSearching(true);
      try {
        const found = await searchAllPlaces(query.trim());
        if (seq === searchSeqRef.current) setResults(found);
      } catch {
        if (seq === searchSeqRef.current) setResults([]);
      } finally {
        if (seq === searchSeqRef.current) setSearching(false);
      }
    }, 400);
    return () => clearTimeout(debounceRef.current);
  }, [query]);

  function handleResultTap(res) {
    onView({ label: res.sub ? `${res.name}, ${res.sub}` : res.name, lat: res.lat, lon: res.lon, timezone: 'auto' });
    setQuery('');
    setResults([]);
  }

  function handlePin(coords) {
    onView({ label: 'Dropped pin', lat: coords.lat, lon: coords.lon, timezone: 'auto' });
    setPinMode(false);
  }

  function startEdit(loc) {
    setEditingId(loc.id);
    setEditValue(loc.label);
  }
  function confirmEdit() {
    onRenameFavourite(editingId, editValue);
    setEditingId(null);
  }

  return ReactDOM.createPortal(
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheet-grip" />
        <div className="sheet-title-row">
          <h2>Locations</h2>
          <button className="icon-btn" onClick={onClose} aria-label="Close"><Icon.Close /></button>
        </div>

        {tempLocation && (
          <div className="temp-banner">
            <div className="card-label" style={{ margin: 0 }}>Viewing — not saved yet</div>
            <input
              className="log-input"
              style={{ marginTop: 6 }}
              value={saveNameValue}
              onChange={(e) => setSaveNameValue(e.target.value)}
              placeholder="Name this place"
            />
            <button className="watch-btn" style={{ width: '100%', marginTop: 8 }} onClick={() => { onSaveTemp(saveNameValue); onClose(); }}>
              ★ Save to Favourites
            </button>
          </div>
        )}

        {!pinMode && (
          <div className="search-box">
            <Icon.Search style={{ color: 'var(--ink-soft)' }} />
            <input
              placeholder="Search for a city, beach, cove…"
              value={query}
              onChange={(e) => setQuery(e.target.value)}
            />
          </div>
        )}
        <button className="pin-toggle-btn" onClick={() => setPinMode((p) => !p)}>
          {pinMode ? '← Search instead' : 'Or drop a pin on the map'}
        </button>

        <div className="sheet-scroll">
          {pinMode ? (
            <PinPicker
              initialLat={tempLocation ? tempLocation.lat : favourites[0] && favourites[0].lat}
              initialLon={tempLocation ? tempLocation.lon : favourites[0] && favourites[0].lon}
              onPick={handlePin}
            />
          ) : (
            <React.Fragment>
              {results.length > 0 && (
                <div style={{ marginBottom: 14 }}>
                  {results.map((res, i) => (
                    <div className="result-row" key={i}>
                      <button className="result-main" onClick={() => handleResultTap(res)}>
                        <span className="name">{res.name}</span>
                        <span className="sub">{res.sub}{res.source === 'feature' ? ' · map feature' : ''}</span>
                      </button>
                    </div>
                  ))}
                </div>
              )}
              {searching && <div className="empty-hint">Searching…</div>}

              {favourites.map((loc) => (
                <div className={`fav-row ${loc.id === activeFavouriteId && !tempLocation ? 'active' : ''}`} key={loc.id}>
                  {editingId === loc.id ? (
                    <React.Fragment>
                      <input
                        className="log-input"
                        style={{ flex: 1, marginRight: 8 }}
                        value={editValue}
                        onChange={(e) => setEditValue(e.target.value)}
                        onKeyDown={(e) => { if (e.key === 'Enter') confirmEdit(); }}
                        autoFocus
                      />
                      <button className="icon-btn" onClick={confirmEdit} aria-label="Confirm rename"><Icon.Check /></button>
                    </React.Fragment>
                  ) : (
                    <React.Fragment>
                      <button className="fav-main" onClick={() => { onSelectFavourite(loc.id); onClose(); }}>
                        <span className="name">{loc.label}</span>
                        <span className="sub">{loc.lat.toFixed(2)}, {loc.lon.toFixed(2)}</span>
                      </button>
                      <button className="icon-btn" onClick={() => startEdit(loc)} aria-label="Rename"><Icon.Pencil /></button>
                      <button className="icon-btn" onClick={() => onRemoveFavourite(loc.id)} aria-label="Remove"><Icon.Trash /></button>
                    </React.Fragment>
                  )}
                </div>
              ))}
              {favourites.length === 0 && (
                <p className="empty-hint" style={{ padding: '8px 0' }}>No saved favourites yet — search above, or drop a pin, then save it.</p>
              )}
            </React.Fragment>
          )}

          <div className="card-label" style={{ marginTop: 18 }}>Wind unit</div>
          <div className="unit-toggle">
            <button className={windUnit === 'kn' ? 'active' : ''} onClick={() => onSetWindUnit('kn')}>Knots</button>
            <button className={windUnit === 'mph' ? 'active' : ''} onClick={() => onSetWindUnit('mph')}>mph</button>
          </div>
        </div>
      </div>
    </div>,
    document.body
  );
}
