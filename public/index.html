/* ---------------------------------------------------------------------
   Tide section — official Admiralty/UKHO data for UK & Ireland where a
   station is close enough to trust, modeled Open-Meteo curve everywhere
   else. Nothing here is cached beyond the current session, per the
   Discovery tier's terms.
--------------------------------------------------------------------- */
const TIDE_STATION_MAX_KM = 40;

function TideSection({ location, tideStations, marine, currentTime }) {
  const [events, setEvents] = useState(null);
  const [loadError, setLoadError] = useState(false);
  const [dayIdx, setDayIdx] = useState(0);

  // Compute the nearest station regardless of distance, so we can explain
  // *why* official data isn't showing (too far vs. station list never
  // loaded vs. the station itself failed to return events) instead of
  // silently falling back with no way to tell which happened.
  const nearestAny = useMemo(() => {
    if (!location || !tideStations || tideStations.length === 0) return null;
    return nearestStation(tideStations, location.lat, location.lon, Infinity);
    // Keyed on coordinates, not the location object, so patching an
    // unrelated field on the location doesn't recompute (and refetch).
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [location && location.lat, location && location.lon, tideStations]);
  const station = nearestAny && nearestAny.distanceKm <= TIDE_STATION_MAX_KM ? nearestAny : null;

  // Refetch only when the resolved STATION changes — predictions are
  // station-based, so moving within the same station's range needs no new
  // call (which matters: Admiralty's free tier is quota-capped and its
  // terms bar us from caching the response).
  const stationId = station ? station.id : null;
  useEffect(() => {
    if (!stationId) { setEvents(null); return; }
    setLoadError(false);
    fetchTideEvents(stationId).then(setEvents).catch(() => setLoadError(true));
  }, [stationId]);

  useEffect(() => { setDayIdx(0); }, [events]);

  // Official data available and loaded — this takes priority.
  if (station && events) {
    const now = Date.now();
    const upcoming = events.filter((e) => parseAdmiraltyTime(e.DateTime).getTime() > now);
    const days = groupEventsByDay(upcoming);
    const activeIdx = Math.min(dayIdx, Math.max(0, days.length - 1));
    const activeDay = days[activeIdx];
    return (
      <div className="card">
        <div className="card-label">Tide — {station.name} (Official, UKHO)</div>
        {days.length === 0 ? (
          <p className="empty-hint" style={{ padding: 0 }}>
            {station.name} returned no upcoming events — this station may have limited data at the source (some smaller ports do).
          </p>
        ) : (
          <React.Fragment>
            <DayTabs days={days.map((d) => d.date)} selected={activeIdx} onSelect={setDayIdx} />
            <div style={{ marginTop: 10 }}>
              {activeDay.events.map((e, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderTop: i > 0 ? '1px solid var(--line)' : 'none' }}>
                  <span style={{ fontSize: 14 }}>{e.EventType === 'HighWater' ? 'High Water' : 'Low Water'}</span>
                  <span className="mono" style={{ fontSize: 14 }}>
                    {parseAdmiraltyTime(e.DateTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })} · {e.Height != null ? `${e.Height.toFixed(1)} m` : '— m'}
                  </span>
                </div>
              ))}
            </div>
          </React.Fragment>
        )}
        <div style={{ fontSize: 10, color: 'var(--ink-soft)', marginTop: 10, fontFamily: "'IBM Plex Mono', monospace" }}>
          Contains ADMIRALTY® tidal data: © Crown copyright and database right — up to 7 days ahead (Discovery tier limit)
        </div>
      </div>
    );
  }

  // Fallback: modeled sea-level curve from Open-Meteo — wherever there's
  // no nearby Admiralty station (outside UK/Ireland, or no key configured),
  // and also when the official station's data failed to load (offline, or
  // a station with limited source data at Admiralty's end). Better a
  // clearly-labeled modeled curve than no tide card at all.
  const hasTide = marine && marine.hourly && Array.isArray(marine.hourly.sea_level_height_msl);

  const diagnostic = station && loadError
    ? `Couldn't load official data for ${station.name} right now — showing the modeled curve instead.`
    : !tideStations || tideStations.length === 0
      ? "Official station list didn't load — check the Admiralty API key on the server."
      : nearestAny
        ? `Nearest official station: ${nearestAny.name}, ${nearestAny.distanceKm.toFixed(0)} km away (outside the ${TIDE_STATION_MAX_KM} km range used here).`
        : null;

  if (!hasTide) {
    return diagnostic ? <div className="empty-hint" style={{ margin: '0 14px 10px' }}>{diagnostic}</div> : null;
  }

  const tTimes = marine.hourly.time;
  const tHeights = marine.hourly.sea_level_height_msl;
  let tIdx = findNowIndex(tTimes, currentTime);
  if (tIdx === -1) tIdx = 0;
  const tideNow = tHeights[tIdx];
  const tPrev = tHeights[Math.max(0, tIdx - 1)];
  const tideTrend = tideNow > tPrev ? 'rising' : tideNow < tPrev ? 'falling' : 'steady';
  const extrema = findTideExtrema(tTimes, tHeights);
  const nextExtreme = extrema.find((e) => tTimes.indexOf(e.time) > tIdx) || null;
  const tideStart = Math.max(0, tIdx - 12);
  const tideHistory = tHeights.slice(tideStart, tIdx + 13);

  return (
    <div className="card">
      <div className="card-label">Tide (modeled — not an official tide table)</div>
      <Sparkline values={tideHistory} />
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8, fontSize: 13, color: 'var(--ink-soft)' }}>
        <span>{tideNow != null ? `${tideNow.toFixed(1)} m, ${tideTrend}` : '—'}</span>
        <span>
          {nextExtreme ? `Next ${nextExtreme.type}: ${new Date(nextExtreme.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}` : ''}
        </span>
      </div>
      {diagnostic && (
        <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 8 }}>{diagnostic}</div>
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   Coast direction picker — sets which compass direction points out to
   open water for a location, so wind can be classified as onshore/
   offshore/cross-shore. There's no reliable way to infer this
   automatically from a coordinate, so it's a one-time per-location
   setting rather than something computed.
--------------------------------------------------------------------- */
function SeawardCompass({ value, onSelect }) {
  const size = 180, cx = 90, cy = 90, r = 66;
  const dirs = [
    { deg: 0, label: 'N' }, { deg: 45, label: 'NE' }, { deg: 90, label: 'E' }, { deg: 135, label: 'SE' },
    { deg: 180, label: 'S' }, { deg: 225, label: 'SW' }, { deg: 270, label: 'W' }, { deg: 315, label: 'NW' },
  ];
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--line)" strokeWidth="1.5" />
      <circle cx={cx} cy={cy} r="3" fill="var(--ink-soft)" />
      {dirs.map(({ deg, label }) => {
        const rad = ((deg - 90) * Math.PI) / 180;
        const x = cx + r * Math.cos(rad), y = cy + r * Math.sin(rad);
        const active = value === deg;
        return (
          <g key={deg} onClick={() => onSelect(deg)} style={{ cursor: 'pointer' }}>
            <circle cx={x} cy={y} r="17" fill={active ? 'var(--accent)' : 'var(--panel-raised)'} stroke="var(--line)" />
            <text x={x} y={y + 4} textAnchor="middle" fontSize="12" fontWeight="600" fill={active ? 'var(--panel-raised)' : 'var(--ink)'}>{label}</text>
          </g>
        );
      })}
    </svg>
  );
}

function CoastDirectionSheet({ location, onSelect, onClose }) {
  return ReactDOM.createPortal(
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" style={{ maxHeight: '60vh' }} onClick={(e) => e.stopPropagation()}>
        <div className="sheet-grip" />
        <div className="sheet-title-row">
          <h2>Which way is the sea?</h2>
          <button className="icon-btn" onClick={onClose} aria-label="Close"><Icon.Close /></button>
        </div>
        <p className="empty-hint" style={{ padding: '0 0 12px' }}>
          For {location ? location.label : 'this location'} — pick the compass direction pointing from the shore out to open water. Used to work out onshore/offshore wind.
        </p>
        <div style={{ display: 'flex', justifyContent: 'center', paddingBottom: 10 }}>
          <SeawardCompass value={location ? location.seaward : null} onSelect={(deg) => { onSelect(deg); onClose(); }} />
        </div>
      </div>
    </div>,
    document.body
  );
}

/* ---------------------------------------------------------------------
   Forecast section — 7-day outlook (temp/wind/wave), same day-tab
   pattern as the tide card, driven by the daily aggregates Open-Meteo
   already returns rather than us aggregating hourly data ourselves.
--------------------------------------------------------------------- */
function ForecastSection({ weather, marine, windUnit, seaward }) {
  const [dayIdx, setDayIdx] = useState(0);
  const rawDaily = weather && weather.daily;
  if (!rawDaily || !Array.isArray(rawDaily.time) || rawDaily.time.length === 0) return null;

  // past_days=1 (set for the hourly trend chart's backward history) also
  // shifts the daily arrays, so daily.time[0] is yesterday, not today —
  // slice every daily field to actually start from today, rather than
  // assuming index 0. This was the root cause of a crash when switching
  // to a new location: an unguarded null at the misaligned boundary day.
  // Built from LOCAL date parts, not toISOString() — that's the UTC date,
  // and daily.time is location-local, so during BST the hour after 11pm
  // used to label yesterday as "Today".
  const nowD = new Date();
  const pad2 = (n) => String(n).padStart(2, '0');
  const todayStr = `${nowD.getFullYear()}-${pad2(nowD.getMonth() + 1)}-${pad2(nowD.getDate())}`;
  let offset = rawDaily.time.indexOf(todayStr);
  if (offset === -1) offset = 0;
  function sliceFromToday(d) {
    if (!d) return d;
    const out = {};
    for (const key of Object.keys(d)) {
      out[key] = Array.isArray(d[key]) ? d[key].slice(offset) : d[key];
    }
    return out;
  }
  const daily = sliceFromToday(rawDaily);
  const mdaily = marine && marine.daily ? sliceFromToday(marine.daily) : null;

  if (daily.time.length === 0) return null;
  const days = daily.time.map((t) => new Date(t + 'T12:00:00'));
  const i = Math.min(dayIdx, days.length - 1);

  const windKn = daily.wind_speed_10m_max && daily.wind_speed_10m_max[i] != null ? daily.wind_speed_10m_max[i] : null;
  const windDisplay = windKn != null ? (windUnit === 'mph' ? Math.round(windKn * KN_TO_MPH) : Math.round(windKn)) : null;
  const windDir = daily.wind_direction_10m_dominant && daily.wind_direction_10m_dominant[i] != null ? daily.wind_direction_10m_dominant[i] : null;
  const bf = windKn != null ? beaufort(windKn) : null;
  const shore = seaward != null && windDir != null ? classifyShoreWind(windDir, seaward) : null;
  const tempMin = daily.temperature_2m_min && daily.temperature_2m_min[i] != null ? daily.temperature_2m_min[i] : null;
  const tempMax = daily.temperature_2m_max && daily.temperature_2m_max[i] != null ? daily.temperature_2m_max[i] : null;
  const uvMax = daily.uv_index_max && daily.uv_index_max[i] != null ? daily.uv_index_max[i] : null;

  const hasWave = mdaily && Array.isArray(mdaily.wave_height_max) && mdaily.wave_height_max[i] != null;
  const waveHeight = hasWave ? mdaily.wave_height_max[i] : null;
  const swellHeight = mdaily && mdaily.swell_wave_height_max && mdaily.swell_wave_height_max[i] != null ? mdaily.swell_wave_height_max[i] : null;

  return (
    <div className="card">
      <div className="card-label">7-Day Forecast</div>
      <DayTabs days={days} selected={i} onSelect={setDayIdx} />
      <div className="section-body" style={{ paddingTop: 12, paddingLeft: 0, paddingRight: 0 }}>
        <div className="stat">
          <span className="label">TEMP</span>
          <span className="value mono">
            {tempMin != null ? tempMin.toFixed(0) : '—'}–{tempMax != null ? tempMax.toFixed(0) : '—'}°C
          </span>
        </div>
        <div className="stat">
          <span className="label">UV MAX</span>
          <span className="value mono">{uvMax != null ? uvMax.toFixed(1) : '—'}</span>
        </div>
        <div className="stat">
          <span className="label">WIND (MAX)</span>
          <span className="value mono">{windDisplay != null ? `${windDisplay} ${windUnit === 'mph' ? 'MPH' : 'KN'}` : '—'}{bf ? ` · F${bf.force}` : ''}</span>
        </div>
        <div className="stat">
          <span className="label">WIND DIR{shore ? ` · ${shore.toUpperCase()}` : ''}</span>
          <span className="value">{windDir != null ? compassLabel(windDir) : '—'}</span>
        </div>
        {hasWave && (
          <React.Fragment>
            <div className="stat">
              <span className="label">WAVE (MAX)</span>
              <span className="value mono">{waveHeight.toFixed(1)} m</span>
            </div>
            <div className="stat">
              <span className="label">SWELL (MAX)</span>
              <span className="value mono">{swellHeight != null ? swellHeight.toFixed(1) + ' m' : '—'}</span>
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

function GaugeView({ weather, marine, windUnit, location, tideStations, onUpdateLocation }) {
  const [coastSheetOpen, setCoastSheetOpen] = useState(false);
  const [touchIdx, setTouchIdx] = useState(null);
  if (!weather) {
    return <div className="view"><p className="empty-hint" style={{ padding: 24 }}>Loading conditions…</p></div>;
  }

  const cur = weather.current;
  const hourly = weather.hourly;
  const times = hourly.time;
  const nowIso = cur.time;
  let nowIdx = findNowIndex(times, nowIso);
  if (nowIdx === -1) nowIdx = 0;
  const prevIdx = Math.max(0, nowIdx - 3);
  const delta = hourly.pressure_msl[nowIdx] - hourly.pressure_msl[prevIdx];
  const trend = classifyTrend(delta);

  const historyStart = Math.max(0, nowIdx - 24);
  const historyValues = hourly.pressure_msl.slice(historyStart, nowIdx + 1);
  const historyTimes = times.slice(historyStart, nowIdx + 1);

  const windKn = cur.wind_speed_10m;
  const windDisplay = windUnit === 'mph' ? Math.round(windKn * KN_TO_MPH) : Math.round(windKn);
  const windUnitLabel = windUnit === 'mph' ? 'MPH' : 'KN';

  let uvNow = null;
  if (hourly.uv_index && hourly.uv_index[nowIdx] != null) uvNow = hourly.uv_index[nowIdx];

  const moon = moonPhase(new Date());
  const bf = beaufort(windKn);
  const shoreWind = location ? classifyShoreWind(cur.wind_direction_10m, location.seaward) : null;

  // Marine data only exists for coastal/sea coordinates — inland lakes and
  // rivers return null for these fields, so every marine section below is
  // conditional on actually having a number to show.
  const mcur = marine && marine.current;
  const hasWave = mcur && typeof mcur.wave_height === 'number';

  return (
    <div className="view">
      <div className="gauge-composite">
        <TrendChartCanvas values={historyValues} height={210} touchIdx={touchIdx} onTouchIdx={setTouchIdx} />
        <div className="gauge-overlay">
          <PressureGaugeArc pressure={cur.pressure_msl} width={350} height={210} />
        </div>
      </div>
      <div className="pressure-readout">
        <SevenSegDisplay value={cur.pressure_msl.toFixed(0)} size={42} />
        <span style={{ fontSize: 14, color: 'var(--ink-soft)', fontFamily: "'IBM Plex Mono', monospace", marginBottom: 3 }}>hPa</span>
      </div>
      <div className="mono" style={{ fontSize: 12, color: 'var(--ink-soft)', textAlign: 'center', marginTop: 4 }}>
        {touchIdx != null
          ? `${historyValues[touchIdx].toFixed(1)} hPa${historyTimes[touchIdx] ? ' · ' + new Date(historyTimes[touchIdx]).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : ''}`
          : `Max ${Math.max(...historyValues).toFixed(1)} · Min ${Math.min(...historyValues).toFixed(1)} hPa`}
      </div>
      <div className={`trend-row ${trend.dir === 'down' ? 'falling' : ''}`}>
        {trend.dir === 'up' && <Icon.ArrowUp className="arrow" />}
        {trend.dir === 'down' && <Icon.ArrowDown className="arrow" />}
        {trend.dir === 'flat' && <Icon.ArrowRight className="arrow" />}
        <span>{trend.label} · {delta >= 0 ? '+' : ''}{delta.toFixed(1)} hPa / 3h</span>
      </div>

      <Section title="Conditions" defaultOpen={true}>
        <div className="stat">
          <span className="label">TEMPERATURE</span>
          <span className="value mono">{cur.temperature_2m.toFixed(0)}°C</span>
        </div>
        <div className="stat">
          <span className="label">FEELS LIKE</span>
          <span className="value mono">{cur.apparent_temperature.toFixed(0)}°C</span>
        </div>
        <div className="stat">
          <span className="label">HUMIDITY</span>
          <span className="value mono">{cur.relative_humidity_2m.toFixed(0)}%</span>
        </div>
        <div className="stat">
          <span className="label">UV INDEX</span>
          <span className="value mono">{uvNow != null ? uvNow.toFixed(1) : '—'}</span>
        </div>

        <div className="wind-block">
          <WindCompass deg={cur.wind_direction_10m} />
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 10 }}>
            <div>
              <div className="stat" style={{ marginBottom: 4 }}>
                <span className="label">WIND, FROM {compassLabel(cur.wind_direction_10m)}</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6 }}>
                <SevenSegDisplay value={String(windDisplay).padStart(2, '0')} size={22} />
                <span className="lcd-unit" style={{ color: 'var(--ink-soft)', fontSize: 11 }}>{windUnitLabel}</span>
              </div>
              <div style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 4, fontFamily: "'IBM Plex Mono', monospace" }}>
                FORCE {bf.force} · {bf.label.toUpperCase()}
              </div>
              {shoreWind ? (
                <button
                  className="mono"
                  style={{ fontSize: 11, color: 'var(--accent)', marginTop: 4, fontWeight: 600, padding: 0 }}
                  onClick={() => setCoastSheetOpen(true)}
                >
                  {shoreWind.toUpperCase()} WIND
                </button>
              ) : (
                <button
                  style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 4, textDecoration: 'underline', padding: 0 }}
                  onClick={() => setCoastSheetOpen(true)}
                >
                  Set coast direction
                </button>
              )}
            </div>
          </div>
        </div>

        <div className="moon-block">
          <MoonGlyph frac={moon.frac} />
          <div className="stat">
            <span className="label">MOON</span>
            <span className="value">{moon.name}</span>
          </div>
        </div>
      </Section>

      {hasWave ? (
        <Section title="Sea Conditions" defaultOpen={true}>
          <div className="stat">
            <span className="label">WAVE HEIGHT</span>
            <span className="value mono">{mcur.wave_height.toFixed(1)} m</span>
          </div>
          <div className="stat">
            <span className="label">WAVE PERIOD</span>
            <span className="value mono">{mcur.wave_period != null ? mcur.wave_period.toFixed(0) + ' s' : '—'}</span>
          </div>
          <div className="stat">
            <span className="label">SWELL</span>
            <span className="value mono">
              {mcur.swell_wave_height != null ? mcur.swell_wave_height.toFixed(1) + ' m' : '—'}
              {mcur.swell_wave_direction != null ? ` from ${compassLabel(mcur.swell_wave_direction)}` : ''}
            </span>
          </div>
          <div className="stat">
            <span className="label">WATER TEMP</span>
            <span className="value mono">{mcur.sea_surface_temperature != null ? mcur.sea_surface_temperature.toFixed(0) + '°C' : '—'}</span>
          </div>
        </Section>
      ) : (
        <div className="empty-hint" style={{ margin: '0 14px 10px' }}>
          No sea/wave data at this location — marine forecasts only cover coastal and open water, not inland lakes or rivers.
        </div>
      )}

      <ForecastSection weather={weather} marine={marine} windUnit={windUnit} seaward={location ? location.seaward : null} />

      <TideSection location={location} tideStations={tideStations} marine={marine} currentTime={cur.time} />

      {coastSheetOpen && (
        <CoastDirectionSheet
          location={location}
          onSelect={(deg) => onUpdateLocation && location && onUpdateLocation(location.id, { seaward: deg })}
          onClose={() => setCoastSheetOpen(false)}
        />
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   Map view — computed isobar contours over an OSM base layer
--------------------------------------------------------------------- */
function MapView({ location }) {
  const mapRef = useRef(null);
  const leafletRef = useRef(null);
  const contourLayerRef = useRef(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(false);

  const loadIsobars = useCallback(async () => {
    if (!location || !leafletRef.current) return;
    setLoading(true);
    setError(false);
    try {
      const { grid, values } = await fetchPressureGrid(location.lat, location.lon);
      const contours = computeContours(grid, values);
      if (contourLayerRef.current) {
        leafletRef.current.removeLayer(contourLayerRef.current);
      }
      const layerGroup = L.layerGroup();
      contours.forEach((c) => {
        let labeled = false;
        const isMajor = c.value % 20 === 0;
        c.coordinates.forEach((polygon) => {
          polygon.forEach((ring) => {
            const latlngs = ring.map(([gx, gy]) => gridToLatLng(gx, gy, grid));
            L.polyline(latlngs, {
              color: isMajor ? ISOBAR_COLOR_MAJOR : ISOBAR_COLOR,
              weight: isMajor ? 2.2 : 1.1,
              opacity: 0.75,
            }).addTo(layerGroup);
            if (!labeled && latlngs.length > 4) {
              const mid = latlngs[Math.floor(latlngs.length / 2)];
              L.marker(mid, {
                icon: L.divIcon({ className: 'isobar-label', html: String(c.value), iconSize: [30, 14] }),
                interactive: false,
              }).addTo(layerGroup);
              labeled = true;
            }
          });
        });
      });
      layerGroup.addTo(leafletRef.current);
      contourLayerRef.current = layerGroup;
    } catch {
      setError(true);
    } finally {
      setLoading(false);
    }
  }, [location]);

  // One effect keyed on coordinates: build the map, load isobars, and tear
  // it all down again on unmount or location change. Leaflet maps that are
  // never .remove()d leak the instance plus a window resize listener every
  // time this tab is left — and the previous two-effect split here also
  // double-fired loadIsobars on first mount.
  useEffect(() => {
    if (!location) return;
    const map = L.map(mapRef.current, { zoomControl: true }).setView([location.lat, location.lon], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 12,
    }).addTo(map);
    L.tileLayer(SEAMARK_TILE_URL, {
      attribution: 'Seamarks &copy; OpenSeaMap contributors',
      maxZoom: 18,
    }).addTo(map);
    L.marker([location.lat, location.lon]).addTo(map);
    leafletRef.current = map;
    loadIsobars();
    return () => {
      map.remove();
      leafletRef.current = null;
      contourLayerRef.current = null;
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [location && location.lat, location && location.lon]);

  return (
    <div className="view map-view">
      <div id="map" ref={mapRef}></div>
      {loading && <div className="map-status">Loading isobars…</div>}
      {error && <div className="map-status">Couldn't load isobars right now</div>}
    </div>
  );
}

/* ---------------------------------------------------------------------
   Route view — tap the map to add waypoints; distance/bearing per leg,
   and a drift-adjusted ETA using ocean current where it's available.
   Routes are session-only (not saved) in this version.
--------------------------------------------------------------------- */
const KN_TO_KMH = 1.852;

function RouteSaveSheet({ initialName, onSave, onClose }) {
  const [name, setName] = useState(initialName || '');
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);
  return ReactDOM.createPortal(
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" style={{ maxHeight: '50vh' }} onClick={(e) => e.stopPropagation()}>
        <div className="sheet-grip" />
        <div className="sheet-title-row">
          <h2>Save Route</h2>
          <button className="icon-btn" onClick={onClose} aria-label="Close"><Icon.Close /></button>
        </div>
        <input
          className="log-input"
          placeholder="Name this route"
          value={name}
          onChange={(e) => setName(e.target.value)}
          autoFocus
        />
        {error && <p className="empty-hint" style={{ color: 'var(--storm)', padding: '8px 0 0' }}>{error}</p>}
        <button
          className="watch-btn"
          style={{ width: '100%', marginTop: 12 }}
          disabled={saving}
          onClick={async () => {
            setSaving(true);
            setError(null);
            try {
              await onSave(name.trim() || 'Unnamed route');
            } catch {
              // Without this, a failed save left the button stuck on
              // "Saving…" with no way out short of closing the sheet.
              setError("Couldn't save — check your connection and try again.");
              setSaving(false);
            }
          }}
        >
          {saving ? 'Saving…' : 'Save'}
        </button>
      </div>
    </div>,
    document.body
  );
}

function RouteLoadSheet({ onLoad, onClose }) {
  const [routes, setRoutes] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetchRoutes().then(setRoutes).catch(() => {}).finally(() => setLoading(false));
  }, []);

  async function handleDelete(id) {
    await deleteRouteApi(id);
    setRoutes((r) => r.filter((route) => route.id !== id));
  }

  return ReactDOM.createPortal(
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheet-grip" />
        <div className="sheet-title-row">
          <h2>Load Route</h2>
          <button className="icon-btn" onClick={onClose} aria-label="Close"><Icon.Close /></button>
        </div>
        <div className="sheet-scroll">
          {loading ? (
            <p className="empty-hint">Loading…</p>
          ) : routes.length === 0 ? (
            <p className="empty-hint">No saved routes yet.</p>
          ) : (
            routes.map((route) => (
              <div className="fav-row" key={route.id}>
                <button className="fav-main" onClick={() => onLoad(route)}>
                  <span className="name">{route.name || 'Unnamed route'}</span>
                  <span className="sub">{route.waypoints.length} points{route.closed ? ', closed loop' : ''}</span>
                </button>
                <button className="icon-btn" onClick={() => handleDelete(route.id)} aria-label="Delete route"><Icon.Trash /></button>
              </div>
            ))
          )}
        </div>
      </div>
    </div>,
    document.body
  );
}

function RouteView({ location, marine, windUnit }) {
  const mapRef = useRef(null);
  // The map lives in state (not a ref) so the waypoint/position effects
  // below re-run once it exists — with a ref they'd silently no-op if they
  // ran before the map was created.
  const [mapObj, setMapObj] = useState(null);
  const layerRef = useRef(null);
  const myMarkerRef = useRef(null);
  const rowRefs = useRef({});
  const watchIdRef = useRef(null);
  const [waypoints, setWaypoints] = useState([]);
  const [plannedSpeed, setPlannedSpeed] = useState(3);
  const [closed, setClosed] = useState(false);
  // Remembered from save/load so the GPX export and re-saves keep the
  // route's actual name instead of a generic "route".
  const [routeName, setRouteName] = useState('');
  const [panelCollapsed, setPanelCollapsed] = useState(false);
  const [tracking, setTracking] = useState(false);
  const [myPosition, setMyPosition] = useState(null);
  const [trackError, setTrackError] = useState(null);
  const [saveOpen, setSaveOpen] = useState(false);
  const [loadOpen, setLoadOpen] = useState(false);

  // Leaflet doesn't notice CSS-driven container resizes on its own — tell
  // it to remeasure after the panel's collapse/expand transition finishes.
  useEffect(() => {
    if (!mapObj) return;
    const t = setTimeout(() => mapObj.invalidateSize(), 280);
    return () => clearTimeout(t);
  }, [mapObj, panelCollapsed]);

  // Live tracking is foreground-only — iOS suspends background web apps,
  // same limitation as everything else in this app that's tried to use
  // geolocation continuously. Stated plainly in the UI, not just here.
  function startTracking() {
    if (!('geolocation' in navigator)) { setTrackError('Geolocation is not available in this browser.'); return; }
    setTrackError(null);
    watchIdRef.current = navigator.geolocation.watchPosition(
      (pos) => setMyPosition({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
      () => setTrackError('Lost GPS signal — position updates stopped.'),
      { enableHighAccuracy: true, maximumAge: 5000 }
    );
    setTracking(true);
  }
  function stopTracking() {
    if (watchIdRef.current != null) navigator.geolocation.clearWatch(watchIdRef.current);
    watchIdRef.current = null;
    setTracking(false);
    setMyPosition(null);
    setTrackError(null);
  }
  useEffect(() => () => { if (watchIdRef.current != null) navigator.geolocation.clearWatch(watchIdRef.current); }, []);

  useEffect(() => {
    if (!mapObj) return;
    if (myMarkerRef.current) { mapObj.removeLayer(myMarkerRef.current); myMarkerRef.current = null; }
    if (myPosition) {
      myMarkerRef.current = L.circleMarker([myPosition.lat, myPosition.lon], {
        radius: 8, color: '#A23E32', fillColor: '#A23E32', fillOpacity: 0.9, weight: 2,
      }).addTo(mapObj);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [mapObj, myPosition]);

  useEffect(() => {
    if (!location) return;
    const map = L.map(mapRef.current, { zoomControl: true }).setView([location.lat, location.lon], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 18,
    }).addTo(map);
    L.tileLayer(SEAMARK_TILE_URL, {
      attribution: 'Seamarks &copy; OpenSeaMap contributors',
      maxZoom: 18,
    }).addTo(map);
    // Default bottom-right attribution collides with the route panel
    // overlaying the bottom 40% of this screen — move it clear of that.
    if (map.attributionControl) map.attributionControl.setPosition('topright');
    map.on('click', (e) => {
      setClosed(false);
      setWaypoints((wp) => [...wp, { lat: e.latlng.lat, lon: e.latlng.lng }]);
    });
    setMapObj(map);
    // Tear down on unmount/location change — an un-removed Leaflet map
    // leaks the instance and a window resize listener per tab visit.
    return () => {
      map.remove();
      setMapObj(null);
      layerRef.current = null;
      myMarkerRef.current = null;
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [location && location.lat, location && location.lon]);

  function removeWaypoint(index) {
    setWaypoints((wp) => {
      const next = wp.filter((_, i) => i !== index);
      if (next.length < 2) setClosed(false);
      return next;
    });
  }
  function updateWaypoint(index, lat, lon) {
    setWaypoints((wp) => wp.map((p, i) => (i === index ? { lat, lon } : p)));
  }
  function scrollToPoint(i) {
    const el = rowRefs.current[i];
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  useEffect(() => {
    if (!mapObj) return;
    if (layerRef.current) mapObj.removeLayer(layerRef.current);
    const group = L.layerGroup();
    const trashSvg = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F0DDAE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6M14 11v6"></path></svg>';
    waypoints.forEach((wp, i) => {
      const marker = L.marker([wp.lat, wp.lon], {
        icon: L.divIcon({ className: 'isobar-label', html: String(i + 1), iconSize: [22, 22] }),
        draggable: true,
      });
      marker.on('dragend', () => {
        const { lat, lng } = marker.getLatLng();
        updateWaypoint(i, lat, lng);
      });
      const canClose = i === 0 && waypoints.length >= 2 && !closed;
      marker.bindPopup(
        canClose
          ? `<div class="popup-actions"><button type="button" class="popup-remove-btn popup-close-btn">Close Loop</button><button type="button" class="popup-remove-btn popup-icon-btn" aria-label="Remove point">${trashSvg}</button></div>`
          : `<button type="button" class="popup-remove-btn popup-icon-btn" aria-label="Remove point">${trashSvg}</button>`
      );
      marker.on('popupopen', (e) => {
        scrollToPoint(i);
        const el = e.popup.getElement();
        if (!el) return;
        const removeBtn = el.querySelector('.popup-icon-btn');
        if (removeBtn) removeBtn.onclick = () => removeWaypoint(i);
        const closeBtn = el.querySelector('.popup-close-btn');
        if (closeBtn) closeBtn.onclick = () => { setClosed(true); marker.closePopup(); };
      });
      marker.on('click', () => scrollToPoint(i));
      marker.addTo(group);
    });
    if (waypoints.length > 1) {
      const linePts = waypoints.map((w) => [w.lat, w.lon]);
      if (closed) linePts.push([waypoints[0].lat, waypoints[0].lon]);
      L.polyline(linePts, { color: '#211A0F', weight: 2.5, dashArray: '6 5' }).addTo(group);
    }
    group.addTo(mapObj);
    layerRef.current = group;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [mapObj, waypoints, closed]);

  const legs = [];
  for (let i = 0; i < waypoints.length - 1; i++) {
    const a = waypoints[i], b = waypoints[i + 1];
    legs.push({
      distanceKm: haversineKm(a.lat, a.lon, b.lat, b.lon),
      bearing: initialBearing(a.lat, a.lon, b.lat, b.lon),
    });
  }
  if (closed && waypoints.length >= 2) {
    const a = waypoints[waypoints.length - 1], b = waypoints[0];
    legs.push({
      distanceKm: haversineKm(a.lat, a.lon, b.lat, b.lon),
      bearing: initialBearing(a.lat, a.lon, b.lat, b.lon),
      closing: true,
    });
  }
  const totalKm = legs.reduce((s, l) => s + l.distanceKm, 0);

  const hasCurrent = marine && marine.current && typeof marine.current.ocean_current_velocity === 'number';
  const currentKn = hasCurrent ? marine.current.ocean_current_velocity : 0;
  // Ocean current direction is the direction the water flows TOWARD
  // (opposite convention to wind, which is reported as the direction it
  // blows FROM) — worth sanity-checking against a local current chart
  // before relying on this for real route timing.
  const currentDir = hasCurrent ? marine.current.ocean_current_direction : 0;
  const plannedSpeedKn = windUnit === 'mph' ? plannedSpeed / KN_TO_MPH : plannedSpeed;

  let totalHours = 0, unreachable = false;
  legs.forEach((leg) => {
    const along = hasCurrent ? currentKn * Math.cos(((currentDir - leg.bearing) * Math.PI) / 180) : 0;
    const effectiveKn = plannedSpeedKn + along;
    if (effectiveKn <= 0.05) { unreachable = true; return; }
    totalHours += leg.distanceKm / (effectiveKn * KN_TO_KMH);
  });

  function formatDuration(hours) {
    const h = Math.floor(hours);
    const m = Math.round((hours - h) * 60);
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
  }

  const tidalGate = computeTidalGate(marine, waypoints, plannedSpeedKn, totalKm);
  const trackTarget = waypoints.length > 0 ? (closed ? waypoints[0] : waypoints[waypoints.length - 1]) : null;
  const distanceRemainingKm = myPosition && trackTarget ? haversineKm(myPosition.lat, myPosition.lon, trackTarget.lat, trackTarget.lon) : null;

  return (
    <div className="view map-view">
      <div id="map" ref={mapRef} style={{ bottom: panelCollapsed ? '56px' : '40%' }}></div>
      <div className={`route-panel ${panelCollapsed ? 'collapsed' : ''}`}>
        <div className="route-panel-head">
          <button className="route-fold-btn" onClick={() => setPanelCollapsed((c) => !c)} aria-label={panelCollapsed ? 'Expand route panel' : 'Collapse route panel, show more map'}>
            <Icon.Chevron style={{ transform: panelCollapsed ? 'none' : 'rotate(180deg)' }} />
          </button>
          <span className="card-label" style={{ margin: 0, flex: 1 }}>
            Route ({waypoints.length} point{waypoints.length === 1 ? '' : 's'}{closed ? ', closed loop' : ''})
          </span>
          {waypoints.length > 1 && (
            <button className="icon-btn" onClick={() => setWaypoints((wp) => [...wp].reverse())} aria-label="Reverse route"><Icon.Reverse /></button>
          )}
          <button className="icon-btn" onClick={() => { setWaypoints([]); setClosed(false); setRouteName(''); }} aria-label="Clear route"><Icon.Trash /></button>
        </div>
        {!panelCollapsed && (
        <React.Fragment>
        {waypoints.length === 0 ? (
          <p className="empty-hint">Tap the map to drop waypoints. Drag a point to move it, or tap it for options — including closing the loop back to point 1.</p>
        ) : null}
          <div className="route-scroll">
            {waypoints.map((wp, i) => (
              <React.Fragment key={i}>
                <div className="fav-row" ref={(el) => { rowRefs.current[i] = el; }}>
                  <div className="fav-main">
                    <span className="name">Point {i + 1}</span>
                    <span className="sub">{wp.lat.toFixed(4)}, {wp.lon.toFixed(4)}</span>
                  </div>
                  <button className="icon-btn" onClick={() => removeWaypoint(i)} aria-label={`Remove point ${i + 1}`}><Icon.Trash /></button>
                </div>
                {legs[i] && (
                  <div style={{ padding: '2px 4px 8px', fontSize: 12, color: 'var(--ink-soft)' }}>
                    {legs[i].closing
                      ? `↳ closing leg to Point 1: ${legs[i].distanceKm.toFixed(2)} km · bearing ${legs[i].bearing.toFixed(0)}°`
                      : `↳ ${legs[i].distanceKm.toFixed(2)} km · bearing ${legs[i].bearing.toFixed(0)}°`}
                  </div>
                )}
              </React.Fragment>
            ))}
            {legs.length > 0 && (
              <div className="route-summary">
                <div className="stat">
                  <span className="label">TOTAL DISTANCE</span>
                  <span className="value mono">{totalKm.toFixed(2)} km</span>
                </div>
                <div className="stat">
                  <span className="label">EST. TIME{hasCurrent ? ' (CURRENT-ADJUSTED)' : ''}</span>
                  <span className="value mono">{unreachable ? 'Current opposes travel' : formatDuration(totalHours)}</span>
                </div>
              </div>
            )}
            {legs.length > 0 && !hasCurrent && (
              <div className="empty-hint" style={{ padding: '4px 4px 0' }}>No ocean current data here — time estimate uses planned speed only.</div>
            )}
          </div>
        <div className="speed-row">
          <span className="card-label" style={{ margin: 0 }}>Planned speed</span>
          <input
            type="number"
            className="speed-input mono"
            value={plannedSpeed}
            min="0.1"
            step="0.1"
            onChange={(e) => setPlannedSpeed(Math.max(0.1, Number(e.target.value) || 0))}
          />
          <span className="lcd-unit" style={{ color: 'var(--ink-soft)', fontSize: 12 }}>{windUnit === 'mph' ? 'MPH' : 'KN'}</span>
        </div>

        {tidalGate && tidalGate.best && (
          <div className="route-subcard">
            <div className="card-label" style={{ margin: 0 }}>Best departure (tidal gate)</div>
            <div style={{ fontSize: 13, marginTop: 4 }}>
              {new Date(tidalGate.best.time).toLocaleString([], { weekday: 'short', hour: '2-digit', minute: '2-digit' })}
              {' — '}ETA {formatDuration(tidalGate.best.hours)}
              {tidalGate.now.hours != null && tidalGate.best.hours < tidalGate.now.hours - 0.02 && (
                <span style={{ color: 'var(--ink-soft)' }}> (vs {formatDuration(tidalGate.now.hours)} leaving now)</span>
              )}
            </div>
            <div className="empty-hint" style={{ padding: '4px 0 0' }}>
              Approximate — applies one current value to the whole route, and Open-Meteo's own model is coarse (~8km) and less reliable in tight coastlines.
            </div>
          </div>
        )}

        {waypoints.length > 0 && (
          <div className="route-subcard">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span className="card-label" style={{ margin: 0 }}>Live tracking</span>
              <button className={`watch-btn-sm ${tracking ? 'active' : ''}`} onClick={tracking ? stopTracking : startTracking}>
                {tracking ? 'Stop' : 'Start'}
              </button>
            </div>
            {tracking && (
              <div style={{ fontSize: 13, marginTop: 6 }} className="mono">
                {distanceRemainingKm != null ? `${distanceRemainingKm.toFixed(2)} km to ${closed ? 'start' : 'end'}` : 'Waiting for GPS…'}
              </div>
            )}
            {trackError && <div className="empty-hint" style={{ padding: '4px 0 0' }}>{trackError}</div>}
            <div className="empty-hint" style={{ padding: '4px 0 0' }}>
              Only works with this screen open and your phone unlocked — iOS suspends web apps in the background.
            </div>
          </div>
        )}

        <div className="route-actions">
          <button className="route-action-btn" onClick={() => setSaveOpen(true)} disabled={waypoints.length < 2}>Save Route</button>
          <button className="route-action-btn" onClick={() => setLoadOpen(true)}>Load Route</button>
          <button className="route-action-btn" onClick={() => downloadGPX(waypoints, closed, routeName || 'route')} disabled={waypoints.length < 2}>Export GPX</button>
        </div>
        </React.Fragment>
        )}
      </div>

      {saveOpen && (
        <RouteSaveSheet
          initialName={routeName}
          onSave={async (name) => {
            await saveRouteApi({ name, waypoints, closed, plannedSpeed, windUnit });
            setRouteName(name);
            setSaveOpen(false);
          }}
          onClose={() => setSaveOpen(false)}
        />
      )}
      {loadOpen && (
        <RouteLoadSheet
          onLoad={(route) => {
            setWaypoints(route.waypoints);
            setClosed(!!route.closed);
            setRouteName(route.name || '');
            if (route.plannedSpeed) setPlannedSpeed(route.plannedSpeed);
            setLoadOpen(false);
          }}
          onClose={() => setLoadOpen(false)}
        />
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   Voyage log — form for a new entry (auto-captures the current weather
   snapshot), and the list view with per-entry share-as-image.
--------------------------------------------------------------------- */
function LogEntryForm({ weather, marine, location, windUnit, onClose, onSaved }) {
  const toLocalInputValue = (d) => {
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };
  const [date, setDate] = useState(() => toLocalInputValue(new Date()));
  const [comment, setComment] = useState('');
  const [photo, setPhoto] = useState(null);
  const [photoError, setPhotoError] = useState(null);
  const [saving, setSaving] = useState(false);
  const [saveError, setSaveError] = useState(null);

  async function handleFile(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setPhotoError(null);
    try {
      setPhoto(await compressImage(file, 1200, 0.8));
    } catch {
      setPhotoError("Couldn't read that photo — try a different one.");
    }
  }

  function buildWeatherSnapshot() {
    if (!weather || !weather.current) return null;
    const cur = weather.current;
    const mcur = marine && marine.current;
    const shore = location && location.seaward != null ? classifyShoreWind(cur.wind_direction_10m, location.seaward) : null;

    // Modeled tide reading at the current moment — same approach as the
    // Tide card's own fallback, since a log entry doesn't need to trigger
    // a separate official-station lookup just to capture a snapshot.
    let tideHeight = null, tideTrend = null;
    if (marine && marine.hourly && Array.isArray(marine.hourly.sea_level_height_msl)) {
      const tTimes = marine.hourly.time;
      const tHeights = marine.hourly.sea_level_height_msl;
      const tIdx = findNowIndex(tTimes, cur.time);
      if (tIdx !== -1 && tHeights[tIdx] != null) {
        tideHeight = tHeights[tIdx];
        const tPrev = tHeights[Math.max(0, tIdx - 1)];
        tideTrend = tPrev != null ? (tideHeight > tPrev ? 'rising' : tideHeight < tPrev ? 'falling' : 'steady') : null;
      }
    }

    return {
      pressure: cur.pressure_msl,
      temp: cur.temperature_2m,
      windSpeed: cur.wind_speed_10m,
      windDir: cur.wind_direction_10m,
      windUnit,
      shore,
      waveHeight: mcur && typeof mcur.wave_height === 'number' ? mcur.wave_height : null,
      swellHeight: mcur && typeof mcur.swell_wave_height === 'number' ? mcur.swell_wave_height : null,
      swellDir: mcur && typeof mcur.swell_wave_direction === 'number' ? mcur.swell_wave_direction : null,
      waterTemp: mcur && typeof mcur.sea_surface_temperature === 'number' ? mcur.sea_surface_temperature : null,
      tideHeight,
      tideTrend,
    };
  }

  async function handleSave() {
    setSaving(true);
    setSaveError(null);
    try {
      await saveLogEntry({
        date: new Date(date).toISOString(),
        locationLabel: location ? location.label : null,
        lat: location ? location.lat : null,
        lon: location ? location.lon : null,
        weather: buildWeatherSnapshot(),
        comment,
        photo,
      });
      onSaved();
    } catch {
      setSaveError("Couldn't save — check your connection and try again.");
    } finally {
      setSaving(false);
    }
  }

  const snap = buildWeatherSnapshot();

  return ReactDOM.createPortal(
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" style={{ maxHeight: '88vh' }} onClick={(e) => e.stopPropagation()}>
        <div className="sheet-grip" />
        <div className="sheet-title-row">
          <h2>New Log Entry</h2>
          <button className="icon-btn" onClick={onClose} aria-label="Close"><Icon.Close /></button>
        </div>
        <div className="sheet-scroll">
          <div className="card-label" style={{ marginTop: 0 }}>Date</div>
          <input type="datetime-local" className="log-input mono" value={date} onChange={(e) => setDate(e.target.value)} />

          <div className="card-label" style={{ marginTop: 14 }}>Conditions (auto-captured)</div>
          {snap ? (
            <div className="section-body" style={{ paddingLeft: 0, paddingRight: 0, paddingTop: 4 }}>
              <div className="stat"><span className="label">PRESSURE</span><span className="value mono">{snap.pressure.toFixed(0)} hPa</span></div>
              <div className="stat"><span className="label">TEMP</span><span className="value mono">{snap.temp.toFixed(0)}°C</span></div>
              {snap.waterTemp != null && <div className="stat"><span className="label">WATER TEMP</span><span className="value mono">{snap.waterTemp.toFixed(0)}°C</span></div>}
              {snap.shore && <div className="stat"><span className="label">SHORE</span><span className="value">{snap.shore}</span></div>}
              {snap.waveHeight != null && <div className="stat"><span className="label">WAVE</span><span className="value mono">{snap.waveHeight.toFixed(1)} m</span></div>}
              {snap.swellHeight != null && (
                <div className="stat">
                  <span className="label">SWELL</span>
                  <span className="value mono">{snap.swellHeight.toFixed(1)} m{snap.swellDir != null ? ` ${compassLabel(snap.swellDir)}` : ''}</span>
                </div>
              )}
              {snap.tideHeight != null && (
                <div className="stat">
                  <span className="label">TIDE (MODELED)</span>
                  <span className="value mono">{snap.tideHeight.toFixed(1)} m{snap.tideTrend ? `, ${snap.tideTrend}` : ''}</span>
                </div>
              )}
              <div className="wind-block" style={{ gridColumn: '1 / -1' }}>
                <WindCompass deg={snap.windDir} size={44} />
                <div className="stat">
                  <span className="label">WIND, FROM {compassLabel(snap.windDir)}</span>
                  <span className="value mono">{Math.round(snap.windSpeed)} {windUnit === 'mph' ? 'MPH' : 'KN'}</span>
                </div>
              </div>
            </div>
          ) : (
            <p className="empty-hint" style={{ padding: 0 }}>Weather hasn't loaded yet — this entry will save without a conditions snapshot.</p>
          )}

          <div className="card-label" style={{ marginTop: 14 }}>Photo</div>
          <input type="file" accept="image/*" onChange={handleFile} />
          {photoError && <p className="empty-hint" style={{ color: 'var(--storm)', padding: '4px 0 0' }}>{photoError}</p>}
          {photo && <img src={photo} alt="" style={{ width: '100%', borderRadius: 10, marginTop: 8, display: 'block' }} />}

          <div className="card-label" style={{ marginTop: 14 }}>Comment</div>
          <textarea className="log-textarea" value={comment} onChange={(e) => setComment(e.target.value)} rows={4} placeholder="How did it go?" />

          {saveError && <p className="empty-hint" style={{ color: 'var(--storm)', padding: '8px 0 0' }}>{saveError}</p>}

          <button className="watch-btn" style={{ marginTop: 16, width: '100%' }} disabled={saving} onClick={handleSave}>
            {saving ? 'Saving…' : 'Save Entry'}
          </button>
        </div>
      </div>
    </div>,
    document.body
  );
}

function LogEntryCard({ entry, onDelete }) {
  const [sharing, setSharing] = useState(false);
  const [shareNote, setShareNote] = useState(null);

  async function handleShare() {
    setSharing(true);
    setShareNote(null);
    try {
      const blob = await buildShareImage(entry);
      const file = new File([blob], 'voyage-log.jpg', { type: 'image/jpeg' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Voyage Log', text: entry.comment || '' });
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'voyage-log.jpg';
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 3000);
        setShareNote('Sharing isn\u2019t supported here — downloaded the image instead.');
      }
    } catch (e) {
      if (e && e.name !== 'AbortError') setShareNote("Couldn't prepare the image to share.");
    } finally {
      setSharing(false);
    }
  }

  const d = new Date(entry.date);
  return (
    <div className="card" style={{ display: 'flex', gap: 12 }}>
      {entry.photo && <img src={entry.photo} alt="" style={{ width: 72, height: 72, objectFit: 'cover', borderRadius: 8, flexShrink: 0 }} />}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
          <div>
            <div style={{ fontWeight: 600, fontSize: 14 }}>{entry.locationLabel || 'Unknown location'}</div>
            <div className="mono" style={{ fontSize: 11, color: 'var(--ink-soft)' }}>
              {d.toLocaleDateString()} {d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
            </div>
          </div>
          <button className="icon-btn" onClick={onDelete} aria-label="Delete entry"><Icon.Trash /></button>
        </div>
        {entry.weather && (
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 8, marginTop: 6 }}>
            {entry.weather.windDir != null && <WindCompass deg={entry.weather.windDir} size={30} />}
            <div className="mono" style={{ fontSize: 11, color: 'var(--ink-soft)', lineHeight: 1.5 }}>
              {entry.weather.pressure.toFixed(0)} hPa · {entry.weather.temp.toFixed(0)}°C
              {entry.weather.waterTemp != null ? ` · water ${entry.weather.waterTemp.toFixed(0)}°C` : ''}
              <br />
              {Math.round(entry.weather.windSpeed)} {entry.weather.windUnit === 'mph' ? 'MPH' : 'KN'} {entry.weather.windDir != null ? compassLabel(entry.weather.windDir) : ''}{entry.weather.shore ? ` (${entry.weather.shore})` : ''}
              {entry.weather.waveHeight != null ? ` · ${entry.weather.waveHeight.toFixed(1)}m waves` : ''}
              {entry.weather.swellHeight != null ? ` · ${entry.weather.swellHeight.toFixed(1)}m swell` : ''}
              {entry.weather.tideHeight != null ? <br /> : ''}
              {entry.weather.tideHeight != null ? `Tide ${entry.weather.tideHeight.toFixed(1)}m${entry.weather.tideTrend ? `, ${entry.weather.tideTrend}` : ''} (modeled)` : ''}
            </div>
          </div>
        )}
        {entry.comment && <div style={{ fontSize: 13, marginTop: 6 }}>{entry.comment}</div>}
        <button className="mono" style={{ fontSize: 12, color: 'var(--accent)', marginTop: 8, fontWeight: 600, padding: 0 }} onClick={handleShare} disabled={sharing}>
          {sharing ? 'Preparing…' : 'Share'}
        </button>
        {shareNote && <div className="empty-hint" style={{ padding: '4px 0 0' }}>{shareNote}</div>}
      </div>
    </div>
  );
}

function LogView({ weather, marine, location, windUnit }) {
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [formOpen, setFormOpen] = useState(false);

  async function refresh() {
    try {
      setEntries(await fetchLogEntries());
    } catch {
      // keep showing whatever was already loaded
    }
  }

  useEffect(() => {
    fetchLogEntries().then(setEntries).catch(() => {}).finally(() => setLoading(false));
  }, []);

  async function removeEntry(id) {
    await deleteLogEntry(id);
    refresh();
  }

  return (
    <div className="view">
      <div style={{ padding: '14px 14px 4px' }}>
        <button className="watch-btn" style={{ width: '100%' }} onClick={() => setFormOpen(true)}>+ New Log Entry</button>
      </div>
      {loading ? (
        <p className="empty-hint" style={{ padding: 24 }}>Loading log…</p>
      ) : entries.length === 0 ? (
        <p className="empty-hint" style={{ padding: 24 }}>No entries yet — log a trip once you're back.</p>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12, padding: '10px 14px 14px' }}>
          {entries.map((e) => (
            <LogEntryCard key={e.id} entry={e} onDelete={() => removeEntry(e.id)} />
          ))}
        </div>
      )}
      {formOpen && (
        <LogEntryForm
          weather={weather}
          marine={marine}
          location={location}
          windUnit={windUnit}
          onClose={() => setFormOpen(false)}
          onSaved={() => { setFormOpen(false); refresh(); }}
        />
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   App root
--------------------------------------------------------------------- */
function App() {
  const [state, setState] = useState(null);
  const [weather, setWeather] = useState(null);
  const [marine, setMarine] = useState(null);
  const [tideStations, setTideStations] = useState([]);
  const [tab, setTab] = useState('gauge');
  const [sheetOpen, setSheetOpen] = useState(false);
  const [lastFetchedAt, setLastFetchedAt] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [, setTick] = useState(0);

  // Fetch the Admiralty station list once — it's metadata (names/locations),
  // barely ever changes, and the backend caches it too. If no Admiralty key
  // is configured server-side, this just fails quietly and every location
  // falls back to the modeled tide curve.
  useEffect(() => {
    fetchTideStations().then((data) => setTideStations(parseStationList(data))).catch(() => {});
  }, []);

  // Force-reload on new deploy
  useEffect(() => {
    fetchVersion().then((version) => {
      const cached = localStorage.getItem('buildVersion');
      if (cached && cached !== version) {
        localStorage.setItem('buildVersion', version);
        window.location.reload();
      } else {
        localStorage.setItem('buildVersion', version);
      }
    }).catch(() => {});
  }, []);

  useEffect(() => {
    fetchState().then(setState).catch(() => setState({ locations: [], activeLocationId: null, windUnit: 'kn' }));
  }, []);

  // Keep the "X minutes ago" text live without waiting for a data refresh
  useEffect(() => {
    const id = setInterval(() => setTick((t) => t + 1), 60000);
    return () => clearInterval(id);
  }, []);

  // Offline indicator — with the service worker serving last-known data,
  // the app keeps working offline, so it needs to say when it's doing that.
  const [offline, setOffline] = useState(typeof navigator !== 'undefined' && navigator.onLine === false);
  useEffect(() => {
    const goOnline = () => setOffline(false);
    const goOffline = () => setOffline(true);
    window.addEventListener('online', goOnline);
    window.addEventListener('offline', goOffline);
    return () => {
      window.removeEventListener('online', goOnline);
      window.removeEventListener('offline', goOffline);
    };
  }, []);

  const [tempLocation, setTempLocation] = useState(null);
  const [showFavourites, setShowFavourites] = useState(false);

  const activeLocation = useMemo(() => {
    if (tempLocation) return tempLocation;
    if (!state) return null;
    return state.locations.find((l) => l.id === state.activeLocationId) || state.locations[0] || null;
  }, [tempLocation, state]);

  function updateLocationField(locationId, patch) {
    if (locationId === 'temp') {
      setTempLocation((t) => (t ? { ...t, ...patch } : t));
      return;
    }
    if (!state) return;
    const next = {
      ...state,
      locations: state.locations.map((l) => (l.id === locationId ? { ...l, ...patch } : l)),
    };
    setState(next);
    saveState(next);
  }

  // Views a place without saving it as a favourite — from a search result
  // or a dropped map pin. Session-only; a reload falls back to the last
  // saved favourite, which is the intended behaviour for something not
  // deliberately kept.
  function viewLocation(loc) {
    setTempLocation({ id: 'temp', timezone: 'auto', ...loc });
  }

  function saveTempAsFavourite(customLabel) {
    if (!tempLocation || !state) return;
    const id = `loc_${Date.now()}`;
    const loc = {
      id,
      label: (customLabel || tempLocation.label || 'Unnamed').trim() || 'Unnamed',
      lat: tempLocation.lat,
      lon: tempLocation.lon,
      timezone: tempLocation.timezone || 'auto',
    };
    const next = { ...state, locations: [...state.locations, loc], activeLocationId: id };
    setState(next);
    saveState(next);
    setTempLocation(null);
  }

  function selectFavourite(id) {
    if (!state) return;
    setTempLocation(null);
    const next = { ...state, activeLocationId: id };
    setState(next);
    saveState(next);
  }

  function renameFavourite(id, newLabel) {
    if (!state) return;
    const label = (newLabel || '').trim();
    if (!label) return;
    const next = { ...state, locations: state.locations.map((l) => (l.id === id ? { ...l, label } : l)) };
    setState(next);
    saveState(next);
  }

  function removeFavourite(id) {
    if (!state) return;
    const remaining = state.locations.filter((l) => l.id !== id);
    const nextActive = state.activeLocationId === id ? (remaining[0] ? remaining[0].id : null) : state.activeLocationId;
    const next = { ...state, locations: remaining, activeLocationId: nextActive };
    setState(next);
    saveState(next);
  }

  function setWindUnit(unit) {
    if (!state) return;
    const next = { ...state, windUnit: unit };
    setState(next);
    saveState(next);
  }

  // Keyed on coordinates, not the location object — patching a location
  // (setting coast direction, renaming the active favourite, saving a temp
  // spot) creates a new object with the same coords and shouldn't refetch
  // everything or reset the 30-minute refresh timer.
  const activeLat = activeLocation ? activeLocation.lat : null;
  const activeLon = activeLocation ? activeLocation.lon : null;
  const loadWeather = useCallback(async (isManual) => {
    if (activeLat == null) return;
    if (isManual) setRefreshing(true);
    try {
      const w = await fetchWeather(activeLat, activeLon);
      setWeather(w);
      setLastFetchedAt(new Date());
    } catch {
      // keep showing last-known data on failure
    }
    try {
      const m = await fetchMarine(activeLat, activeLon);
      setMarine(m);
    } catch {
      setMarine(null);
    } finally {
      if (isManual) setRefreshing(false);
    }
  }, [activeLat, activeLon]);

  useEffect(() => {
    loadWeather(false);
    const id = setInterval(() => loadWeather(false), 30 * 60 * 1000);
    return () => clearInterval(id);
  }, [loadWeather]);

  const trendFalling = useMemo(() => {
    if (!weather || !weather.hourly) return false;
    const { time, pressure_msl } = weather.hourly;
    if (!Array.isArray(time) || time.length === 0 || !Array.isArray(pressure_msl)) return false;
    let nowIdx = findNowIndex(time, weather.current.time);
    if (nowIdx === -1) return false;
    const prevIdx = Math.max(0, nowIdx - 3);
    if (pressure_msl[nowIdx] == null || pressure_msl[prevIdx] == null) return false;
    return classifyTrend(pressure_msl[nowIdx] - pressure_msl[prevIdx]).storm;
  }, [weather]);

  if (!state) {
    return <div className="view"><p className="empty-hint" style={{ padding: 24 }}>Loading…</p></div>;
  }

  return (
    <React.Fragment>
      <header className="app-header">
        <div className="header-row">
          <button className="location-btn" onClick={() => setSheetOpen(true)}>
            <Icon.Pin />
            <span>{activeLocation ? activeLocation.label : 'Choose a location'}</span>
            <Icon.Chevron style={{ transform: 'rotate(-90deg)', opacity: 0.6 }} />
          </button>
          <button
            className={`refresh-btn ${refreshing ? 'spinning' : ''}`}
            onClick={() => loadWeather(true)}
            aria-label="Refresh"
          >
            <Icon.Refresh />
          </button>
        </div>
        <div className="update-row-line">
          <span className="update-row">Last update: {relativeTime(lastFetchedAt)}</span>
          {state.locations.length > 0 && (
            <button className="fav-toggle" onClick={() => setShowFavourites((s) => !s)}>
              Favourites <Icon.Chevron style={{ transform: showFavourites ? 'rotate(180deg)' : 'none', width: 11, height: 11 }} />
            </button>
          )}
        </div>
        {showFavourites && state.locations.length > 0 && (
          <div className="day-tabs" style={{ marginTop: 8 }}>
            {state.locations.map((loc) => (
              <button
                key={loc.id}
                className={`day-tab ${loc.id === state.activeLocationId && !tempLocation ? 'active' : ''}`}
                onClick={() => selectFavourite(loc.id)}
              >
                {loc.label.split(',')[0]}
              </button>
            ))}
            <button className="day-tab" onClick={() => setSheetOpen(true)}>+ Add</button>
          </div>
        )}
      </header>

      {offline && (
        // --case-light, not --storm: informational, not an alert.
        <div className="storm-banner" style={{ background: 'var(--case-light)' }}>
          <span>Offline — showing last-known data.</span>
        </div>
      )}

      {trendFalling && (
        <div className="storm-banner">
          <Icon.Alert />
          <span>Pressure dropping fast — possible storm approaching.</span>
        </div>
      )}

      {tab === 'gauge' && <GaugeView weather={weather} marine={marine} windUnit={state.windUnit} location={activeLocation} tideStations={tideStations} onUpdateLocation={updateLocationField} />}
      {tab === 'map' && <MapView location={activeLocation} />}
      {tab === 'route' && <RouteView location={activeLocation} marine={marine} windUnit={state.windUnit} />}
      {tab === 'log' && <LogView weather={weather} marine={marine} location={activeLocation} windUnit={state.windUnit} />}

      <nav className="bottom-nav">
        <button className={`nav-btn ${tab === 'gauge' ? 'active' : ''}`} onClick={() => setTab('gauge')}>
          <Icon.Gauge /> GAUGE
        </button>
        <button className={`nav-btn ${tab === 'map' ? 'active' : ''}`} onClick={() => setTab('map')}>
          <Icon.Map /> MAP
        </button>
        <button className={`nav-btn ${tab === 'route' ? 'active' : ''}`} onClick={() => setTab('route')}>
          <Icon.Route /> ROUTE
        </button>
        <button className={`nav-btn ${tab === 'log' ? 'active' : ''}`} onClick={() => setTab('log')}>
          <Icon.Log /> LOG
        </button>
      </nav>

      {sheetOpen && (
        <LocationSheet
          favourites={state.locations}
          activeFavouriteId={state.activeLocationId}
          tempLocation={tempLocation}
          windUnit={state.windUnit}
          onView={viewLocation}
          onSaveTemp={saveTempAsFavourite}
          onSelectFavourite={selectFavourite}
          onRenameFavourite={renameFavourite}
          onRemoveFavourite={removeFavourite}
          onSetWindUnit={setWindUnit}
          onClose={() => setSheetOpen(false)}
        />
      )}
    </React.Fragment>
  );
}

/* ---------------------------------------------------------------------
   Error boundary — a render crash anywhere used to blank the entire
   screen with no way back short of force-quitting Safari. This catches
   it and offers a reload instead.
--------------------------------------------------------------------- */
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(error) {
    return { error };
  }
  render() {
    if (this.state.error) {
      return (
        <div style={{
          minHeight: '100vh', display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center', gap: 14, padding: 28,
          textAlign: 'center', background: 'var(--panel)', color: 'var(--ink)',
        }}>
          <Icon.Alert />
          <div style={{ fontSize: 16, fontWeight: 600 }}>Something went wrong loading this screen.</div>
          <div className="mono" style={{ fontSize: 12, color: 'var(--ink-soft)', maxWidth: 320 }}>
            {String((this.state.error && this.state.error.message) || this.state.error)}
          </div>
          <button
            onClick={() => window.location.reload()}
            style={{ background: 'var(--case)', color: 'var(--panel-raised)', padding: '11px 22px', borderRadius: 10, fontWeight: 600, fontSize: 14 }}
          >
            Reload
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
