<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Barometer</title>

<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#4B5851" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Barometer" />
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
<link rel="icon" href="/icons/icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  :root {
    --panel: #E7E5DA;
    --panel-raised: #F1EFE4;
    --case: #4B5851;
    --case-light: #6C7A70;
    --ink: #20241E;
    --ink-soft: #5A6058;
    --lcd-bg: #B8C6AC;
    --lcd-ink: #1B2318;
    --lcd-dim: rgba(27, 35, 24, 0.16);
    --storm: #A23E32;
    --accent: #3D6A55;
    --line: rgba(32, 36, 30, 0.14);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--panel);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    overscroll-behavior-y: none;
  }

  #root { min-height: 100%; display: flex; flex-direction: column; }

  .mono { font-family: 'IBM Plex Mono', monospace; }
  .display { font-family: 'Space Grotesk', sans-serif; }

  button {
    font-family: inherit;
    border: none;
    background: none;
    color: inherit;
    cursor: pointer;
  }
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  /* ---------- Header ---------- */
  .app-header {
    background: var(--case);
    color: var(--panel-raised);
    padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 10px;
    flex-shrink: 0;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .location-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--panel-raised);
    padding: 4px 0;
  }
  .location-btn svg { flex-shrink: 0; opacity: 0.8; }
  .refresh-btn {
    padding: 8px;
    color: var(--panel-raised);
    opacity: 0.85;
  }
  .refresh-btn.spinning svg { animation: spin 0.7s linear; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .update-row {
    font-size: 12px;
    color: rgba(241, 239, 228, 0.65);
    margin-top: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ---------- Storm banner ---------- */
  .storm-banner {
    background: var(--storm);
    color: var(--panel-raised);
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  /* ---------- Main scroll area ---------- */
  .view {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 90px;
    -webkit-overflow-scrolling: touch;
  }

  /* ---------- Dial ---------- */
  .dial-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 26px 18px 4px;
  }
  .trend-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 8px;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .trend-row .arrow { color: var(--accent); }
  .trend-row.falling .arrow { color: var(--storm); }

  /* ---------- LCD instrument panel ---------- */
  .lcd-panel {
    position: relative;
    background: var(--case);
    border-radius: 14px;
    margin: 18px 18px 0;
    padding: 16px 18px 14px;
  }
  .lcd-screw {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(0,0,0,0.35);
    box-shadow: inset 0 0.5px 0.5px rgba(255,255,255,0.25);
  }
  .lcd-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(241,239,228,0.6);
    margin-bottom: 8px;
  }
  .lcd-glass {
    background: var(--lcd-bg);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 8px;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.18);
  }
  .lcd-unit {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--lcd-ink);
    opacity: 0.75;
    margin-bottom: 6px;
  }

  /* ---------- Sparkline card ---------- */
  .card {
    background: var(--panel-raised);
    border-radius: 14px;
    margin: 14px 18px;
    padding: 16px 18px;
    border: 1px solid var(--line);
  }
  .card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--ink-soft);
    margin-bottom: 10px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ---------- Collapsible sections ---------- */
  .section {
    margin: 14px 18px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--panel-raised);
    overflow: hidden;
  }
  .section-head {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 18px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Space Grotesk', sans-serif;
  }
  .section-head .chev { transition: transform 0.2s ease; color: var(--ink-soft); }
  .section-head[aria-expanded="true"] .chev { transform: rotate(180deg); }
  .section-body {
    padding: 4px 18px 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat .label { font-size: 11px; color: var(--ink-soft); font-family: 'IBM Plex Mono', monospace; }
  .stat .value { font-size: 17px; font-weight: 500; }

  .wind-block {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
    margin-top: 4px;
  }
  .moon-block {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    margin-top: 2px;
  }

  /* ---------- Map view ---------- */
  #map { position: absolute; inset: 0; }
  .map-view { position: relative; flex: 1; }
  .map-status {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    background: var(--case);
    color: var(--panel-raised);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    z-index: 1500;
  }
  .isobar-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--ink);
    background: rgba(241, 239, 228, 0.88);
    padding: 1px 5px;
    border-radius: 3px;
    white-space: nowrap;
    border: 1px solid var(--line);
  }

  /* ---------- Bottom nav ---------- */
  .bottom-nav {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    display: flex;
    background: var(--case);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    flex-shrink: 0;
    z-index: 2000; /* must clear Leaflet's internal panes/controls (max ~1000) */
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 0 8px;
    color: rgba(241,239,228,0.55);
    font-size: 11px;
    letter-spacing: 0.03em;
    font-family: 'IBM Plex Mono', monospace;
  }
  .nav-btn.active { color: var(--panel-raised); }

  /* ---------- Sheet (location picker) ---------- */
  .sheet-backdrop {
    position: fixed; inset: 0;
    background: rgba(32,36,30,0.5);
    z-index: 2100;
    display: flex;
    align-items: flex-end;
  }
  .sheet {
    background: var(--panel);
    width: 100%;
    max-height: 82vh;
    border-radius: 18px 18px 0 0;
    padding: 10px 18px calc(env(safe-area-inset-bottom, 0px) + 20px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sheet-grip {
    width: 36px; height: 4px;
    background: var(--line);
    border-radius: 2px;
    margin: 6px auto 14px;
  }
  .sheet-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .sheet-title-row h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 600;
    margin: 0;
  }
  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 12px;
  }
  .search-box input {
    border: none;
    background: none;
    flex: 1;
    font-size: 15px;
    color: var(--ink);
  }
  .search-box input::placeholder { color: var(--ink-soft); }
  .sheet-scroll { overflow-y: auto; }
  .fav-row, .result-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 4px;
    border-bottom: 1px solid var(--line);
  }
  .fav-row:last-child, .result-row:last-child { border-bottom: none; }
  .fav-main, .result-main {
    display: flex;
    flex-direction: column;
    text-align: left;
    flex: 1;
  }
  .fav-main .name, .result-main .name { font-size: 15px; font-weight: 500; }
  .fav-main .sub, .result-main .sub { font-size: 12px; color: var(--ink-soft); font-family: 'IBM Plex Mono', monospace; }
  .fav-row.active .name { color: var(--accent); }
  .icon-btn { padding: 6px; color: var(--ink-soft); }
  .unit-toggle {
    display: flex;
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    margin-top: 4px;
  }
  .unit-toggle button {
    flex: 1;
    padding: 9px 0;
    font-size: 13px;
    font-weight: 500;
    background: var(--panel-raised);
    color: var(--ink-soft);
  }
  .unit-toggle button.active { background: var(--case); color: var(--panel-raised); }

  .empty-hint { font-size: 13px; color: var(--ink-soft); padding: 8px 4px 14px; }
</style>
</head>

/* ---------------------------------------------------------------------
   Seven-segment digit display — the LCD readout look
--------------------------------------------------------------------- */
const SEG_MAP = {
  '0': 'abcdef', '1': 'bc', '2': 'abged', '3': 'abgcd', '4': 'fgbc',
  '5': 'afgcd', '6': 'afgecd', '7': 'abc', '8': 'abcdefg', '9': 'abcdfg',
  ' ': '', '-': 'g',
};
const SEG_RECTS = {
  a: [6, 0, 16, 5], g: [6, 24.5, 16, 5], d: [6, 49, 16, 5],
  f: [0, 3, 5, 22], b: [23, 3, 5, 22], e: [0, 29, 5, 22], c: [23, 29, 5, 22],
};

function SevenSegDigit({ char, size = 30 }) {
  const on = new Set((SEG_MAP[char] || '').split(''));
  const w = size * 0.52;
  return (
    <svg width={w} height={size} viewBox="0 0 28 54" style={{ flexShrink: 0 }}>
      {Object.entries(SEG_RECTS).map(([key, [x, y, ww, hh]]) => (
        <rect key={key} x={x} y={y} width={ww} height={hh} rx="1.4"
          fill={on.has(key) ? 'var(--lcd-ink)' : 'var(--lcd-dim)'} />
      ))}
    </svg>
  );
}

function SevenSegDisplay({ value, size = 34 }) {
  const chars = String(value).split('');
  return (
    <div style={{ display: 'flex', gap: 3, alignItems: 'flex-end' }}>
      {chars.map((c, i) =>
        c === '.' ? (
          <div key={i} style={{ width: 7, display: 'flex', alignItems: 'flex-end', paddingBottom: size * 0.06 }}>
            <div style={{ width: 5, height: 5, borderRadius: '50%', background: 'var(--lcd-ink)' }} />
          </div>
        ) : (
          <SevenSegDigit key={i} char={c} size={size} />
        )
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   Helpers
--------------------------------------------------------------------- */
const KN_TO_MPH = 1.15078;
const ISOBAR_COLOR = '#4B5851';
const ISOBAR_COLOR_MAJOR = '#20241E';

function compassLabel(deg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

// Simplified 3-hour pressure tendency, loosely modelled on the classic
// ship's-barometer dial words rather than the full WMO synoptic code.
function classifyTrend(deltaHpa) {
  if (deltaHpa <= -3) return { label: 'Falling quickly', dir: 'down', storm: true };
  if (deltaHpa <= -1) return { label: 'Falling', dir: 'down', storm: false };
  if (deltaHpa < 1) return { label: 'Steady', dir: 'flat', storm: false };
  if (deltaHpa < 3) return { label: 'Rising', dir: 'up', storm: false };
  return { label: 'Rising quickly', dir: 'up', storm: false };
}

function moonPhase(date) {
  const synodic = 29.53058867;
  const knownNewMoon = Date.UTC(2000, 0, 6, 18, 14);
  const diffDays = (date.getTime() - knownNewMoon) / 86400000;
  const phase = ((diffDays % synodic) + synodic) % synodic;
  const frac = phase / synodic;
  const names = ['New Moon','Waxing Crescent','First Quarter','Waxing Gibbous','Full Moon','Waning Gibbous','Last Quarter','Waning Crescent'];
  const idx = Math.round(frac * 8) % 8;
  return { frac, name: names[idx] };
}

function relativeTime(date) {
  if (!date) return '—';
  const mins = Math.round((Date.now() - date.getTime()) / 60000);
  if (mins < 1) return 'just now';
  if (mins === 1) return '1 minute ago';
  if (mins < 60) return `${mins} minutes ago`;
  const hrs = Math.round(mins / 60);
  return hrs === 1 ? '1 hour ago' : `${hrs} hours ago`;
}

async function fetchVersion() {
  const r = await fetch('/api/version');
  return (await r.json()).version;
}
async function fetchState() {
  const r = await fetch('/api/state');
  if (!r.ok) throw new Error('state fetch failed');
  return r.json();
}
async function saveState(state) {
  await fetch('/api/state', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(state),
  });
}
async function geocode(query) {
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6&language=en&format=json`;
  const r = await fetch(url);
  const data = await r.json();
  return data.results || [];
}
async function fetchWeather(lat, lon) {
  const params = new URLSearchParams({
    latitude: lat,
    longitude: lon,
    current: 'temperature_2m,relative_humidity_2m,apparent_temperature,pressure_msl,wind_speed_10m,wind_direction_10m',
    hourly: 'pressure_msl,uv_index',
    wind_speed_unit: 'kn',
    timezone: 'auto',
    past_days: '1',
    forecast_days: '2',
  });
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
  if (!r.ok) throw new Error('weather fetch failed');
  return r.json();
}

// Builds a coarse lat/lon grid around a center point, synoptic-scale
// (roughly continent-wide) so isobar curvature is actually visible.
function buildGrid(centerLat, centerLon) {
  const cols = 10, rows = 8;
  const latSpan = 9, lonSpan = 14;
  const lats = Array.from({ length: rows }, (_, r) => centerLat + latSpan - (2 * latSpan * r) / (rows - 1));
  const lons = Array.from({ length: cols }, (_, c) => centerLon - lonSpan + (2 * lonSpan * c) / (cols - 1));
  return { cols, rows, lats, lons };
}

// Open-Meteo supports batched multi-location requests via comma-separated
// coordinate lists, so the whole grid comes back in a single call.
async function fetchPressureGrid(centerLat, centerLon) {
  const grid = buildGrid(centerLat, centerLon);
  const latList = [], lonList = [];
  for (let r = 0; r < grid.rows; r++) {
    for (let c = 0; c < grid.cols; c++) {
      latList.push(grid.lats[r].toFixed(2));
      lonList.push(grid.lons[c].toFixed(2));
    }
  }
  const params = new URLSearchParams({
    latitude: latList.join(','),
    longitude: lonList.join(','),
    current: 'pressure_msl',
  });
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
  if (!r.ok) throw new Error('grid fetch failed');
  const data = await r.json();
  const arr = Array.isArray(data) ? data : [data];
  const valid = arr.map((d) => d && d.current && d.current.pressure_msl).filter((v) => typeof v === 'number');
  const mean = valid.length ? valid.reduce((a, b) => a + b, 0) / valid.length : 1013;
  const values = arr.map((d) => {
    const v = d && d.current && d.current.pressure_msl;
    return typeof v === 'number' ? v : mean;
  });
  return { grid, values };
}

function computeContours(grid, values) {
  const min = Math.min(...values), max = Math.max(...values);
  const lo = Math.floor(min / 4) * 4, hi = Math.ceil(max / 4) * 4;
  const thresholds = [];
  for (let v = lo; v <= hi; v += 4) thresholds.push(v);
  if (thresholds.length < 2) return [];
  const gen = d3.contours().size([grid.cols, grid.rows]).thresholds(thresholds);
  return gen(values);
}

function gridToLatLng(gx, gy, grid) {
  const lon = grid.lons[0] + (gx / (grid.cols - 1)) * (grid.lons[grid.cols - 1] - grid.lons[0]);
  const lat = grid.lats[0] + (gy / (grid.rows - 1)) * (grid.lats[grid.rows - 1] - grid.lats[0]);
  return [lat, lon];
}

/* ---------------------------------------------------------------------
   Dial — steel-and-glass instrument gauge (analog half of the fascia)
--------------------------------------------------------------------- */
function Dial({ pressure }) {
  const size = 240;
  const cx = size / 2, cy = size / 2;
  const r = 100;
  const min = 960, max = 1050;
  const startDeg = 135, endDeg = 405;

  const toDeg = (val) => {
    const clamped = Math.max(min, Math.min(max, val));
    return startDeg + (endDeg - startDeg) * ((clamped - min) / (max - min));
  };
  const polar = (deg, radius) => {
    const rad = (deg * Math.PI) / 180;
    return [cx + radius * Math.cos(rad), cy + radius * Math.sin(rad)];
  };

  const majorTicks = [];
  for (let v = min; v <= max; v += 10) {
    const deg = toDeg(v);
    const [x1, y1] = polar(deg, r - 4);
    const [x2, y2] = polar(deg, r - 15);
    const [lx, ly] = polar(deg, r - 28);
    majorTicks.push(
      <g key={v}>
        <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="var(--ink)" strokeWidth="1.6" />
        <text x={lx} y={ly + 4} fontSize="9.5" textAnchor="middle" fill="var(--ink-soft)" className="mono">{v}</text>
      </g>
    );
  }
  const minorTicks = [];
  for (let v = min; v <= max; v += 2) {
    if (v % 10 === 0) continue;
    const deg = toDeg(v);
    const [x1, y1] = polar(deg, r - 4);
    const [x2, y2] = polar(deg, r - 9);
    minorTicks.push(<line key={v} x1={x1} y1={y1} x2={x2} y2={y2} stroke="var(--ink-soft)" strokeWidth="1" opacity="0.6" />);
  }

  const needleDeg = pressure != null ? toDeg(pressure) : toDeg(1013);
  const [nx, ny] = polar(needleDeg, r - 20);

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <defs>
        <radialGradient id="bezel" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stopColor="#9BA69D" />
          <stop offset="55%" stopColor="#6C7A70" />
          <stop offset="100%" stopColor="#43504A" />
        </radialGradient>
      </defs>
      <circle cx={cx} cy={cy} r={r + 13} fill="url(#bezel)" />
      <circle cx={cx} cy={cy} r={r} fill="var(--panel-raised)" />
      {minorTicks}
      {majorTicks}
      <line x1={cx} y1={cy} x2={nx} y2={ny} stroke="var(--storm)" strokeWidth="2.6" strokeLinecap="round" />
      <circle cx={cx} cy={cy} r="6" fill="var(--case)" />
    </svg>
  );
}

function Sparkline({ values }) {
  if (!values || values.length < 2) return null;
  const w = 280, h = 60, pad = 6;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const pts = values.map((v, i) => {
    const x = pad + (i / (values.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return [x, y];
  });
  const line = pts.map((p) => p.join(',')).join(' ');
  const area = `${pad},${h - pad} ` + line + ` ${w - pad},${h - pad}`;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <polygon points={area} fill="var(--case)" opacity="0.08" />
      <polyline points={line} fill="none" stroke="var(--case)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function WindCompass({ deg }) {
  const size = 50, cx = size / 2, cy = size / 2, r = 20;
  const rad = ((deg + 180) * Math.PI) / 180;
  const tipX = cx + r * Math.sin(rad), tipY = cy - r * Math.cos(rad);
  const tailX = cx - r * 0.6 * Math.sin(rad), tailY = cy + r * 0.6 * Math.cos(rad);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--line)" strokeWidth="1.5" />
      <text x={cx} y="9" fontSize="7" textAnchor="middle" fill="var(--ink-soft)">N</text>
      <line x1={tailX} y1={tailY} x2={tipX} y2={tipY} stroke="var(--storm)" strokeWidth="2.4" strokeLinecap="round" />
      <circle cx={tipX} cy={tipY} r="2.3" fill="var(--storm)" />
    </svg>
  );
}

function MoonGlyph({ frac }) {
  const size = 26, r = 11, cx = size / 2, cy = size / 2;
  const shift = (frac <= 0.5 ? (0.5 - frac) : (frac - 0.5)) * 4 * r;
  const rx = Math.max(0.001, r - shift);
  const lit = frac <= 0.5;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0 }}>
      <circle cx={cx} cy={cy} r={r} fill="var(--ink)" opacity="0.85" />
      <clipPath id="moonclip"><circle cx={cx} cy={cy} r={r} /></clipPath>
      <g clipPath="url(#moonclip)">
        <ellipse cx={lit ? cx + (r - shift) : cx - (r - shift)} cy={cy} rx={rx} ry={r} fill="var(--panel-raised)" />
      </g>
    </svg>
  );
}

/* ---------------------------------------------------------------------
   Collapsible section
--------------------------------------------------------------------- */
function Section({ title, defaultOpen, children }) {
  const [open, setOpen] = useState(!!defaultOpen);
  return (
    <div className="section">
      <button className="section-head" aria-expanded={open} onClick={() => setOpen(!open)}>
        <span>{title}</span>
        <Icon.Chevron />
      </button>
      {open && <div className="section-body">{children}</div>}
    </div>
  );
}

/* ---------------------------------------------------------------------
   Location sheet
--------------------------------------------------------------------- */
function LocationSheet({ state, setState, onClose }) {
  const [query, setQuery] = useState('');
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const debounceRef = useRef(null);

  useEffect(() => {
    clearTimeout(debounceRef.current);
    if (query.trim().length < 2) { setResults([]); return; }
    debounceRef.current = setTimeout(async () => {
      setSearching(true);
      try {
        const r = await geocode(query.trim());
        setResults(r);
      } catch {
        setResults([]);
      } finally {
        setSearching(false);
      }
    }, 400);
    return () => clearTimeout(debounceRef.current);
  }, [query]);

  function persist(next) {
    setState(next);
    saveState(next);
  }

  function selectFavorite(id) {
    persist({ ...state, activeLocationId: id });
    onClose();
  }

  function addResult(res) {
    const id = `loc_${Date.now()}`;
    const label = [res.name, res.admin1, res.country].filter(Boolean).slice(0, 2).join(', ');
    const loc = { id, label, lat: res.latitude, lon: res.longitude, timezone: res.timezone || 'auto' };
    const next = { ...state, locations: [...state.locations, loc], activeLocationId: id };
    persist(next);
    setQuery('');
    setResults([]);
    onClose();
  }

  function removeFavorite(id) {
    if (state.locations.length <= 1) return;
    const remaining = state.locations.filter((l) => l.id !== id);
    const nextActive = state.activeLocationId === id ? remaining[0].id : state.activeLocationId;
    persist({ ...state, locations: remaining, activeLocationId: nextActive });
  }

  function setWindUnit(unit) {
    persist({ ...state, windUnit: unit });
  }

  return (
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheet-grip" />
        <div className="sheet-title-row">
          <h2>Locations</h2>
          <button className="icon-btn" onClick={onClose} aria-label="Close"><Icon.Close /></button>
        </div>
        <div className="search-box">
          <Icon.Search style={{ color: 'var(--ink-soft)' }} />
          <input
            placeholder="Search for a city"
            value={query}
            onChange={(e) => setQuery(e.target.value)}
          />
        </div>
        <div className="sheet-scroll">
          {results.length > 0 && (
            <div style={{ marginBottom: 14 }}>
              {results.map((res) => (
                <div className="result-row" key={`${res.latitude}-${res.longitude}`}>
                  <div className="result-main">
                    <span className="name">{res.name}</span>
                    <span className="sub">{[res.admin1, res.country].filter(Boolean).join(', ')}</span>
                  </div>
                  <button className="icon-btn" onClick={() => addResult(res)} aria-label="Add location"><Icon.Plus /></button>
                </div>
              ))}
            </div>
          )}
          {searching && <div className="empty-hint">Searching…</div>}

          {state.locations.map((loc) => (
            <div className={`fav-row ${loc.id === state.activeLocationId ? 'active' : ''}`} key={loc.id}>
              <button className="fav-main" onClick={() => selectFavorite(loc.id)}>
                <span className="name">{loc.label}</span>
                <span className="sub">{loc.lat.toFixed(2)}, {loc.lon.toFixed(2)}</span>
              </button>
              {state.locations.length > 1 && (
                <button className="icon-btn" onClick={() => removeFavorite(loc.id)} aria-label="Remove"><Icon.Trash /></button>
              )}
            </div>
          ))}

          <div className="card-label" style={{ marginTop: 18 }}>Wind unit</div>
          <div className="unit-toggle">
            <button className={state.windUnit === 'kn' ? 'active' : ''} onClick={() => setWindUnit('kn')}>Knots</button>
            <button className={state.windUnit === 'mph' ? 'active' : ''} onClick={() => setWindUnit('mph')}>mph</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------------
   Gauge view
--------------------------------------------------------------------- */
function GaugeView({ weather, windUnit }) {
  if (!weather) {
    return <div className="view"><p className="empty-hint" style={{ padding: 24 }}>Loading conditions…</p></div>;
  }

  const cur = weather.current;
  const hourly = weather.hourly;
  const times = hourly.time;
  const nowIso = cur.time;
  let nowIdx = times.indexOf(nowIso);
  if (nowIdx === -1) nowIdx = times.length - 1;
  const prevIdx = Math.max(0, nowIdx - 3);
  const delta = hourly.pressure_msl[nowIdx] - hourly.pressure_msl[prevIdx];
  const trend = classifyTrend(delta);

  const historyStart = Math.max(0, nowIdx - 24);
  const historyValues = hourly.pressure_msl.slice(historyStart, nowIdx + 1);

  const windKn = cur.wind_speed_10m;
  const windDisplay = windUnit === 'mph' ? Math.round(windKn * KN_TO_MPH) : Math.round(windKn);
  const windUnitLabel = windUnit === 'mph' ? 'MPH' : 'KN';

  let uvNow = null;
  if (hourly.uv_index && hourly.uv_index[nowIdx] != null) uvNow = hourly.uv_index[nowIdx];

  const moon = moonPhase(new Date());

  return (
    <div className="view">
      <div className="dial-wrap">
        <Dial pressure={cur.pressure_msl} />
        <div className={`trend-row ${trend.dir === 'down' ? 'falling' : ''}`}>
          {trend.dir === 'up' && <Icon.ArrowUp className="arrow" />}
          {trend.dir === 'down' && <Icon.ArrowDown className="arrow" />}
          {trend.dir === 'flat' && <Icon.ArrowRight className="arrow" />}
          <span>{trend.label} · {delta >= 0 ? '+' : ''}{delta.toFixed(1)} hPa / 3h</span>
        </div>
      </div>

      <div className="lcd-panel">
        <div className="lcd-screw" style={{ top: 8, left: 8 }} />
        <div className="lcd-screw" style={{ top: 8, right: 8 }} />
        <div className="lcd-screw" style={{ bottom: 8, left: 8 }} />
        <div className="lcd-screw" style={{ bottom: 8, right: 8 }} />
        <div className="lcd-label">PRESSURE</div>
        <div className="lcd-glass">
          <SevenSegDisplay value={cur.pressure_msl.toFixed(0)} size={44} />
          <span className="lcd-unit">hPa</span>
        </div>
      </div>

      <div className="card">
        <div className="card-label">Last 24 hours</div>
        <Sparkline values={historyValues} />
      </div>

      <Section title="Conditions" defaultOpen={true}>
        <div className="stat">
          <span className="label">TEMPERATURE</span>
          <span className="value mono">{cur.temperature_2m.toFixed(0)}°C</span>
        </div>
        <div className="stat">
          <span className="label">FEELS LIKE</span>
          <span className="value mono">{cur.apparent_temperature.toFixed(0)}°C</span>
        </div>
        <div className="stat">
          <span className="label">HUMIDITY</span>
          <span className="value mono">{cur.relative_humidity_2m.toFixed(0)}%</span>
        </div>
        <div className="stat">
          <span className="label">UV INDEX</span>
          <span className="value mono">{uvNow != null ? uvNow.toFixed(1) : '—'}</span>
        </div>

        <div className="wind-block">
          <WindCompass deg={cur.wind_direction_10m} />
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 10 }}>
            <div>
              <div className="stat" style={{ marginBottom: 4 }}>
                <span className="label">WIND, FROM {compassLabel(cur.wind_direction_10m)}</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6 }}>
                <SevenSegDigit char={String(windDisplay).padStart(2,'0')[0]} size={22} />
                <SevenSegDigit char={String(windDisplay).padStart(2,'0')[1]} size={22} />
                <span className="lcd-unit" style={{ color: 'var(--ink-soft)', fontSize: 11 }}>{windUnitLabel}</span>
              </div>
            </div>
          </div>
        </div>

        <div className="moon-block">
          <MoonGlyph frac={moon.frac} />
          <div className="stat">
            <span className="label">MOON</span>
            <span className="value">{moon.name}</span>
          </div>
        </div>
      </Section>
    </div>
  );
}

/* ---------------------------------------------------------------------
   Map view — computed isobar contours over an OSM base layer
--------------------------------------------------------------------- */
function MapView({ location }) {
  const mapRef = useRef(null);
  const leafletRef = useRef(null);
  const contourLayerRef = useRef(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(false);

  const loadIsobars = useCallback(async () => {
    if (!location || !leafletRef.current) return;
    setLoading(true);
    setError(false);
    try {
      const { grid, values } = await fetchPressureGrid(location.lat, location.lon);
      const contours = computeContours(grid, values);
      if (contourLayerRef.current) {
        leafletRef.current.removeLayer(contourLayerRef.current);
      }
      const layerGroup = L.layerGroup();
      contours.forEach((c) => {
        let labeled = false;
        const isMajor = c.value % 20 === 0;
        c.coordinates.forEach((polygon) => {
          polygon.forEach((ring) => {
            const latlngs = ring.map(([gx, gy]) => gridToLatLng(gx, gy, grid));
            L.polyline(latlngs, {
              color: isMajor ? ISOBAR_COLOR_MAJOR : ISOBAR_COLOR,
              weight: isMajor ? 2.2 : 1.1,
              opacity: 0.75,
            }).addTo(layerGroup);
            if (!labeled && latlngs.length > 4) {
              const mid = latlngs[Math.floor(latlngs.length / 2)];
              L.marker(mid, {
                icon: L.divIcon({ className: 'isobar-label', html: String(c.value), iconSize: [30, 14] }),
                interactive: false,
              }).addTo(layerGroup);
              labeled = true;
            }
          });
        });
      });
      layerGroup.addTo(leafletRef.current);
      contourLayerRef.current = layerGroup;
    } catch {
      setError(true);
    } finally {
      setLoading(false);
    }
  }, [location]);

  useEffect(() => {
    if (!location || leafletRef.current) return;
    const map = L.map(mapRef.current, { zoomControl: true }).setView([location.lat, location.lon], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 12,
    }).addTo(map);
    L.marker([location.lat, location.lon]).addTo(map);
    leafletRef.current = map;
    loadIsobars();
  }, [location, loadIsobars]);

  useEffect(() => {
    if (leafletRef.current && location) {
      leafletRef.current.setView([location.lat, location.lon], leafletRef.current.getZoom());
      loadIsobars();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [location]);

  return (
    <div className="view map-view">
      <div id="map" ref={mapRef}></div>
      {loading && <div className="map-status">Loading isobars…</div>}
      {error && <div className="map-status">Couldn't load isobars right now</div>}
    </div>
  );
}

/* ---------------------------------------------------------------------
   App root
--------------------------------------------------------------------- */
function App() {
  const [state, setState] = useState(null);
  const [weather, setWeather] = useState(null);
  const [tab, setTab] = useState('gauge');
  const [sheetOpen, setSheetOpen] = useState(false);
  const [lastFetchedAt, setLastFetchedAt] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [, setTick] = useState(0);

  // Force-reload on new deploy
  useEffect(() => {
    fetchVersion().then((version) => {
      const cached = localStorage.getItem('buildVersion');
      if (cached && cached !== version) {
        localStorage.setItem('buildVersion', version);
        window.location.reload();
      } else {
        localStorage.setItem('buildVersion', version);
      }
    }).catch(() => {});
  }, []);

  useEffect(() => {
    fetchState().then(setState).catch(() => setState({ locations: [], activeLocationId: null, windUnit: 'kn' }));
  }, []);

  // Keep the "X minutes ago" text live without waiting for a data refresh
  useEffect(() => {
    const id = setInterval(() => setTick((t) => t + 1), 60000);
    return () => clearInterval(id);
  }, []);

  const activeLocation = useMemo(() => {
    if (!state) return null;
    return state.locations.find((l) => l.id === state.activeLocationId) || state.locations[0] || null;
  }, [state]);

  const loadWeather = useCallback(async (isManual) => {
    if (!activeLocation) return;
    if (isManual) setRefreshing(true);
    try {
      const w = await fetchWeather(activeLocation.lat, activeLocation.lon);
      setWeather(w);
      setLastFetchedAt(new Date());
    } catch {
      // keep showing last-known data on failure
    } finally {
      if (isManual) setRefreshing(false);
    }
  }, [activeLocation]);

  useEffect(() => {
    loadWeather(false);
    const id = setInterval(() => loadWeather(false), 30 * 60 * 1000);
    return () => clearInterval(id);
  }, [loadWeather]);

  const trendFalling = useMemo(() => {
    if (!weather) return false;
    const { time, pressure_msl } = weather.hourly;
    let nowIdx = time.indexOf(weather.current.time);
    if (nowIdx === -1) nowIdx = time.length - 1;
    const prevIdx = Math.max(0, nowIdx - 3);
    return classifyTrend(pressure_msl[nowIdx] - pressure_msl[prevIdx]).storm;
  }, [weather]);

  if (!state) {
    return <div className="view"><p className="empty-hint" style={{ padding: 24 }}>Loading…</p></div>;
  }

  return (
    <React.Fragment>
      <header className="app-header">
        <div className="header-row">
          <button className="location-btn" onClick={() => setSheetOpen(true)}>
            <Icon.Pin />
            <span>{activeLocation ? activeLocation.label : 'Choose a location'}</span>
            <Icon.Chevron style={{ transform: 'rotate(-90deg)', opacity: 0.6 }} />
          </button>
          <button
            className={`refresh-btn ${refreshing ? 'spinning' : ''}`}
            onClick={() => loadWeather(true)}
            aria-label="Refresh"
          >
            <Icon.Refresh />
          </button>
        </div>
        <div className="update-row">Last update: {relativeTime(lastFetchedAt)}</div>
      </header>

      {trendFalling && (
        <div className="storm-banner">
          <Icon.Alert />
          <span>Pressure dropping fast — possible storm approaching.</span>
        </div>
      )}

      {tab === 'gauge'
        ? <GaugeView weather={weather} windUnit={state.windUnit} />
        : <MapView location={activeLocation} />}

      <nav className="bottom-nav">
        <button className={`nav-btn ${tab === 'gauge' ? 'active' : ''}`} onClick={() => setTab('gauge')}>
          <Icon.Gauge /> GAUGE
        </button>
        <button className={`nav-btn ${tab === 'map' ? 'active' : ''}`} onClick={() => setTab('map')}>
          <Icon.Map /> MAP
        </button>
      </nav>

      {sheetOpen && (
        <LocationSheet state={state} setState={setState} onClose={() => setSheetOpen(false)} />
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
