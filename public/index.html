      <ForecastSection weather={weather} marine={marine} windUnit={windUnit} seaward={location ? location.seaward : null} />

      <TideSection location={location} tideStations={tideStations} marine={marine} currentTime={cur.time} />

      {coastSheetOpen && (
        <CoastDirectionSheet
          location={location}
          onSelect={(deg) => onUpdateLocation && location && onUpdateLocation(location.id, { seaward: deg })}
          onClose={() => setCoastSheetOpen(false)}
        />
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   Map view — computed isobar contours over an OSM base layer
--------------------------------------------------------------------- */
function MapView({ location }) {
  const mapRef = useRef(null);
  const leafletRef = useRef(null);
  const contourLayerRef = useRef(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(false);

  const loadIsobars = useCallback(async () => {
    if (!location || !leafletRef.current) return;
    setLoading(true);
    setError(false);
    try {
      const { grid, values } = await fetchPressureGrid(location.lat, location.lon);
      const contours = computeContours(grid, values);
      if (contourLayerRef.current) {
        leafletRef.current.removeLayer(contourLayerRef.current);
      }
      const layerGroup = L.layerGroup();
      contours.forEach((c) => {
        let labeled = false;
        const isMajor = c.value % 20 === 0;
        c.coordinates.forEach((polygon) => {
          polygon.forEach((ring) => {
            const latlngs = ring.map(([gx, gy]) => gridToLatLng(gx, gy, grid));
            L.polyline(latlngs, {
              color: isMajor ? ISOBAR_COLOR_MAJOR : ISOBAR_COLOR,
              weight: isMajor ? 2.2 : 1.1,
              opacity: 0.75,
            }).addTo(layerGroup);
            if (!labeled && latlngs.length > 4) {
              const mid = latlngs[Math.floor(latlngs.length / 2)];
              L.marker(mid, {
                icon: L.divIcon({ className: 'isobar-label', html: String(c.value), iconSize: [30, 14] }),
                interactive: false,
              }).addTo(layerGroup);
              labeled = true;
            }
          });
        });
      });
      layerGroup.addTo(leafletRef.current);
      contourLayerRef.current = layerGroup;
    } catch {
      setError(true);
    } finally {
      setLoading(false);
    }
  }, [location]);

  useEffect(() => {
    if (!location || leafletRef.current) return;
    const map = L.map(mapRef.current, { zoomControl: true }).setView([location.lat, location.lon], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 12,
    }).addTo(map);
    L.tileLayer(SEAMARK_TILE_URL, {
      attribution: 'Seamarks &copy; OpenSeaMap contributors',
      maxZoom: 18,
    }).addTo(map);
    L.marker([location.lat, location.lon]).addTo(map);
    leafletRef.current = map;
    loadIsobars();
  }, [location, loadIsobars]);

  useEffect(() => {
    if (leafletRef.current && location) {
      leafletRef.current.setView([location.lat, location.lon], leafletRef.current.getZoom());
      loadIsobars();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [location]);

  return (
    <div className="view map-view">
      <div id="map" ref={mapRef}></div>
      {loading && <div className="map-status">Loading isobars…</div>}
      {error && <div className="map-status">Couldn't load isobars right now</div>}
    </div>
  );
}

/* ---------------------------------------------------------------------
   Route view — tap the map to add waypoints; distance/bearing per leg,
   and a drift-adjusted ETA using ocean current where it's available.
   Routes are session-only (not saved) in this version.
--------------------------------------------------------------------- */
const KN_TO_KMH = 1.852;

function RouteView({ location, marine, windUnit }) {
  const mapRef = useRef(null);
  const leafletRef = useRef(null);
  const layerRef = useRef(null);
  const [waypoints, setWaypoints] = useState([]);
  const [plannedSpeed, setPlannedSpeed] = useState(3);

  useEffect(() => {
    if (!location || leafletRef.current) return;
    const map = L.map(mapRef.current, { zoomControl: true }).setView([location.lat, location.lon], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 18,
    }).addTo(map);
    L.tileLayer(SEAMARK_TILE_URL, {
      attribution: 'Seamarks &copy; OpenSeaMap contributors',
      maxZoom: 18,
    }).addTo(map);
    map.on('click', (e) => {
      setWaypoints((wp) => [...wp, { lat: e.latlng.lat, lon: e.latlng.lng }]);
    });
    leafletRef.current = map;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [location]);

  function removeWaypoint(index) {
    setWaypoints((wp) => wp.filter((_, i) => i !== index));
  }
  function updateWaypoint(index, lat, lon) {
    setWaypoints((wp) => wp.map((p, i) => (i === index ? { lat, lon } : p)));
  }

  useEffect(() => {
    if (!leafletRef.current) return;
    if (layerRef.current) leafletRef.current.removeLayer(layerRef.current);
    const group = L.layerGroup();
    waypoints.forEach((wp, i) => {
      const marker = L.marker([wp.lat, wp.lon], {
        icon: L.divIcon({ className: 'isobar-label', html: String(i + 1), iconSize: [22, 22] }),
        draggable: true,
      });
      marker.on('dragend', () => {
        const { lat, lng } = marker.getLatLng();
        updateWaypoint(i, lat, lng);
      });
      marker.bindPopup(`<button type="button" class="popup-remove-btn">Remove point ${i + 1}</button>`);
      marker.on('popupopen', (e) => {
        const btn = e.popup.getElement() && e.popup.getElement().querySelector('.popup-remove-btn');
        if (btn) btn.onclick = () => removeWaypoint(i);
      });
      marker.addTo(group);
    });
    if (waypoints.length > 1) {
      L.polyline(waypoints.map((w) => [w.lat, w.lon]), { color: '#211A0F', weight: 2.5, dashArray: '6 5' }).addTo(group);
    }
    group.addTo(leafletRef.current);
    layerRef.current = group;
  }, [waypoints]);

  const legs = [];
  for (let i = 0; i < waypoints.length - 1; i++) {
    const a = waypoints[i], b = waypoints[i + 1];
    legs.push({
      distanceKm: haversineKm(a.lat, a.lon, b.lat, b.lon),
      bearing: initialBearing(a.lat, a.lon, b.lat, b.lon),
    });
  }
  const totalKm = legs.reduce((s, l) => s + l.distanceKm, 0);

  const hasCurrent = marine && marine.current && typeof marine.current.ocean_current_velocity === 'number';
  const currentKn = hasCurrent ? marine.current.ocean_current_velocity : 0;
  // Ocean current direction is the direction the water flows TOWARD
  // (opposite convention to wind, which is reported as the direction it
  // blows FROM) — worth sanity-checking against a local current chart
  // before relying on this for real route timing.
  const currentDir = hasCurrent ? marine.current.ocean_current_direction : 0;
  const plannedSpeedKn = windUnit === 'mph' ? plannedSpeed / KN_TO_MPH : plannedSpeed;

  let totalHours = 0, unreachable = false;
  legs.forEach((leg) => {
    const along = hasCurrent ? currentKn * Math.cos(((currentDir - leg.bearing) * Math.PI) / 180) : 0;
    const effectiveKn = plannedSpeedKn + along;
    if (effectiveKn <= 0.05) { unreachable = true; return; }
    totalHours += leg.distanceKm / (effectiveKn * KN_TO_KMH);
  });

  function formatDuration(hours) {
    const h = Math.floor(hours);
    const m = Math.round((hours - h) * 60);
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
  }

  return (
    <div className="view map-view">
      <div id="map" ref={mapRef} style={{ bottom: '40%' }}></div>
      <div className="route-panel">
        <div className="route-panel-head">
          <span className="card-label" style={{ margin: 0 }}>Route ({waypoints.length} point{waypoints.length === 1 ? '' : 's'})</span>
          <button className="icon-btn" onClick={() => setWaypoints([])} aria-label="Clear route"><Icon.Trash /></button>
        </div>
        {waypoints.length === 0 ? (
          <p className="empty-hint">Tap the map to drop waypoints and build a route. Drag a point to move it, or tap it for a remove option.</p>
        ) : (
          <div className="route-scroll">
            {waypoints.map((wp, i) => (
              <React.Fragment key={i}>
                <div className="fav-row">
                  <div className="fav-main">
                    <span className="name">Point {i + 1}</span>
                    <span className="sub">{wp.lat.toFixed(4)}, {wp.lon.toFixed(4)}</span>
                  </div>
                  <button className="icon-btn" onClick={() => removeWaypoint(i)} aria-label={`Remove point ${i + 1}`}><Icon.Trash /></button>
                </div>
                {legs[i] && (
                  <div style={{ padding: '2px 4px 8px', fontSize: 12, color: 'var(--ink-soft)' }}>
                    ↳ {legs[i].distanceKm.toFixed(2)} km · bearing {legs[i].bearing.toFixed(0)}°
                  </div>
                )}
              </React.Fragment>
            ))}
            {legs.length > 0 && (
              <div className="route-summary">
                <div className="stat">
                  <span className="label">TOTAL DISTANCE</span>
                  <span className="value mono">{totalKm.toFixed(2)} km</span>
                </div>
                <div className="stat">
                  <span className="label">EST. TIME{hasCurrent ? ' (CURRENT-ADJUSTED)' : ''}</span>
                  <span className="value mono">{unreachable ? 'Current opposes travel' : formatDuration(totalHours)}</span>
                </div>
              </div>
            )}
            {legs.length > 0 && !hasCurrent && (
              <div className="empty-hint" style={{ padding: '4px 4px 0' }}>No ocean current data here — time estimate uses planned speed only.</div>
            )}
          </div>
        )}
        <div className="speed-row">
          <span className="card-label" style={{ margin: 0 }}>Planned speed</span>
          <input
            type="number"
            className="speed-input mono"
            value={plannedSpeed}
            min="0.1"
            step="0.1"
            onChange={(e) => setPlannedSpeed(Math.max(0.1, Number(e.target.value) || 0))}
          />
          <span className="lcd-unit" style={{ color: 'var(--ink-soft)', fontSize: 12 }}>{windUnit === 'mph' ? 'MPH' : 'KN'}</span>
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------------
   Voyage log — form for a new entry (auto-captures the current weather
   snapshot), and the list view with per-entry share-as-image.
--------------------------------------------------------------------- */
function LogEntryForm({ weather, marine, location, windUnit, onClose, onSaved }) {
  const toLocalInputValue = (d) => {
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  };
  const [date, setDate] = useState(() => toLocalInputValue(new Date()));
  const [comment, setComment] = useState('');
  const [photo, setPhoto] = useState(null);
  const [photoError, setPhotoError] = useState(null);
  const [saving, setSaving] = useState(false);
  const [saveError, setSaveError] = useState(null);

  async function handleFile(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setPhotoError(null);
    try {
      setPhoto(await compressImage(file, 1200, 0.8));
    } catch {
      setPhotoError("Couldn't read that photo — try a different one.");
    }
  }

  function buildWeatherSnapshot() {
    if (!weather || !weather.current) return null;
    const cur = weather.current;
    const mcur = marine && marine.current;
    const shore = location && location.seaward != null ? classifyShoreWind(cur.wind_direction_10m, location.seaward) : null;
    return {
      pressure: cur.pressure_msl,
      temp: cur.temperature_2m,
      windSpeed: cur.wind_speed_10m,
      windDir: cur.wind_direction_10m,
      windUnit,
      shore,
      waveHeight: mcur && typeof mcur.wave_height === 'number' ? mcur.wave_height : null,
      waterTemp: mcur && typeof mcur.sea_surface_temperature === 'number' ? mcur.sea_surface_temperature : null,
    };
  }

  async function handleSave() {
    setSaving(true);
    setSaveError(null);
    try {
      await saveLogEntry({
        date: new Date(date).toISOString(),
        locationLabel: location ? location.label : null,
        lat: location ? location.lat : null,
        lon: location ? location.lon : null,
        weather: buildWeatherSnapshot(),
        comment,
        photo,
      });
      onSaved();
    } catch {
      setSaveError("Couldn't save — check your connection and try again.");
    } finally {
      setSaving(false);
    }
  }

  const snap = buildWeatherSnapshot();

  return ReactDOM.createPortal(
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" style={{ maxHeight: '88vh' }} onClick={(e) => e.stopPropagation()}>
        <div className="sheet-grip" />
        <div className="sheet-title-row">
          <h2>New Log Entry</h2>
          <button className="icon-btn" onClick={onClose} aria-label="Close"><Icon.Close /></button>
        </div>
        <div className="sheet-scroll">
          <div className="card-label" style={{ marginTop: 0 }}>Date</div>
          <input type="datetime-local" className="log-input mono" value={date} onChange={(e) => setDate(e.target.value)} />

          <div className="card-label" style={{ marginTop: 14 }}>Conditions (auto-captured)</div>
          {snap ? (
            <div className="section-body" style={{ paddingLeft: 0, paddingRight: 0, paddingTop: 4 }}>
              <div className="stat"><span className="label">PRESSURE</span><span className="value mono">{snap.pressure.toFixed(0)} hPa</span></div>
              <div className="stat"><span className="label">TEMP</span><span className="value mono">{snap.temp.toFixed(0)}°C</span></div>
              <div className="stat"><span className="label">WIND</span><span className="value mono">{Math.round(snap.windSpeed)} {windUnit === 'mph' ? 'MPH' : 'KN'} {compassLabel(snap.windDir)}</span></div>
              {snap.shore && <div className="stat"><span className="label">SHORE</span><span className="value">{snap.shore}</span></div>}
              {snap.waveHeight != null && <div className="stat"><span className="label">WAVE</span><span className="value mono">{snap.waveHeight.toFixed(1)} m</span></div>}
            </div>
          ) : (
            <p className="empty-hint" style={{ padding: 0 }}>Weather hasn't loaded yet — this entry will save without a conditions snapshot.</p>
          )}

          <div className="card-label" style={{ marginTop: 14 }}>Photo</div>
          <input type="file" accept="image/*" onChange={handleFile} />
          {photoError && <p className="empty-hint" style={{ color: 'var(--storm)', padding: '4px 0 0' }}>{photoError}</p>}
          {photo && <img src={photo} alt="" style={{ width: '100%', borderRadius: 10, marginTop: 8, display: 'block' }} />}

          <div className="card-label" style={{ marginTop: 14 }}>Comment</div>
          <textarea className="log-textarea" value={comment} onChange={(e) => setComment(e.target.value)} rows={4} placeholder="How did it go?" />

          {saveError && <p className="empty-hint" style={{ color: 'var(--storm)', padding: '8px 0 0' }}>{saveError}</p>}

          <button className="watch-btn" style={{ marginTop: 16, width: '100%' }} disabled={saving} onClick={handleSave}>
            {saving ? 'Saving…' : 'Save Entry'}
          </button>
        </div>
      </div>
    </div>,
    document.body
  );
}

function LogEntryCard({ entry, onDelete }) {
  const [sharing, setSharing] = useState(false);
  const [shareNote, setShareNote] = useState(null);

  async function handleShare() {
    setSharing(true);
    setShareNote(null);
    try {
      const blob = await buildShareImage(entry);
      const file = new File([blob], 'voyage-log.jpg', { type: 'image/jpeg' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Voyage Log', text: entry.comment || '' });
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'voyage-log.jpg';
        a.click();
        URL.revokeObjectURL(url);
        setShareNote('Sharing isn\u2019t supported here — downloaded the image instead.');
      }
    } catch (e) {
      if (e && e.name !== 'AbortError') setShareNote("Couldn't prepare the image to share.");
    } finally {
      setSharing(false);
    }
  }

  const d = new Date(entry.date);
  return (
    <div className="card" style={{ display: 'flex', gap: 12 }}>
      {entry.photo && <img src={entry.photo} alt="" style={{ width: 72, height: 72, objectFit: 'cover', borderRadius: 8, flexShrink: 0 }} />}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8 }}>
          <div>
            <div style={{ fontWeight: 600, fontSize: 14 }}>{entry.locationLabel || 'Unknown location'}</div>
            <div className="mono" style={{ fontSize: 11, color: 'var(--ink-soft)' }}>
              {d.toLocaleDateString()} {d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
            </div>
          </div>
          <button className="icon-btn" onClick={onDelete} aria-label="Delete entry"><Icon.Trash /></button>
        </div>
        {entry.weather && (
          <div className="mono" style={{ fontSize: 11, color: 'var(--ink-soft)', marginTop: 4 }}>
            {entry.weather.pressure.toFixed(0)} hPa · {entry.weather.temp.toFixed(0)}°C · {Math.round(entry.weather.windSpeed)} {entry.weather.windUnit === 'mph' ? 'MPH' : 'KN'} {entry.weather.windDir != null ? compassLabel(entry.weather.windDir) : ''}{entry.weather.shore ? ` (${entry.weather.shore})` : ''}
            {entry.weather.waveHeight != null ? ` · ${entry.weather.waveHeight.toFixed(1)}m waves` : ''}
          </div>
        )}
        {entry.comment && <div style={{ fontSize: 13, marginTop: 6 }}>{entry.comment}</div>}
        <button className="mono" style={{ fontSize: 12, color: 'var(--accent)', marginTop: 8, fontWeight: 600, padding: 0 }} onClick={handleShare} disabled={sharing}>
          {sharing ? 'Preparing…' : 'Share'}
        </button>
        {shareNote && <div className="empty-hint" style={{ padding: '4px 0 0' }}>{shareNote}</div>}
      </div>
    </div>
  );
}

function LogView({ weather, marine, location, windUnit }) {
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [formOpen, setFormOpen] = useState(false);

  async function refresh() {
    try {
      setEntries(await fetchLogEntries());
    } catch {
      // keep showing whatever was already loaded
    }
  }

  useEffect(() => {
    fetchLogEntries().then(setEntries).catch(() => {}).finally(() => setLoading(false));
  }, []);

  async function removeEntry(id) {
    await deleteLogEntry(id);
    refresh();
  }

  return (
    <div className="view">
      <div style={{ padding: '18px 18px 4px' }}>
        <button className="watch-btn" style={{ width: '100%' }} onClick={() => setFormOpen(true)}>+ New Log Entry</button>
      </div>
      {loading ? (
        <p className="empty-hint" style={{ padding: 24 }}>Loading log…</p>
      ) : entries.length === 0 ? (
        <p className="empty-hint" style={{ padding: 24 }}>No entries yet — log a trip once you're back.</p>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12, padding: '10px 18px 24px' }}>
          {entries.map((e) => (
            <LogEntryCard key={e.id} entry={e} onDelete={() => removeEntry(e.id)} />
          ))}
        </div>
      )}
      {formOpen && (
        <LogEntryForm
          weather={weather}
          marine={marine}
          location={location}
          windUnit={windUnit}
          onClose={() => setFormOpen(false)}
          onSaved={() => { setFormOpen(false); refresh(); }}
        />
      )}
    </div>
  );
}

/* ---------------------------------------------------------------------
   App root
--------------------------------------------------------------------- */
function App() {
  const [state, setState] = useState(null);
  const [weather, setWeather] = useState(null);
  const [marine, setMarine] = useState(null);
  const [tideStations, setTideStations] = useState([]);
  const [tab, setTab] = useState('gauge');
  const [sheetOpen, setSheetOpen] = useState(false);
  const [lastFetchedAt, setLastFetchedAt] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [, setTick] = useState(0);

  // Fetch the Admiralty station list once — it's metadata (names/locations),
  // barely ever changes, and the backend caches it too. If no Admiralty key
  // is configured server-side, this just fails quietly and every location
  // falls back to the modeled tide curve.
  useEffect(() => {
    fetchTideStations().then((data) => setTideStations(parseStationList(data))).catch(() => {});
  }, []);

  // Force-reload on new deploy
  useEffect(() => {
    fetchVersion().then((version) => {
      const cached = localStorage.getItem('buildVersion');
      if (cached && cached !== version) {
        localStorage.setItem('buildVersion', version);
        window.location.reload();
      } else {
        localStorage.setItem('buildVersion', version);
      }
    }).catch(() => {});
  }, []);

  useEffect(() => {
    fetchState().then(setState).catch(() => setState({ locations: [], activeLocationId: null, windUnit: 'kn' }));
  }, []);

  // Keep the "X minutes ago" text live without waiting for a data refresh
  useEffect(() => {
    const id = setInterval(() => setTick((t) => t + 1), 60000);
    return () => clearInterval(id);
  }, []);

  const activeLocation = useMemo(() => {
    if (!state) return null;
    return state.locations.find((l) => l.id === state.activeLocationId) || state.locations[0] || null;
  }, [state]);

  function updateLocationField(locationId, patch) {
    if (!state) return;
    const next = {
      ...state,
      locations: state.locations.map((l) => (l.id === locationId ? { ...l, ...patch } : l)),
    };
    setState(next);
    saveState(next);
  }

  function selectLocation(id) {
    if (!state) return;
    const next = { ...state, activeLocationId: id };
    setState(next);
    saveState(next);
  }

  const loadWeather = useCallback(async (isManual) => {
    if (!activeLocation) return;
    if (isManual) setRefreshing(true);
    try {
      const w = await fetchWeather(activeLocation.lat, activeLocation.lon);
      setWeather(w);
      setLastFetchedAt(new Date());
    } catch {
      // keep showing last-known data on failure
    }
    try {
      const m = await fetchMarine(activeLocation.lat, activeLocation.lon);
      setMarine(m);
    } catch {
      setMarine(null);
    } finally {
      if (isManual) setRefreshing(false);
    }
  }, [activeLocation]);

  useEffect(() => {
    loadWeather(false);
    const id = setInterval(() => loadWeather(false), 30 * 60 * 1000);
    return () => clearInterval(id);
  }, [loadWeather]);

  const trendFalling = useMemo(() => {
    if (!weather || !weather.hourly) return false;
    const { time, pressure_msl } = weather.hourly;
    if (!Array.isArray(time) || time.length === 0 || !Array.isArray(pressure_msl)) return false;
    let nowIdx = time.indexOf(weather.current.time);
    if (nowIdx === -1) nowIdx = time.length - 1;
    const prevIdx = Math.max(0, nowIdx - 3);
    if (pressure_msl[nowIdx] == null || pressure_msl[prevIdx] == null) return false;
    return classifyTrend(pressure_msl[nowIdx] - pressure_msl[prevIdx]).storm;
  }, [weather]);

  if (!state) {
    return <div className="view"><p className="empty-hint" style={{ padding: 24 }}>Loading…</p></div>;
  }

  return (
    <React.Fragment>
      <header className="app-header">
        <div className="header-row">
          <button className="location-btn" onClick={() => setSheetOpen(true)}>
            <Icon.Pin />
            <span>{activeLocation ? activeLocation.label : 'Choose a location'}</span>
            <Icon.Chevron style={{ transform: 'rotate(-90deg)', opacity: 0.6 }} />
          </button>
          <button
            className={`refresh-btn ${refreshing ? 'spinning' : ''}`}
            onClick={() => loadWeather(true)}
            aria-label="Refresh"
          >
            <Icon.Refresh />
          </button>
        </div>
        <div className="update-row">Last update: {relativeTime(lastFetchedAt)}</div>
        {state.locations.length > 1 && (
          <div className="day-tabs" style={{ marginTop: 10 }}>
            {state.locations.map((loc) => (
              <button
                key={loc.id}
                className={`day-tab ${loc.id === state.activeLocationId ? 'active' : ''}`}
                onClick={() => selectLocation(loc.id)}
              >
                {loc.label.split(',')[0]}
              </button>
            ))}
            <button className="day-tab" onClick={() => setSheetOpen(true)}>+ Add</button>
          </div>
        )}
      </header>

      {trendFalling && (
        <div className="storm-banner">
          <Icon.Alert />
          <span>Pressure dropping fast — possible storm approaching.</span>
        </div>
      )}

      {tab === 'gauge' && <GaugeView weather={weather} marine={marine} windUnit={state.windUnit} location={activeLocation} tideStations={tideStations} onUpdateLocation={updateLocationField} />}
      {tab === 'map' && <MapView location={activeLocation} />}
      {tab === 'route' && <RouteView location={activeLocation} marine={marine} windUnit={state.windUnit} />}
      {tab === 'log' && <LogView weather={weather} marine={marine} location={activeLocation} windUnit={state.windUnit} />}

      <nav className="bottom-nav">
        <button className={`nav-btn ${tab === 'gauge' ? 'active' : ''}`} onClick={() => setTab('gauge')}>
          <Icon.Gauge /> GAUGE
        </button>
        <button className={`nav-btn ${tab === 'map' ? 'active' : ''}`} onClick={() => setTab('map')}>
          <Icon.Map /> MAP
        </button>
        <button className={`nav-btn ${tab === 'route' ? 'active' : ''}`} onClick={() => setTab('route')}>
          <Icon.Route /> ROUTE
        </button>
        <button className={`nav-btn ${tab === 'log' ? 'active' : ''}`} onClick={() => setTab('log')}>
          <Icon.Log /> LOG
        </button>
      </nav>

      {sheetOpen && (
        <LocationSheet state={state} setState={setState} onClose={() => setSheetOpen(false)} />
      )}
    </React.Fragment>
  );
}

/* ---------------------------------------------------------------------
   Error boundary — a render crash anywhere used to blank the entire
   screen with no way back short of force-quitting Safari. This catches
   it and offers a reload instead.
--------------------------------------------------------------------- */
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(error) {
    return { error };
  }
  render() {
    if (this.state.error) {
      return (
        <div style={{
          minHeight: '100vh', display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center', gap: 14, padding: 28,
          textAlign: 'center', background: 'var(--panel)', color: 'var(--ink)',
        }}>
          <Icon.Alert />
          <div style={{ fontSize: 16, fontWeight: 600 }}>Something went wrong loading this screen.</div>
          <div className="mono" style={{ fontSize: 12, color: 'var(--ink-soft)', maxWidth: 320 }}>
            {String((this.state.error && this.state.error.message) || this.state.error)}
          </div>
          <button
            onClick={() => window.location.reload()}
            style={{ background: 'var(--case)', color: 'var(--panel-raised)', padding: '11px 22px', borderRadius: 10, fontWeight: 600, fontSize: 14 }}
          >
            Reload
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
